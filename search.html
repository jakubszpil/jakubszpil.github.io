nym z najważniejszych wzorców projektowych, szczególnie użytecznym w kontekście programowania reaktywnego i aplikacji, które muszą reagować na zmiany stanu. W TypeScript możemy zaimplementować ten wzorzec w sposób typowany, co dodatkowo zwiększa bezpieczeństwo i czytelność kodu.\",\"obserwatorium-czyli-wzorzec-projektowy-obserwatora\",\"Obserwatorium, czyli wzorzec projektowy obserwatora\",{\"_8\":25,\"_10\":34,\"_12\":21,\"_14\":35,\"_16\":36},\"Signal to koncepcja pochodząca z programowania reaktywnego, której celem jest uproszczenie komunikacji między komponentami oraz zarządzania stanem aplikacji. W TypeScript, dzięki silnemu typowaniu, można zaimplementować sygnały w sposób bezpieczny i efektywny.\",\"signalizacja-czyli-koncept-signals-w-typescript\",\"Signalizacja, czyli koncept Signals w Typescript\",\"courses\",[39,45,51,56,61,66,72,77,83,88,92,97],{\"_8\":40,\"_10\":41,\"_12\":42,\"_14\":43,\"_16\":44},\"2025-07-12T00:00:00.000Z\",\"React to popularna biblioteka JavaScript do budowania interfejsów użytkownika. Pozwala na tworzenie złożonych aplikacji webowych z komponentów, co ułatwia zarządzanie stanem i renderowanie widoków. Naucz się podstaw Reacta i zacznij tworzyć dynamiczne aplikacje!\",\"11 minut\",\"wprowadzenie-do-react\",\"Wprowadzenie do Reacta\",{\"_8\":46,\"_10\":47,\"_12\":48,\"_14\":49,\"_16\":50},\"2025-07-06T00:00:00.000Z\",\"JavaScript to potężny i wszechstronny język programowania, który stanowi serce interaktywnych stron internetowych. W tym kompleksowym kursie krok po kroku odkryjemy jego podstawy, od zrozumienia czym jest JavaScript, przez kluczowe elementy takie jak zmienne, typy danych, operatory, struktury kontrolne i funkcje, aż po bardziej złożone koncepcje, takie jak obiekty i tablice. Przygotuj się na fascynującą podróż do świata programowania!\",\"20 minut\",\"wprowadzenie-do-javascript\",\"Wprowadzenie do JavaScript\",{\"_8\":46,\"_10\":52,\"_12\":53,\"_14\":54,\"_16\":55},\"Hej, programisto! 👋 Chcesz przenieść swój JavaScript na wyższy poziom? Dowiedz się, czym jest TypeScript, jak go zainstalować, jak zacząć z nim kodować i dlaczego to właśnie on może być Twoim najlepszym kumplem w tworzeniu niezawodnych aplikacji! Przystępny przewodnik dla początkujących z mnóstwem przykładów i praktycznych wskazówek. Gotowy na typowanie? 😉\",\"29 minut\",\"wprowadzenie-do-typescript\",\"Wprowadzenie do TypeScript\",{\"_8\":9,\"_10\":57,\"_12\":58,\"_14\":59,\"_16\":60},\"Zrozum podstawy TypeScript w środowisku React - prostym językiem i na praktycznych przykładach.\",\"9 minut\",\"pierwsze-kroki-z-typescript-w-react\",\"Pierwsze kroki z TypeScript w React - praktyczne podstawy\",{\"_8\":9,\"_10\":62,\"_12\":63,\"_14\":64,\"_16\":65},\"Kompleksowy przewodnik po wzorcach projektowych - od podstaw po praktyczne przykłady w kontekście frontendu i backendu.\",\"13 minut\",\"wzorce-projektowe\",\"Wzorce projektowe w praktyce\",{\"_8\":67,\"_10\":68,\"_12\":69,\"_14\":70,\"_16\":71},\"2025-06-05T00:00:00.000Z\",\"Kompleksowy kurs wprowadzający do systemu kontroli wersji Git oraz platformy GitHub. Poznaj podstawowe pojęcia, komendy oraz narzędzia do pracy zespołowej i automatyzacji.\",\"5 minut\",\"wprowadzenie-do-git-i-github\",\"Wprowadzenie do Git i GitHub\",{\"_8\":73,\"_10\":74,\"_12\":42,\"_14\":75,\"_16\":76},\"2024-07-05T00:00:00.000Z\",\"Semantyczny HTML polega na używaniu elementów HTML, które jednoznacznie opisują swoje znaczenie i cel. Elementy semantyczne nie tylko definiują strukturę dokumentu, ale również pomagają w interpretacji jego zawartości zarówno przez przeglądarki, jak i przez wyszukiwarki internetowe oraz technologie wspomagające (np. czytniki ekranowe).\",\"semantyczny-html\",\"Wprowadzenie do Semantycznego HTML\",{\"_8\":78,\"_10\":79,\"_12\":80,\"_14\":81,\"_16\":82},\"2024-06-30T00:00:00.000Z\",\"JavaScript jest językiem programowania, który jest powszechnie stosowany do tworzenia dynamicznych i interaktywnych stron internetowych. W ciągu ostatnich lat JavaScript znacznie ewoluował, wprowadzając nowe funkcje i poprawiając istniejące mechanizmy. W tym kursie omówimy najważniejsze elementy nowoczesnego JavaScript, w tym ES6 i nowsze.\",\"18 minut\",\"nowoczesny-javascript\",\"Renesans w JS, czyli nowoczesny JavaScript\",{\"_8\":78,\"_10\":84,\"_12\":85,\"_14\":86,\"_16\":87},\"Czym jest BEM? BEM (Block, Element, Modifier) to metodyka nazewnictwa klas CSS, która pomaga tworzyć komponenty interfejsu użytkownika w sposób modularny i łatwy do utrzymania. BEM dzieli interfejs na bloki, elementy i modyfikatory, co pozwala na lepszą organizację kodu CSS.\",\"12 minut\",\"szybszy-css-czyli-wprowadzenie-do-bem\",\"Wprowadzenie do metodyki BEM\",{\"_8\":78,\"_10\":89,\"_12\":63,\"_14\":90,\"_16\":91},\"CSS (Cascading Style Sheets) to język służący do opisywania wyglądu i formatu dokumentu HTML. CSS pozwala na oddzielenie treści od prezentacji, co umożliwia tworzenie estetycznych i spójnych stron internetowych. W tym kursie omówimy podstawy CSS, w tym selektory, właściwości, sposoby załączania CSS do HTML oraz JavaScript, a także przedstawimy kilka zadań do wykonania.\",\"wprowadzenie-do-css\",\"Wprowadzenie do CSS\",{\"_8\":78,\"_10\":93,\"_12\":94,\"_14\":95,\"_16\":96},\"Czym jest DOM? DOM (Document Object Model) to interfejs programistyczny dla dokumentów HTML i XML. Umożliwia dynamiczne manipulowanie strukturą, stylem i treścią dokumentów. DOM reprezentuje dokument jako drzewo obiektów, gdzie każdy element, atrybut i tekst w dokumencie jest węzłem drzewa.\",\"10 minut\",\"wprowadzenie-do-dom\",\"Czym jest DOM?\",{\"_8\":78,\"_10\":98,\"_12\":94,\"_14\":99,\"_16\":100},\"Co to jest HTML? HTML (HyperText Markup Language) to podstawowy język wykorzystywany do tworzenia i strukturyzowania stron internetowych. HTML używa elementów, które definiują różne części dokumentu, takie jak nagłówki, akapity, linki, obrazy, i wiele innych.\",\"wprowadzenie-do-html\",\"Wprowadzenie do HTML\",\"projects\",[103,110,115,120,124],{\"_8\":104,\"_10\":105,\"_14\":106,\"_107\":108,\"_16\":109},\"2025-03-22T00:00:00.000Z\",\"Aplikacja usprawniająca pracę zespołu. Pozwala na zarządzanie zespołami i użytkownikami, monitorowanie zadaniami i przypisywanie ich do konkretnych osób bądź podzespołów.\",\"team-support\",\"status\",\"IN_PROGRESS\",\"👥 Team Support\",{\"_8\":111,\"_10\":112,\"_14\":113,\"_107\":108,\"_16\":114},\"2025-03-01T00:00:00.000Z\",\"Aplikacja typu e-commerce mająca na celu ułatwienie korzystania z dobrodziejstw służby zdrowia. All-in-one, znajdziesz tutaj możliwość umawiania wizyt, wyszukiwania najbliższych placówek zdrowia, podgląd skierowań i recept i wiele innych opcji.\",\"e-przychodnia\",\"🩺 E-Przychodnia\",{\"_8\":111,\"_10\":116,\"_14\":117,\"_107\":118,\"_16\":119},\"Aplikacja do generowania hasła, wedle podanych wytycznych.\",\"password-generator\",\"COMPLETED\",\"🔑 Password Generator\",{\"_8\":111,\"_10\":121,\"_14\":122,\"_107\":118,\"_16\":123},\"Prosta gra każdemu dobrze znana, czyli papier-kamień-nożyce. Gra wykonana za pomocą React Native\",\"rock-paper-scissors\",\"🪨 Rock-Paper-Scissors\",{\"_8\":125,\"_10\":126,\"_14\":127,\"_107\":118,\"_16\":128},\"2024-04-12T00:00:00.000Z\",\"Strona, gdzie znajdziesz blog z artykułami, głównie o tematyce frontendowej, sekcję z kursami, dzięki którym nabędziesz wiedzę i doświadczenie z frontu, jak i portfolio, które przywita Cię moimi ostatnimi projektami.\",\"jakubszpil.github.io\",\"Strona, na której się znajdujesz 😉\",\"actionData\",\"errors\"]\n");</script><!--$?--><template id="B:1"></template><!--/$--></div><script>$RB=[];$RV=function(a){$RT=performance.now();for(var b=0;b<a.length;b+=2){var c=a[b],e=a[b+1];null!==e.parentNode&&e.parentNode.removeChild(e);var f=c.parentNode;if(f){var g=c.previousSibling,h=0;do{if(c&&8===c.nodeType){var d=c.data;if("/$"===d||"/&"===d)if(0===h)break;else h--;else"$"!==d&&"$?"!==d&&"$~"!==d&&"$!"!==d&&"&"!==d||h++}d=c.nextSibling;f.removeChild(c);c=d}while(c);for(;e.firstChild;)f.insertBefore(e.firstChild,c);g.data="$";g._reactRet
