nt \u003ccode\u003e\u0026#x3C;footer\u003e\u003c/code\u003e?\u003c/p\u003e\",[49,50,51,52],\"Wyłącznie w \u003caside\u003e\",\"Tylko w \u003cmain\u003e\",\"Na końcu całej strony lub na końcu sekcji/artykułu\",\"Tylko na początku strony\",\"\u003cfooter\u003e może być użyty zarówno dla całej strony, jak i dla poszczególnych sekcji czy artykułów.\",{\"_25\":55,\"_27\":56,\"_33\":44,\"_35\":60},\"\u003cp\u003eKtóry element HTML semantyczny najlepiej nadaje się na poboczny panel z reklamami lub linkami powiązanymi?\u003c/p\u003e\",[57,58,31,59],\"\u003cfigure\u003e\",\"\u003cmark\u003e\",\"\u003ctime\u003e\",\"\u003caside\u003e przeznaczony jest na treści poboczne, niezwiązane bezpośrednio z główną osią tematyczną.\",{\"_25\":62,\"_27\":63,\"_33\":68,\"_35\":69},\"\u003cp\u003eJakiego atrybutu użyjesz z \u003ccode\u003e\u0026#x3C;time\u003e\u003c/code\u003e, by data była czytelna dla maszyn?\u003c/p\u003e\",[64,65,66,67],\"format\",\"datetime\",\"date\",\"machine\",1,\"Atrybut datetime pozwala maszynom poprawnie interpretować podaną datę/czas.\",\"slug\",\"semantyczny-html\",\"content\",\"\u003cp\u003eWitaj w świecie Semantycznego HTML! 🌍 Jeśli tworzysz strony internetowe, to na pewno zależy Ci, by były one nie tylko ładne wizualnie, ale też dobrze \\\"rozumiane\\\" przez przeglądarki, wyszukiwarki i technologie wspomagające. Właśnie w tym pomoże Ci semantyka! Zamiast polegać tylko na generycznych elementach jak \u003c/p\u003e\u003cdiv\u003e czy \u003cspan\u003e, nauczysz się używać znaczników, które jednoznacznie opisują swoje znaczenie i cel. Gotowy/a na budowanie stron, które są inteligentne i dostępne dla wszystkich? Zaczynamy! 🚀\u003cp\u003e\u003c/p\u003e\\n\u003ch2 id=\\\"co-to-jest-semantyczny-html\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#co-to-jest-semantyczny-html\\\"\u003e\u003e\u003e\u003c/a\u003eCo to jest Semantyczny HTML?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eSemantyczny HTML\u003c/strong\u003e to podejście do tworzenia struktury dokumentów HTML, które polega na używaniu odpowiednich tagów (elementów) do opisania znaczenia i roli poszczególnych części strony. Zamiast używać wszędzie generycznych \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e lub \u003ccode\u003e\u0026#x3C;span\u003e\u003c/code\u003e, stosujemy elementy, które mają wbudowane znaczenie - tak, aby przeglądarka, silniki wyszukiwarek i technologie wspomagające (np. czytniki ekranowe dla osób niewidomych) mogły łatwo zrozumieć, co reprezentuje dany fragment kodu.\u003c/p\u003e\\n\u003cp\u003ePomyśl o tym tak:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eHTML bez semantyki\u003c/strong\u003e jest jak książka, w której wszystkie rozdziały są po prostu zaznaczone pogrubionym tekstem - niby wiesz, że to rozdział, ale nie ma jasnego oznaczenia, że to \u003cem\u003ejest\u003c/em\u003e rozdział.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eHTML semantyczny\u003c/strong\u003e jest jak książka z wyraźnie oznaczonymi tytułami rozdziałów, spisem treści, numeracją stron i indeksami. Wszystko jest na swoim miejscu i łatwo to znaleźć.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch2 id=\\\"dlaczego-warto-używać-semantycznego-html\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#dlaczego-warto-używać-semantycznego-html\\\"\u003e\u003e\u003e\u003c/a\u003eDlaczego warto używać Semantycznego HTML?\u003c/h2\u003e\\n\u003cp\u003eStosowanie semantycznych znaczników to nie tylko dobry styl kodowania, ale też przynosi realne korzyści:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003eDostępność (Accessibility) 💪:\u003c/strong\u003e Jest to absolutnie kluczowe dla osób korzystających z czytników ekranowych. Kiedy czytnik napotka \u003ccode\u003e\u0026#x3C;nav\u003e\u003c/code\u003e, \\\"wie\\\", że to jest nawigacja i może poinformować o tym użytkownika, pozwalając mu szybko przejść do interesujących go sekcji. Bez semantyki, czytnik po prostu czyta \\\"div\\\", co nie daje żadnego kontekstu.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSEO (Search Engine Optimization) 📈:\u003c/strong\u003e Wyszukiwarki, takie jak Google, wykorzystują semantyczne znaczniki do zrozumienia struktury i kontekstu treści na stronie. Lepsze zrozumienie = potencjalnie wyższe pozycje w wynikach wyszukiwania. Wyszukiwarka \\\"wie\\\", że to, co znajduje się w \u003ccode\u003e\u0026#x3C;main\u003e\u003c/code\u003e, jest najważniejszą treścią, a to, co w \u003ccode\u003e\u0026#x3C;footer\u003e\u003c/code\u003e, to stopka.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwiejsza konserwacja i czytelność kodu 🧑‍💻:\u003c/strong\u003e Ty (i inni deweloperzy) szybciej zrozumiecie, co dany blok kodu reprezentuje. Widząc \u003ccode\u003e\u0026#x3C;article\u003e\u003c/code\u003e od razu wiesz, że to samodzielna treść, a nie przypadkowy \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e. To ułatwia rozbudowę i debugowanie.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWsparcie dla przyszłych technologii:\u003c/strong\u003e W miarę rozwoju sieci, nowe technologie i narzędzia będą w stanie lepiej wykorzystywać semantyczną strukturę dokumentu.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003ch2 id=\\\"kluczowe-elementy-semantycznego-html\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#kluczowe-elementy-semantycznego-html\\\"\u003e\u003e\u003e\u003c/a\u003eKluczowe elementy Semantycznego HTML\u003c/h2\u003e\\n\u003cp\u003ePoznajmy najważniejsze elementy semantyczne wprowadzone w HTML5, które pomogą Ci budować lepsze strony.\u003c/p\u003e\\n\u003ch3 id=\\\"doctype-html\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#doctype-html\\\"\u003e\u003e\u003e\u003e\u003c/a\u003e\u003ccode\u003e\u0026#x3C;!DOCTYPE html\u003e\u003c/code\u003e\u003c/h3\u003e\\n\u003cp\u003eChociaż nie jest to element HTML w ścisłym tego słowa znaczeniu, a raczej deklaracja, to właśnie od niej zaczynamy każdy nowoczesny dokument HTML. Informuje przeglądarkę, że ma do czynienia z HTML5. Jest to pierwszy krok do zapewnienia prawidłowej interpretacji całej reszty semantycznego kodu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e\u0026#x3C;!DOCTYPE \u003cspan class=\\\"hljs-keyword\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003elang\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"pl\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003echarset\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"UTF-8\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"viewport\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003econtent\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"width=device-width, initial-scale=1.0\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003eMoja Semantyczna Strona\u003cspan class=\\\"hljs 03e\u003e\u003c/a\u003e\u003ccode\u003e\u0026#x3C;mark\u003e\u003c/code\u003e\u003c/h3\u003e\\n\u003cp\u003eElement \u003ccode\u003e\u0026#x3C;mark\u003e\u003c/code\u003e służy do wyróżnienia (podświetlenia) fragmentu tekstu, który jest ważny w danym kontekście. Często używa się go do zaznaczania wyników wyszukiwania.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eZnaleziono wyniki dla frazy: \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emark\u003c/span\u003e\u003e\u003c/span\u003esemantyczny HTML\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003emark\u003c/span\u003e\u003e\u003c/span\u003e.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"address\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#address\\\"\u003e\u003e\u003e\u003e\u003c/a\u003e\u003ccode\u003e\u0026#x3C;address\u003e\u003c/code\u003e\u003c/h3\u003e\\n\u003cp\u003eElement \u003ccode\u003e\u0026#x3C;address\u003e\u003c/code\u003e reprezentuje dane kontaktowe dla najbliższego \u003ccode\u003e\u0026#x3C;article\u003e\u003c/code\u003e lub \u003ccode\u003e\u0026#x3C;body\u003e\u003c/code\u003e. Może zawierać imię i nazwisko autora/organizacji, adres fizyczny, numer telefonu, adres e-mail lub adres URL.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003efooter\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eaddress\u003c/span\u003e\u003e\u003c/span\u003e\\n    Napisane przez: \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"mailto:jan@example.com\\\"\u003c/span\u003e\u003e\u003c/span\u003eJan Kowalski\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebr\u003c/span\u003e /\u003e\u003c/span\u003e\\n    Odwiedź nas na: ul. Prosta 123, 00-001 Warszawa.\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eaddress\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003efooter\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch2 id=\\\"pułapki-i-najlepsze-praktyki\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#pułapki-i-najlepsze-praktyki\\\"\u003e\u003e\u003e\u003c/a\u003ePułapki i najlepsze praktyki\u003c/h2\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eNie używaj semantycznych tagów do stylizacji:\u003c/strong\u003e Elementy semantyczne mają znaczenie strukturalne i kontekstowe, a nie wizualne. Do stylizacji używaj CSS. Nie używaj \u003ccode\u003e\u0026#x3C;section\u003e\u003c/code\u003e tylko dlatego, że chcesz grupować elementy do stylizacji - do tego służy \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eNagłówki w \u003ccode\u003e\u0026#x3C;section\u003e\u003c/code\u003e i \u003ccode\u003e\u0026#x3C;article\u003e\u003c/code\u003e:\u003c/strong\u003e Każdy \u003ccode\u003e\u0026#x3C;section\u003e\u003c/code\u003e i \u003ccode\u003e\u0026#x3C;article\u003e\u003c/code\u003e powinien mieć swój własny nagłówek (np. \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;h2\u003e\u003c/code\u003e itd.), który opisuje zawartość tej sekcji/artykułu.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eTylko jeden \u003ccode\u003e\u0026#x3C;main\u003e\u003c/code\u003e:\u003c/strong\u003e Pamiętaj, że na stronę może być tylko jeden element \u003ccode\u003e\u0026#x3C;main\u003e\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eNie zmuszaj się:\u003c/strong\u003e Czasem \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e jest po prostu najlepszym wyborem. Nie próbuj na siłę stosować semantycznych tagów, jeśli nie pasują do znaczenia treści. Na przykład, do prostego grupowania elementów w celu zastosowania do nich stylów CSS, \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e jest idealny.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eHTML to struktura, CSS to wygląd:\u003c/strong\u003e To kluczowa zasada. HTML powinien opisywać, czym jest treść, a CSS - jak wygląda.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch2 id=\\\"podsumowanie\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podsumowanie\\\"\u003e\u003e\u003e\u003c/a\u003ePodsumowanie\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eSemantyczny HTML\u003c/strong\u003e to podstawa tworzenia nowoczesnych, dostępnych i wydajnych stron internetowych. Używając odpowiednich tagów, takich jak \u003ccode\u003e\u0026#x3C;header\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;nav\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;main\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;article\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;section\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;aside\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;footer\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;figure\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;figcaption\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;time\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;mark\u003e\u003c/code\u003e i \u003ccode\u003e\u0026#x3C;address\u003e\u003c/code\u003e, dostarczasz przeglądarkom i wyszukiwarkom cenne informacje o strukturze i znaczeniu Twojej treści. To nie tylko poprawia \u003cstrong\u003eSEO\u003c/strong\u003e i \u003cstrong\u003edostępność\u003c/strong\u003e, ale także sprawia, że Twój kod jest bardziej \u003cstrong\u003eczytelny i łatwiejszy w utrzymaniu\u003c/strong\u003e. Inwestycja w semantykę to inwestycja w jakość Twoich projektów! 🌟\u003c/p\u003e\\n\u003ch2 id=\\\"zadania-praktyczne\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadania-praktyczne\\\"\u003e\u003e\u003e\u003c/a\u003eZadania praktyczne\u003c/h2\u003e\\n\u003cp\u003ePoniższe zadania pomogą Ci utrwalić wiedzę o semantycznych elementach HTML. Spróbuj napisać kod HTML samodzielnie, a następnie sprawdź swoje rozwiązanie!\u003c/p\u003e\\n\u003ch3 id=\\\"zadanie-1-podstawowa-struktura\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-1-podstawowa-struktura\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 1: Podstawowa struktura\u003c/h3\u003e\\n\u003cp\u003eStwórz prostą stronę HTML, która zawiera wszystkie kluczowe sekcje semantyczne, tworzące ogólny układ strony:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003enagłówek całej strony (\u003ccode\u003e\u0026#x3C;header\u003e\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003egłówną treść strony (\u003ccode\u003e\u0026#x3C;main\u003e\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003enawigację w nagłówku (\u003ccode\u003e\u0026#x3C;nav\u003e\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003estopkę strony (\u003ccode\u003e\u0026#x3C;footer\u003e
