ywnie (domyślnie) w JavaScript jako osobny, podstawowy typ?\u003c/p\u003e\",[46,47,48,49],\"Character\",\"Boolean\",\"String\",\"Number\",0,\"W JavaScript nie ma osobnego typu danych 'Character' dla pojedynczych znaków. Pojedyncze znaki są traktowane jako krótkie łańcuchy znaków (String). Pozostałe typy są podstawowymi typami w JS.\",{\"_31\":53,\"_33\":54,\"_39\":59,\"_41\":60},\"\u003cp\u003eJak wygląda poprawna składnia funkcji strzałkowej w JavaScript, która zwraca sumę dwóch liczb \u003ccode\u003ea\u003c/code\u003e i \u003ccode\u003eb\u003c/code\u003e?\u003c/p\u003e\",[55,56,57,58],\"function suma(a, b) { return a + b; }\",\"sum(a, b) =\u003e a + b;\",\"let suma = add(a, b);\",\"const suma = (a, b) =\u003e a + b;\",3,\"Poprawna składnia funkcji strzałkowej to `const suma = (a, b) =\u003e a + b;`. Jest to zwięzła forma deklaracji funkcji, często używana w nowoczesnym JavaScript. Opcja 1 to tradycyjna deklaracja funkcji, a pozostałe są niepoprawne składniowo.\",{\"_31\":62,\"_33\":63,\"_39\":40,\"_41\":68},\"\u003cp\u003eW jaki sposób można uzyskać liczbę elementów (długość) tablicy w JavaScript?\u003c/p\u003e\",[64,65,66,67],\"array.size()\",\"length(array)\",\"array.length\",\"array.count\",\"Aby uzyskać długość tablicy w JavaScript, używamy właściwości `.length`, np. `mojaTablica.length`. Jest to standardowy sposób.\",{\"_31\":70,\"_33\":71,\"_39\":50,\"_41\":76},\"\u003cp\u003eCo zostanie wypisane w konsoli po wykonaniu poniższego kodu?\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e x = \u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (x \u003e \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e) { \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e'OK'\u003c/span\u003e); } \u003cspan class=\\\"hljs-keyword\\\"\u003eelse\u003c/span\u003e { \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e'NIE'\u003c/span\u003e); }\\n\u003c/code\u003e\u003c/pre\u003e\",[72,73,74,75],\"OK\",\"NIE\",\"5\",\"undefined\",\"Wartość `x` wynosi 10. Warunek `x \u003e 5` (czyli `10 \u003e 5`) jest prawdziwy, dlatego wykonany zostanie blok kodu wewnątrz `if`, który wypisze w konsoli tekst 'OK'.\",\"slug\",\"wprowadzenie-do-javascript\",\"content\",\"\u003cp\u003eWitaj w ekscytującym świecie \u003cstrong\u003eJavaScript (JS)\u003c/strong\u003e! 🚀 Ten kurs to Twój przewodnik po fundamentach jednego z najważniejszych języków programowania w sieci. Niezależnie od tego, czy chcesz tworzyć interaktywne strony, czy budować zaawansowane aplikacje, JavaScript to klucz do sukcesu. Przygotuj się na solidną dawkę wiedzy i praktyki! ✨\u003c/p\u003e\\n\u003ch2 id=\\\"czym-jest-javascript-i-dlaczego-jest-tak-ważny\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czym-jest-javascript-i-dlaczego-jest-tak-ważny\\\"\u003e\u003e\u003e\u003c/a\u003eCzym jest JavaScript i dlaczego jest tak ważny?\u003c/h2\u003e\\n\u003cp\u003eWitaj w fascynującym świecie \u003cstrong\u003eJavaScript (JS)\u003c/strong\u003e! To język programowania, który jest niezwykle popularny i stanowi fundament większości dynamicznych i interaktywnych stron internetowych, które odwiedzasz każdego dnia. Wyobraź sobie stronę internetową, która nie tylko wyświetla tekst i obrazy, ale także reaguje na Twoje kliknięcia, przewijanie czy wprowadzanie danych w formularzach - to właśnie zasługa JavaScriptu! 🌐\u003c/p\u003e\\n\u003ch3 id=\\\"gdzie-spotkasz-javascript\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#gdzie-spotkasz-javascript\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eGdzie spotkasz JavaScript?\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eW przeglądarce (po stronie klienta):\u003c/strong\u003e To jego główne zastosowanie. JavaScript pozwala na:\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eAnimacje:\u003c/strong\u003e Sprawia, że elementy na stronie poruszają się, zanikają lub pojawiają. ✨\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eInteraktywne formularze:\u003c/strong\u003e Sprawdza, czy dane wpisane w formularzu są poprawne, zanim zostaną wysłane. ✅\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eGalerie zdjęć:\u003c/strong\u003e Umożliwia płynne przechodzenie między zdjęciami. 🏞️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eMapy interaktywne:\u003c/strong\u003e Pozwala na przybliżanie, oddalanie i przesuwanie map. 🗺️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eGry przeglądarkowe:\u003c/strong\u003e Wiele prostych gier jest w całości napisanych w JS. 🎮\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eNa serwerze (po stronie serwera):\u003c/strong\u003e Dzięki technologiom takim jak \u003cstrong\u003eNode.js\u003c/strong\u003e, JavaScript może być używany do budowania potężnych aplikacji serwerowych, które obsługują logikę biznesową, bazy danych i komunikację z klientem. Oznacza to, że możesz używać tego samego języka do tworzenia zarówno frontendu (tego, co widzisz w przeglądarce), jak i backendu (logiki działającej na serwerze) aplikacji! 💻\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eAplikacje mobilne i desktopowe:\u003c/strong\u003e Istnieją również frameworki (zestawy narzędzi), takie jak React Native czy Electron, które pozwalają pisać aplikacje mobilne i desktopowe przy użyciu JavaScriptu. 📱🖥️\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eW tym kursie skupimy się głównie na podstawach JavaScriptu w kontekście przeglądarek internetowych, ponieważ to doskonały punkt wyjścia dla każdego początkującego. Przygotuj się na to, że nauka JavaScriptu otworzy Ci drzwi do tworzenia niesamowitych rzeczy w internecie! 🚀\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zmienne-szafki-na-twoje-dane\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zmienne-szafki-na-twoje-dane\\\"\u003e\u003e\u003e\u003c/a\u003eZmienne: Szafki na Twoje Dane\u003c/h2\u003e\\n\u003cp\u003eWyobraź sobie, że piszesz list, w którym musisz wiele razy powtórzyć swoje imię. Zamiast za każdym razem pisać \\\"Jan\\\", możesz użyć zmiennej \\\"MojeImię\\\" i włożyć do niej wartość \\\"Jan\\\". Później, jeśli zechcesz zmienić imię na \\\"Krzysztof\\\", zmienisz je tylko w jednym miejscu - w zmiennej! 📦\u003c/p\u003e\\n\u003cp\u003eW programowaniu \u003cstrong\u003ezmienne\u003c/strong\u003e to takie \\\"pudełka\\\" lub \\\"szafki\\\", w których możemy przechowywać różne dane (liczby, tekst, prawda/fałsz itp.). Te dane mogą się zmieniać w trakcie działania programu.\u003c/p\u003e\\n\u003cp\u003eW JavaScript zmienne deklarujemy, czyli tworzymy, za pomocą trzech słów kluczowych: \u003ccode\u003evar\u003c/code\u003e, \u003ccode\u003elet\u003c/code\u003e lub \u003ccode\u003econst\u003c/code\u003e. Każde z nich ma nieco inne zastosowanie i zasady:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003evar\u003c/code\u003e: To najstarszy sposób deklarowania zmiennych w JavaScript. Zmienne zadeklarowane za pomocą \u003ccode\u003evar\u003c/code\u003e mają zasięg \u003cstrong\u003efunkcyjny\u003c/strong\u003e, co oznacza, że są dostępne w całej funkcji, w której zostały zadeklarowane. Obecnie rzadziej używany w nowym kodzie ze względu na pewne potencjalne problemy (np. możliwość redeklaracji tej samej zmiennej).\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003elet\u003c/code\u003e: To nowocześniejszy sposób deklarowania zmiennych, wprowadzony w standardzie ES6 (ECMAScript 2015). Zmienne zadeklarowane za pomocą \u003ccode\u003elet\u003c/code\u003e mają zasięg \u003cstrong\u003eblokowy\u003c/strong\u003e. Oznacza to, że są dostępne tylko w bloku kodu (np. wewnątrz \u003ccode\u003eif\u003c/code\u003e, \u003ccode\u003efor\u003c/code\u003e, \u003ccode\u003e{}\u003c/code\u003e) w którym zostały zadeklarowane. Jest to \u003cstrong\u003ezalecany\u003c/strong\u003e sposób deklarowania zmiennych, których wartość \u003cstrong\u003ebędzie się zmieniać\u003c/strong\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003econst\u003c/code\u003e: Również wprowadzony w ES6, podobnie jak \u003ccode\u003elet\u003c/code\u003e, ma zasięg \u003cstrong\u003eblokowy\u003c/strong\u003e. Kluczowa różnica polega na tym, że \u003ccode\u003econst\u003c/code\u003e służy do deklarowania \u003cstrong\u003estałych\u003c/strong\u003e, czyli wartości, które \u003cstrong\u003enie powinny się zmieniać\u003c/strong\u003e po ich pierwszym przypisaniu. Jeśli spróbujesz zmienić wartość stałej, JavaScript zwróci błąd. Jest to świetne do danych, które mają być niezmienne w całym programie. 🔒\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład użycia zmiennych:\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Deklaracja zmiennej 'var' (starszy sposób)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003evar\u003c/span\u003e liczbaSamochodow = \u003cspan class=\\\"hljs-number\\\"\u003e3\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczbaSamochodow); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 3\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Możesz zmienić jej wartość\u003c/span\u003e\\nliczbaSamochodow = \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczbaSamochodow); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 5\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Deklaracja zmiennej 'let' (zalecany dla zmiennych, które się zmieniają)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e imieUzytkownika = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Anna\\\"\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(imieUzytkownika); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: Anna\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Możesz zmienić jej wartość\u003c/span\u003e\\nimieUzytkownika = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Katarzyna\\\"\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(imieUzytkownika); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: Katarzyna\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Deklaracja stałej 'const' (dla wartości, które się nie zmieniają)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-variable constant_\\\"\u003ePI\u003c/span\u003e = \u003cspan class=\\\"hljs-number\\\"\u003e3.14159\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-variable constant_\\\"\u003ePI\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 3.14159\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// PRÓBA ZMIANY Wartości const - spowoduje błąd! ❌\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// PI = 3.14; // To spowodowałoby błąd w konsoli: \\\"TypeError: Assignment to constant variable.\\\"\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWskazówka dla początkujących:\u003c/strong\u003e Na początku staraj się używać \u003ccode\u003econst\u003c/code\u003e zawsze, gdy tylko możesz. Jeśli wiesz, że wartość danej zmiennej będzie się zmieniać, wtedy użyj \u003ccode\u003elet\u003c/code\u003e. Unikaj \u003ccode\u003evar\u003c/code\u003e w nowym kodzie, chyba że musisz pracować ze starszymi systemami. 👍\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"typy-danych-co-javascript-potrafi-przechowywać\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#typy-danych-co-javascript-potrafi-przechowywać\\\"\u003e\u003e\u003e\u003c/a\u003eTypy Danych: Co JavaScript potrafi przechowywać?\u003c/h2\u003e\\n\u003cp\u003eZmienne mogą przechowywać różne rodzaje informacji. W programowaniu te rodzaje informacji nazywamy \u003cstrong\u003etypami danych\u003c/strong\u003e. JavaScript, podobnie jak inne języki, ma kilka podstawowych typów danych, które pozwalają mu rozumieć i przetwarzać różne rodzaje wartości: 💾\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eNumber (Liczby):\u003c/strong\u003e Ten typ służy do przechowywania zarówno liczb całkowitych (np. \u003ccode\u003e5\u003c/code\u003e, \u003ccode\u003e-100\u003c/code\u003e), jak i liczb zmiennoprzecinkowych (ułamkowych, np. \u003ccode\u003e3.14\u003c/code\u003e, \u003ccode\u003e0.5\u003c/code\u003e). W JavaScript nie ma rozróżnienia na liczby całkowite i zmiennoprzecinkowe - wszystkie są typu \u003ccode\u003eNumber\u003c/code\u003e.\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e calkowita = \u003cspan class=\\\"hljs-number\\\"\u003e123\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Liczba całkowita\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e zmiennoprzecinkowa = \u003cspan class=\\\"hljs-number\\\"\u003e3.14\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Liczba zmiennoprzecinkowa\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eString (Łańcuchy Znaków / Tekst):\u003c/strong\u003e Służy do przechowywania tekstu. Tekst w JavaScript zawsze musi być ujęty w cudzysłowy pojedyncze (\u003ccode\u003e'\u003c/code\u003e) lub podwójne (\u003ccode\u003e\\\"\u003c/code\u003e). 💬\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e imie = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Ala\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Łańcuch znaków w podwójnych cudzysłowach\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e wiadomosc = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Cześć, świecie!\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Łańcuch znaków w pojedynczych cudzysłowach\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBoolean (Wartości Logiczne):\u003c/strong\u003e Ten typ może przyjmować tylko dwie wartości: \u003ccode\u003etrue\u003c/code\u003e (prawda) lub \u003ccode\u003efalse\u003c/code\u003e (fałsz). Jest to niezwykle przydatne do podejmowania decyzji w kodzie (np. \\\"jeśli jest \u003ccode\u003etrue\u003c/code\u003e, zrób to, w przeciwnym razie zrób coś innego\\\"). ✅❌\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e czyPadaDeszcz = \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Wartość logiczna: prawda\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e czyJestWieczor = \u003cspan class=\\\"hljs-literal\\\"\u003efalse\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Wartość logiczna: fałsz\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eObject (Obiekty):\u003c/strong\u003e Obiekty to bardziej złożone struktury, które pozwalają grupować ze sobą powiązane dane. Możesz myśleć o nich jak o \\\"encyklopedii\\\", gdzie każda strona ma swoją nazwę (klucz) i treść (wartość). Obiekty będziemy omawiać szerzej w dalszej części kursu. 📚\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e osoba = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eimie\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Jan\\\"\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ewiek\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e30\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003emiasto\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Warszawa\\\"\u003c/span\u003e,\\n}; \u003cspan class=\\\"hljs-comment\\\"\u003e// Obiekt reprezentujący osobę\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eArray (Tablice):\u003c/strong\u003e Tablice to specjalny rodzaj obiektu, który służy do przechowywania uporządkowanej listy wartości. Możesz myśleć o nich jak o \\\"liście zakupów\\\" lub \\\"szeregu szuflad\\\", gdzie każda szuflada ma swój numer (indeks) i przechowuje jedną wartość. Tablice również omówimy szczegółowo później. 🛒\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e kolory = [\u003cspan class=\\\"hljs-string\\\"\u003e\\\"czerwony\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"niebieski\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"zielony\\\"\u003c/span\u003e]; \u003cspan class=\\\"hljs-comment\\\"\u003e// Tablica kolorów\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eUndefined:\u003c/strong\u003e Ten typ oznacza, że zmienna została zadeklarowana, ale \u003cstrong\u003enie przypisano jej jeszcze żadnej wartości\u003c/strong\u003e. JavaScript domyślnie przypisuje \u003ccode\u003eundefined\u003c/code\u003e nowym zmiennym. ❓\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e zmiennaBezWartosci;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(zmiennaBezWartosci); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: undefined\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eNull:\u003c/strong\u003e Ten typ oznacza celowy \u003cstrong\u003ebrak wartości\u003c/strong\u003e. Programista sam przypisuje \u003ccode\u003enull\u003c/code\u003e, aby wskazać, że dana zmienna (lub obiekt) nie przechowuje obecnie żadnej wartości. 🚫\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e brakDanych = \u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(brakDanych); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: null\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eZrozumienie tych podstawowych typów danych jest kluczowe, ponieważ będą one fundamentem wszystkich operacji, które będziesz wykonywać w JavaScript. 🔑\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"operatory-matematyka-i-logika-w-kodzie\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#operatory-matematyka-i-logika-w-kodzie\\\"\u003e\u003e\u003e\u003c/a\u003eOperatory: Matematyka i Logika w Kodzie\u003c/h2\u003e\\n\u003cp\u003eOperatory w JavaScript to specjalne symbole, które pozwalają nam wykonywać różne działania na danych. Możesz myśleć o nich jak o znakach matematycznych (\u003ccode\u003e+\u003c/code\u003e, \u003ccode\u003e-\u003c/code\u003e, \u003ccode\u003e*\u003c/code\u003e, \u003ccode\u003e/\u003c/code\u003e) lub symbolach logicznych, które pomagają porównywać wartości i podejmować decyzje. ➕➖✖️➗\u003c/p\u003e\\n\u003cp\u003ePodzielmy je na kilka głównych kategorii:\u003c/p\u003e\\n\u003ch3 id=\\\"operatory-arytmetyczne\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#operatory-arytmetyczne\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eOperatory Arytmetyczne\u003c/h3\u003e\\n\u003cp\u003eSłużą do wykonywania podstawowych operacji matematycznych: 셈\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e+\u003c/code\u003e (dodawanie)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e-\u003c/code\u003e (odejmowanie)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e*\u003c/code\u003e (mnożenie)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e/\u003c/code\u003e (dzielenie)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e%\u003c/code\u003e (reszta z dzielenia, czyli modulo - np. \u003ccode\u003e10 % 3\u003c/code\u003e da \u003ccode\u003e1\u003c/code\u003e, bo \u003ccode\u003e10\u003c/code\u003e podzielone przez \u003ccode\u003e3\u003c/code\u003e to \u003ccode\u003e3\u003c/code\u003e reszty \u003ccode\u003e1\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e**\u003c/code\u003e (potęgowanie - np. \u003ccode\u003e2 ** 3\u003c/code\u003e to \u003ccode\u003e8\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e++\u003c/code\u003e (inkrementacja - zwiększa wartość o 1, np. \u003ccode\u003ex++\u003c/code\u003e to \u003ccode\u003ex = x + 1\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e--\u003c/code\u003e (dekrementacja - zmniejsza wartość o 1, np. \u003ccode\u003ex--\u003c/code\u003e to \u003ccode\u003ex = x - 1\u003c/code\u003e)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e a = \u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e b = \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e suma = a + b; \u003cspan class=\\\"hljs-comment\\\"\u003e// 15\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e roznica = a - b; \u003cspan class=\\\"hljs-comment\\\"\u003e// 5\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e iloczyn = a * b; \u003cspan class=\\\"hljs-comment\\\"\u003e// 50\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e iloraz = a / b; \u003cspan class=\\\"hljs-comment\\\"\u003e// 2\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e reszta = a % b; \u003cspan class=\\\"hljs-comment\\\"\u003e// 0 (bo 10 dzieli się przez 5 bez reszty)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e potega = a ** \u003cspan class=\\\"hljs-number\\\"\u003e2\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// 100 (10 do potęgi 2)\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(suma, roznica, iloczyn, iloraz, reszta, potega);\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"operatory-porównania\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#operatory-porównania\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eOperatory Porównania\u003c/h3\u003e\\n\u003cp\u003eSłużą do porównywania dwóch wartości i zawsze zwracają wartość logiczną: \u003ccode\u003etrue\u003c/code\u003e (prawda) lub \u003ccode\u003efalse\u003c/code\u003e (fałsz). 🤔\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e==\u003c/code\u003e (równe wartości) - \u003cstrong\u003eporównuje tylko wartości\u003c/strong\u003e, ignorując typy danych.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e===\u003c/code\u003e (ściśle równe) - \u003cstrong\u003eporównuje zarówno wartości, jak i typy danych\u003c/strong\u003e. \u003cstrong\u003eZalecane do używania!\u003c/strong\u003e 👍\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e!=\u003c/code\u003e (różne wartości) - \u003cstrong\u003esprawdza, czy wartości są różne\u003c/strong\u003e, ignorując typy danych.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e!==\u003c/code\u003e (ściśle różne) - \u003cstrong\u003esprawdza, czy wartości lub typy danych są różne\u003c/strong\u003e. \u003cstrong\u003eZalecane do używania!\u003c/strong\u003e 👍\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e\u003e\u003c/code\u003e (większe niż)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e\u0026#x3C;\u003c/code\u003e (mniejsze niż)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e\u003e=\u003c/code\u003e (większe lub równe)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e\u0026#x3C;=\u003c/code\u003e (mniejsze lub równe)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e x = \u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e y = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"10\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// To jest tekst (String), a nie liczba (Number)\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(x == y); \u003cspan class=\\\"hljs-comment\\\"\u003e// true (bo wartość 10 jest taka sama, typ ignorowany)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(x === y); \u003cspan class=\\\"hljs-comment\\\"\u003e// false (bo wartości są takie same, ale typy są różne: Number vs String)\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(x != \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// true\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(x !== \u003cspan class=\\\"hljs-string\\\"\u003e\\\"10\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// true (bo mimo że wartości są takie same, typy są różne)\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(x \u003e \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// true\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(x \u0026#x3C;= \u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// true\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"operatory-logiczne\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#operatory-logiczne\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eOperatory Logiczne\u003c/h3\u003e\\n\u003cp\u003eSłużą do łączenia lub negowania warunków logicznych. 🧠\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e\u0026#x26;\u0026#x26;\u003c/code\u003e (AND / I) - Zwraca \u003ccode\u003etrue\u003c/code\u003e, jeśli \u003cstrong\u003eoba\u003c/strong\u003e warunki są prawdziwe.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e||\u003c/code\u003e (OR / LUB) - Zwraca \u003ccode\u003etrue\u003c/code\u003e, jeśli \u003cstrong\u003eprzynajmniej jeden\u003c/strong\u003e warunek jest prawdziwy.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e!\u003c/code\u003e (NOT / NIE) - Odwraca wartość logiczną (z \u003ccode\u003etrue\u003c/code\u003e na \u003ccode\u003efalse\u003c/code\u003e i z \u003ccode\u003efalse\u003c/code\u003e na \u003ccode\u003etrue\u003c/code\u003e).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e jestPelnoletni = \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e maPrawoJazdy = \u003cspan class=\\\"hljs-literal\\\"\u003efalse\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(jestPelnoletni \u0026#x26;\u0026#x26; maPrawoJazdy); \u003cspan class=\\\"hljs-comment\\\"\u003e// false (bo nie ma prawa jazdy)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(jestPelnoletni || maPrawoJazdy); \u003cspan class=\\\"hljs-comment\\\"\u003e// true (bo jest pełnoletni)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(!jestPelnoletni); \u003cspan class=\\\"hljs-comment\\\"\u003e// false (bo jest pełnoletni, a '!' to zaneguje)\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"operatory-przypisania\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#operatory-przypisania\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eOperatory Przypisania\u003c/h3\u003e\\n\u003cp\u003eSłużą do przypisywania wartości do zmiennych. ➡️\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e=\u003c/code\u003e (przypisanie wartości)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e+=\u003c/code\u003e (dodaj i przypisz, np. \u003ccode\u003ea += 5\u003c/code\u003e to to samo co \u003ccode\u003ea = a + 5\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e-=\u003c/code\u003e (odejmij i przypisz)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e*=\u003c/code\u003e (pomnóż i przypisz)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e/=\u003c/code\u003e (podziel i przypisz)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e%=\u003c/code\u003e (reszta z dzielenia i przypisz)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e punkty = \u003cspan class=\\\"hljs-number\\\"\u003e100\u003c/span\u003e;\\npunkty += \u003cspan class=\\\"hljs-number\\\"\u003e50\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// punkty = punkty + 50;  teraz punkty to 150\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(punkty); \u003cspan class=\\\"hljs-comment\\\"\u003e// 150\u003c/span\u003e\\n\\npunkty -= \u003cspan class=\\\"hljs-number\\\"\u003e20\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// punkty = punkty - 20;  teraz punkty to 130\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(punkty); \u003cspan class=\\\"hljs-comment\\\"\u003e// 130\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eZrozumienie operatorów jest fundamentalne, ponieważ będziesz ich używać niemal w każdym programie do wykonywania obliczeń, porównywania danych i sterowania logiką działania Twojej aplikacji. 🛠️\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"struktury-kontrolne-podejmowanie-decyzji-i-powtarzanie-zadań\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#struktury-kontrolne-podejmowanie-decyzji-i-powtarzanie-zadań\\\"\u003e\u003e\u003e\u003c/a\u003eStruktury Kontrolne: Podejmowanie Decyzji i Powtarzanie Zadań\u003c/h2\u003e\\n\u003cp\u003eStruktury kontrolne to jak \\\"drogowskazy\\\" w Twoim kodzie. Pozwalają one na podejmowanie decyzji (czy coś zrobić, czy nie) oraz na wielokrotne powtarzanie pewnych czynności. Bez nich programy byłyby bardzo liniowe i nudne. 🚦\u003c/p\u003e\\n\u003ch3 id=\\\"instrukcja-ifelse-rozgałęzianie-kodu\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#instrukcja-ifelse-rozgałęzianie-kodu\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eInstrukcja \u003ccode\u003eif\u003c/code\u003e/\u003ccode\u003eelse\u003c/code\u003e: Rozgałęzianie Kodu\u003c/h3\u003e\\n\u003cp\u003eInstrukcja \u003ccode\u003eif\u003c/code\u003e (jeśli) pozwala na wykonanie określonego bloku kodu \u003cstrong\u003etylko wtedy, gdy spełniony jest pewien warunek\u003c/strong\u003e. Jeśli warunek jest fałszywy, ten blok kodu jest pomijany.\\nMożesz również dodać instrukcję \u003ccode\u003eelse\u003c/code\u003e (w przeciwnym razie), aby określić, co ma się stać, gdy warunek w \u003ccode\u003eif\u003c/code\u003e nie jest spełniony.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003eif (warunek)\u003c/code\u003e: Wykonaj kod, jeśli \u003ccode\u003ewarunek\u003c/code\u003e jest prawdziwy.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eelse\u003c/code\u003e: Wykonaj ten kod, jeśli żaden z poprzedzających warunków \u003ccode\u003eif\u003c/code\u003e lub \u003ccode\u003eelse if\u003c/code\u003e nie był prawdziwy.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eelse if (innyWarunek)\u003c/code\u003e: Sprawdź kolejny warunek, jeśli poprzedni \u003ccode\u003eif\u003c/code\u003e (lub \u003ccode\u003eelse if\u003c/code\u003e) był fałszywy.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e temperatura = \u003cspan class=\\\"hljs-number\\\"\u003e25\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład prostego IF\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (temperatura \u003e \u003cspan class=\\\"hljs-number\\\"\u003e20\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Jest ciepło!\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Ten kod zostanie wykonany\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład IF-ELSE\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (temperatura \u0026#x3C; \u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Jest zimno.\\\"\u003c/span\u003e);\\n} \u003cspan class=\\\"hljs-keyword\\\"\u003eelse\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Nie jest zimno.\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Ten kod zostanie wykonany\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład IF-ELSE IF-ELSE (wiele warunków)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e godzina = \u003cspan class=\\\"hljs-number\\\"\u003e14\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (godzina \u0026#x3C; \u003cspan class=\\\"hljs-number\\\"\u003e12\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Dzień dobry!\\\"\u003c/span\u003e);\\n} \u003cspan class=\\\"hljs-keyword\\\"\u003eelse\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (godzina \u0026#x3C; \u003cspan class=\\\"hljs-number\\\"\u003e18\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Jeśli godzina NIE jest mniejsza niż 12, sprawdź, czy jest mniejsza niż 18\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Dzień dobry po południu!\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Ten kod zostanie wykonany\u003c/span\u003e\\n} \u003cspan class=\\\"hljs-keyword\\\"\u003eelse\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Jeśli żaden z powyższych warunków nie był spełniony\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Dobry wieczór!\\\"\u003c/span\u003e);\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eInstrukcje \u003ccode\u003eif\u003c/code\u003e są podstawą logicznych operacji w każdym programie. 🧠\u003c/p\u003e\\n\u003ch3 id=\\\"pętla-for-powtarzaj-od-liczby-do-liczby\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#pętla-for-powtarzaj-od-liczby-do-liczby\\\"\u003e\u003e\u003e\u003e\u003c/a\u003ePętla \u003ccode\u003efor\u003c/code\u003e: Powtarzaj od Liczby do Liczby\u003c/h3\u003e\\n\u003cp\u003ePętla \u003ccode\u003efor\u003c/code\u003e jest idealna, gdy wiesz, \u003cstrong\u003eile razy\u003c/strong\u003e chcesz powtórzyć jakąś czynność. Możesz jej użyć do iteracji (przechodzenia) przez elementy listy, wykonywania akcji określoną liczbę razy, itp. 🔄\u003c/p\u003e\\n\u003cp\u003eStruktura pętli \u003ccode\u003efor\u003c/code\u003e składa się z trzech części w nawiasach:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003eInicjalizacja:\u003c/strong\u003e Działa tylko raz na początku. Zazwyczaj deklarujesz tutaj zmienną licznika (np. \u003ccode\u003elet i = 0;\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWarunek:\u003c/strong\u003e Sprawdzany przed każdym wykonaniem pętli. Jeśli warunek jest \u003ccode\u003etrue\u003c/code\u003e, pętla się wykonuje. Jeśli \u003ccode\u003efalse\u003c/code\u003e, pętla się kończy. (np. \u003ccode\u003ei \u0026#x3C; 5;\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eKrok (Iteracja):\u003c/strong\u003e Wykonywany po każdym przejściu pętli. Zazwyczaj zwiększasz lub zmniejszasz licznik (np. \u003ccode\u003ei++;\u003c/code\u003e).\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład: Wypisz liczby od 0 do 4\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efor\u003c/span\u003e (\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e i = \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e; i \u0026#x3C; \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e; i++) {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(i); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze kolejno: 0, 1, 2, 3, 4\u003c/span\u003e\\n}\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/*\\nJak to działa?\\n1. i = 0 (inicjalizacja)\\n2. 0 \u0026#x3C; 5? Tak, więc wykonaj kod w nawiasach. Wypisz 0.\\n3. i++ (i staje się 1)\\n4. 1 \u0026#x3C; 5? Tak, wykonaj. Wypisz 1.\\n5. i++ (i staje się 2)\\n6. 2 \u0026#x3C; 5? Tak, wykonaj. Wypisz 2.\\n7. i++ (i staje się 3)\\n8. 3 \u0026#x3C; 5? Tak, wykonaj. Wypisz 3.\\n9. i++ (i staje się 4)\\n10. 4 \u0026#x3C; 5? Tak, wykonaj. Wypisz 4.\\n11. i++ (i staje się 5)\\n12. 5 \u0026#x3C; 5? Nie (fałsz), pętla się kończy.\\n*/\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"pętla-while-powtarzaj-dopóki-prawda\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#pętla-while-powtarzaj-dopóki-prawda\\\"\u003e\u003e\u003e\u003e\u003c/a\u003ePętla \u003ccode\u003ewhile\u003c/code\u003e: Powtarzaj, Dopóki Prawda\u003c/h3\u003e\\n\u003cp\u003ePętla \u003ccode\u003ewhile\u003c/code\u003e (dopóki) jest używana, gdy nie wiesz dokładnie, \u003cstrong\u003eile razy\u003c/strong\u003e pętla ma się wykonać, ale chcesz, aby wykonywała się tak długo, \u003cstrong\u003ejak długo dany warunek jest prawdziwy\u003c/strong\u003e. 🔁\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład: Wypisz liczby dopóki j jest mniejsze niż 5\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e j = \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Pamiętaj o inicjalizacji zmiennej licznika PRZED pętlą!\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003ewhile\u003c/span\u003e (j \u0026#x3C; \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Warunek jest sprawdzany na początku każdej iteracji\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(j);\\n  j++; \u003cspan class=\\\"hljs-comment\\\"\u003e// Ważne: musisz ręcznie zmienić wartość zmiennej, inaczej pętla będzie nieskończona! ❗\u003c/span\u003e\\n}\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/*\\nJak to działa?\\n1. j = 0\\n2. 0 \u0026#x3C; 5? Tak, wykonaj. Wypisz 0. j staje się 1.\\n3. 1 \u0026#x3C; 5? Tak, wykonaj. Wypisz 1. j staje się 2.\\n4. 2 \u0026#x3C; 5? Tak, wykonaj. Wypisz 2. j staje się 3.\\n5. 3 \u0026#x3C; 5? Tak, wykonaj. Wypisz 3. j staje się 4.\\n6. 4 \u0026#x3C; 5? Tak, wykonaj. Wypisz 4. j staje się 5.\\n7. 5 \u0026#x3C; 5? Nie (fałsz), pętla się kończy.\\n*/\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWażne:\u003c/strong\u003e Zawsze upewnij się, że w pętli \u003ccode\u003ewhile\u003c/code\u003e masz mechanizm, który ostatecznie sprawi, że warunek stanie się fałszywy, inaczej pętla będzie działać w nieskończoność (tzw. \\\"nieskończona pętla\\\"), co zablokuje Twój program! 🚨\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"funkcje-bloki-kodu-do-wielokrotnego-użycia\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#funkcje-bloki-kodu-do-wielokrotnego-użycia\\\"\u003e\u003e\u003e\u003c/a\u003eFunkcje: Bloki Kodu do Wielokrotnego Użycia\u003c/h2\u003e\\n\u003cp\u003eFunkcje to jeden z najważniejszych elementów w programowaniu. Możesz myśleć o nich jak o małych, niezależnych \\\"maszynkach\\\" lub \\\"przepisach\\\", które wykonują konkretne zadanie. Zamiast powielać ten sam kod wiele razy, możesz zamknąć go w funkcji i po prostu \\\"wywoływać\\\" tę funkcję, gdy jej potrzebujesz. ⚙️\u003c/p\u003e\\n\u003ch3 id=\\\"po-co-nam-funkcje\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#po-co-nam-funkcje\\\"\u003e\u003e\u003e\u003e\u003c/a\u003ePo co nam funkcje?\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eWielokrotne użycie kodu (reusability):\u003c/strong\u003e Napisz raz, używaj wiele razy. ♻️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eOrganizacja kodu:\u003c/strong\u003e Dzielenie dużego programu na mniejsze, zarządzalne fragmenty. 🧩\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eCzytelność:\u003c/strong\u003e Nazwy funkcji pomagają zrozumieć, co dany fragment kodu robi. 📖\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwość debugowania i modyfikacji:\u003c/strong\u003e Jeśli zmienisz coś w funkcji, zmiany te będą obowiązywać wszędzie tam, gdzie funkcja jest używana. 🐛\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch3 id=\\\"deklaracja-funkcji-klasyczny-sposób\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#deklaracja-funkcji-klasyczny-sposób\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eDeklaracja Funkcji: Klasyczny Sposób\u003c/h3\u003e\\n\u003cp\u003eNajpopularniejszy i najstarszy sposób deklarowania funkcji używa słowa kluczowego \u003ccode\u003efunction\u003c/code\u003e. 📜\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Deklaracja funkcji o nazwie 'powitaj'\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003epowitaj\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Kod wewnątrz funkcji, który zostanie wykonany, gdy funkcja zostanie wywołana\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Witaj w świecie JavaScript!\\\"\u003c/span\u003e);\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Wywołanie funkcji (sprawienie, aby się wykonała)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-title function_\\\"\u003epowitaj\u003c/span\u003e(); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: \\\"Witaj w świecie JavaScript!\\\"\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja z argumentami (parametrami)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Argumenty to wartości, które przekazujemy do funkcji, aby mogła na nich pracować.\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003edodajDwieLiczby\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eliczba1, liczba2\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e suma = liczba1 + liczba2;\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Suma wynosi: \\\"\u003c/span\u003e + suma);\\n}\\n\\n\u003cspan class=\\\"hljs-title function_\\\"\u003edodajDwieLiczby\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e7\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: \\\"Suma wynosi: 12\\\"\u003c/span\u003e\\n\u003cspan class=\\\"hljs-title function_\\\"\u003edodajDwieLiczby\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e20\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: \\\"Suma wynosi: 30\\\"\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja zwracająca wartość (return)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Słowo kluczowe 'return' pozwala funkcji \\\"oddać\\\" wynik swojej pracy.\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Dzięki temu możesz użyć wyniku funkcji w innych częściach kodu.\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003epomnoz\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003ea, b\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e a * b; \u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja zwraca iloczyn 'a' i 'b'\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e wynikMnozenia = \u003cspan class=\\\"hljs-title function_\\\"\u003epomnoz\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e4\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e6\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wynik funkcji (24) jest przypisywany do zmiennej\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(wynikMnozenia); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 24\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e koncowyWynik = \u003cspan class=\\\"hljs-title function_\\\"\u003epomnoz\u003c/span\u003e(wynikMnozenia, \u003cspan class=\\\"hljs-number\\\"\u003e2\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Możesz użyć wyniku funkcji jako argumentu dla innej\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(koncowyWynik); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 48\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"funkcje-strzałkowe-arrow-functions-nowoczesny-skrót\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#funkcje-strzałkowe-arrow-functions-nowoczesny-skrót\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eFunkcje Strzałkowe (Arrow Functions): Nowoczesny Skrót\u003c/h3\u003e\\n\u003cp\u003eFunkcje strzałkowe to nowszy, bardziej zwięzły sposób pisania funkcji w JavaScript, wprowadzony w ES6. Są szczególnie przydatne do krótkich, jednowierszowych funkcji. ➡️🏹\u003c/p\u003e\\n\u003cp\u003eIch składnia to: \u003ccode\u003e(parametry) =\u003e { ciało funkcji }\u003c/code\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład prostej funkcji strzałkowej\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eprzywitajSie\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) =\u003e {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Cześć!\\\"\u003c/span\u003e);\\n};\\n\u003cspan class=\\\"hljs-title function_\\\"\u003eprzywitajSie\u003c/span\u003e(); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: \\\"Cześć!\\\"\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja strzałkowa z parametrami\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eodejmij\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003ea, b\u003c/span\u003e) =\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e a - b;\\n};\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e roznica = \u003cspan class=\\\"hljs-title function_\\\"\u003eodejmij\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e15\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e8\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(roznica); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 7\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Skrócona wersja funkcji strzałkowej (jeśli funkcja zwraca tylko jedną wartość)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Gdy funkcja strzałkowa ma tylko jedną instrukcję, która jest instrukcją 'return',\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// możesz pominąć nawiasy klamrowe `{}` i słowo kluczowe `return`.\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003edodajSkrocona\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003ea, b\u003c/span\u003e) =\u003e a + b;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e sumaSkrocona = \u003cspan class=\\\"hljs-title function_\\\"\u003edodajSkrocona\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e2\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e3\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(sumaSkrocona); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 5\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja strzałkowa z jednym parametrem (nawiasy wokół parametru są opcjonalne)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003epodwoj\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003eliczba\u003c/span\u003e) =\u003e liczba * \u003cspan class=\\\"hljs-number\\\"\u003e2\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e podwojonaLiczba = \u003cspan class=\\\"hljs-title function_\\\"\u003epodwoj\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e7\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(podwojonaLiczba); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 14\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eFunkcje strzałkowe są bardzo popularne w nowoczesnym JavaScript i będziesz je często widzieć w przykładach kodu. Ważne jest, aby zrozumieć oba sposoby deklarowania funkcji, ponieważ spotkasz się z nimi w różnych projektach. 🎯\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"obiekty-skarbnice-powiązanych-informacji\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#obiekty-skarbnice-powiązanych-informacji\\\"\u003e\u003e\u003e\u003c/a\u003eObiekty: Skarbnice Powiązanych Informacji\u003c/h2\u003e\\n\u003cp\u003eObiekty w JavaScript to potężne narzędzie do grupowania powiązanych ze sobą danych i funkcji. Pomyśl o obiekcie jak o \u003cstrong\u003erzeczywistym przedmiocie lub koncepcji\u003c/strong\u003e, która ma swoje \u003cstrong\u003ewłaściwości\u003c/strong\u003e (cechy) i \u003cstrong\u003ezachowania\u003c/strong\u003e (co potrafi robić, czyli metody). 📦\u003c/p\u003e\\n\u003cp\u003eNa przykład, jeśli masz obiekt \u003ccode\u003esamochod\u003c/code\u003e, jego właściwościami mogą być \u003ccode\u003emarka\u003c/code\u003e, \u003ccode\u003emodel\u003c/code\u003e, \u003ccode\u003erokProdukcji\u003c/code\u003e, \u003ccode\u003ekolor\u003c/code\u003e, a zachowaniami (metodami) mogą być \u003ccode\u003euruchomSilnik()\u003c/code\u003e, \u003ccode\u003ezatrzymaj()\u003c/code\u003e, \u003ccode\u003ejedz()\u003c/code\u003e. 🚗\u003c/p\u003e\\n\u003cp\u003eW JavaScript obiekty tworzymy za pomocą nawiasów klamrowych \u003ccode\u003e{}\u003c/code\u003e. Wewnątrz nich definiujemy \u003cstrong\u003epary klucz-wartość\u003c/strong\u003e, gdzie:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eKlucz (lub nazwa właściwości):\u003c/strong\u003e Jest to unikalna nazwa, która opisuje daną informację (np. \u003ccode\u003eimie\u003c/code\u003e, \u003ccode\u003ewiek\u003c/code\u003e). Zazwyczaj jest to tekst (String).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWartość:\u003c/strong\u003e Jest to rzeczywista dana przypisana do klucza (np. \u003ccode\u003e\\\"Jan\\\"\u003c/code\u003e, \u003ccode\u003e30\u003c/code\u003e). Może to być dowolny typ danych: liczba, tekst, wartość logiczna, inna tablica, inny obiekt, a nawet funkcja!\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eJeśli wartość powiązana z kluczem jest funkcją, nazywamy ją \u003cstrong\u003emetodą\u003c/strong\u003e obiektu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Tworzenie obiektu 'osoba'\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e osoba = {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Właściwości (klucz: wartość)\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eimie\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Anna\\\"\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwisko\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Kowalska\\\"\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ewiek\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e28\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eczyStudent\u003c/span\u003e: \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ezainteresowania\u003c/span\u003e: [\u003cspan class=\\\"hljs-string\\\"\u003e\\\"czytanie\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"sport\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"gotowanie\\\"\u003c/span\u003e], \u003cspan class=\\\"hljs-comment\\\"\u003e// Wartością może być tablica!\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Metoda (klucz: funkcja) - opisująca zachowanie obiektu\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eprzedstawSie\u003c/span\u003e: \u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Używamy `this.imie` i `this.nazwisko`, aby odwołać się do właściwości TEGO obiektu\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e`Cześć, nazywam się \u003cspan class=\\\"hljs-subst\\\"\u003e${\u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.imie}\u003c/span\u003e \u003cspan class=\\\"hljs-subst\\\"\u003e${\u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.nazwisko}\u003c/span\u003e i mam \u003cspan class=\\\"hljs-subst\\\"\u003e${\u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.wiek}\u003c/span\u003e lat.`\u003c/span\u003e;\\n  },\\n\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Inna metoda, używająca funkcji strzałkowej\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eopiszZainteresowania\u003c/span\u003e: \u003cspan class=\\\"hljs-function\\\"\u003e() =\u003e\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Ważna uwaga: funkcje strzałkowe inaczej traktują 'this' w kontekście obiektów,\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// dlatego często do odwoływania się do właściwości obiektu w nich\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// używa się tradycyjnych funkcji lub bardziej zaawansowanych technik.\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Na tym etapie, dla prostoty, użyjemy bezpośredniego odwołania,\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// lub tradycyjnej funkcji jak w 'przedstawSie'.\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Dla klarowności na początku lepiej używać 'function() {}' jako metod.\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e`Moje zainteresowania to: \u003cspan class=\\\"hljs-subst\\\"\u003e${osoba.zainteresowania.join(\u003cspan class=\\\"hljs-string\\\"\u003e\\\", \\\"\u003c/span\u003e)}\u003c/span\u003e.`\u003c/span\u003e;\\n  },\\n};\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Dostęp do właściwości obiektu (dwa sposoby)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(osoba.\u003cspan class=\\\"hljs-property\\\"\u003eimie\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Notacja kropkowa (najczęściej używana) - Wypisze: Anna\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(osoba[\u003cspan class=\\\"hljs-string\\\"\u003e\\\"wiek\\\"\u003c/span\u003e]); \u003cspan class=\\\"hljs-comment\\\"\u003e// Notacja nawiasów kwadratowych (przydatna, gdy nazwa klucza jest w zmiennej) - Wypisze: 28\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Wywołanie metody obiektu\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(osoba.\u003cspan class=\\\"hljs-title function_\\\"\u003eprzedstawSie\u003c/span\u003e()); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: \\\"Cześć, nazywam się Anna Kowalska i mam 28 lat.\\\"\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(osoba.\u003cspan class=\\\"hljs-title function_\\\"\u003eopiszZainteresowania\u003c/span\u003e()); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: \\\"Moje zainteresowania to: czytanie, sport, gotowanie.\\\"\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Zmiana wartości właściwości\u003c/span\u003e\\nosoba.\u003cspan class=\\\"hljs-property\\\"\u003ewiek\u003c/span\u003e = \u003cspan class=\\\"hljs-number\\\"\u003e29\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(osoba.\u003cspan class=\\\"hljs-property\\\"\u003ewiek\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 29\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Dodawanie nowych właściwości\u003c/span\u003e\\nosoba.\u003cspan class=\\\"hljs-property\\\"\u003ezawod\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Programista\\\"\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(osoba.\u003cspan class=\\\"hljs-property\\\"\u003ezawod\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: Programista\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eObiekty są fundamentalnym elementem JavaScript i stanowią podstawę do tworzenia bardziej złożonych aplikacji i struktur danych. 🏗️\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"tablice-uporządkowane-listy-danych\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#tablice-uporządkowane-listy-danych\\\"\u003e\u003e\u003e\u003c/a\u003eTablice: Uporządkowane Listy Danych\u003c/h2\u003e\\n\u003cp\u003eTablice (\u003ccode\u003eArray\u003c/code\u003e) w JavaScript to specjalny rodzaj obiektu, który pozwala na przechowywanie \u003cstrong\u003euporządkowanej listy wartości\u003c/strong\u003e. Pomyśl o tablicy jak o długiej liście zakupów, gdzie każdy element ma swoje miejsce i możesz się do niego odwołać po numerze. 📝\u003c/p\u003e\\n\u003cp\u003eKażdy element w tablicy ma swój \u003cstrong\u003eindeks\u003c/strong\u003e, czyli numer pozycji. Ważne jest, aby pamiętać, że \u003cstrong\u003eindeksy w JavaScript zawsze zaczynają się od 0!\u003c/strong\u003e 🔢\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003ePierwszy element ma indeks \u003ccode\u003e0\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eDrugi element ma indeks \u003ccode\u003e1\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eTrzeci element ma indeks \u003ccode\u003e2\u003c/code\u003e, i tak dalej.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eTablice tworzymy za pomocą nawiasów kwadratowych \u003ccode\u003e[]\u003c/code\u003e.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Tworzenie prostej tablicy liczb\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e liczby = [\u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e20\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e30\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e40\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e50\u003c/span\u003e];\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Dostęp do elementów tablicy za pomocą indeksu\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby[\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e]); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 10 (pierwszy element)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby[\u003cspan class=\\\"hljs-number\\\"\u003e2\u003c/span\u003e]); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 30 (trzeci element)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby[\u003cspan class=\\\"hljs-number\\\"\u003e4\u003c/span\u003e]); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 50 (piąty element)\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Odczytanie długości tablicy (ile ma elementów) za pomocą właściwości `.length`\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby.\u003cspan class=\\\"hljs-property\\\"\u003elength\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 5\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Zmiana wartości elementu w tablicy\u003c/span\u003e\\nliczby[\u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e] = \u003cspan class=\\\"hljs-number\\\"\u003e25\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Zmieniamy drugi element (o indeksie 1) z 20 na 25\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: [10, 25, 30, 40, 50]\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Dodawanie elementów do tablicy\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// `push()`: dodaje element na końcu tablicy ➕\u003c/span\u003e\\nliczby.\u003cspan class=\\\"hljs-title function_\\\"\u003epush\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e60\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: [10, 25, 30, 40, 50, 60]\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// `unshift()`: dodaje element na początku tablicy ➡️\u003c/span\u003e\\nliczby.\u003cspan class=\\\"hljs-title function_\\\"\u003eunshift\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(liczby); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: [5, 10, 25, 30, 40, 50, 60]\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Usuwanie elementów z tablicy\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// `pop()`: usuwa ostatni element z tablicy i zwraca go 🗑️\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e usunietaLiczba = liczby.\u003cspan class=\\\"hljs-title function_\\\"\u003epop\u003c/span\u0 03cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Element na indeksie \u003cspan class=\\\"hljs-subst\\\"\u003e${i}\u003c/span\u003e: \u003cspan class=\\\"hljs-subst\\\"\u003e${liczby[i]}\u003c/span\u003e`\u003c/span\u003e);\\n}\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/*\\nWypisze:\\nElement na indeksie 0: 10\\nElement na indeksie 1: 25\\nElement na indeksie 2: 30\\nElement na indeksie 3: 40\\nElement na indeksie 4: 50\\n*/\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eTablice są niezwykle przydatne w JavaScript, ponieważ pozwalają na efektywne zarządzanie kolekcjami danych, co jest fundamentalne w większości aplikacji. 📊\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zadania-do-wykonania-sprawdź-swoje-umiejętności\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadania-do-wykonania-sprawdź-swoje-umiejętności\\\"\u003e\u003e\u003e\u003c/a\u003eZadania do Wykonania: Sprawdź Swoje Umiejętności!\u003c/h2\u003e\\n\u003cp\u003eTeraz, gdy poznałeś/aś podstawy JavaScript, czas na trochę praktyki! Pamiętaj, że nauka programowania to przede wszystkim pisanie kodu. Spróbuj samodzielnie rozwiązać poniższe zadania, zanim zajrzysz do rozwiązań. To najlepszy sposób, aby utrwalić wiedzę. Powodzenia! 🧑‍💻🌟\u003c/p\u003e\\n\u003ch3 id=\\\"zadanie-1-iloczyn-dwóch-liczb\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-1-iloczyn-dwóch-liczb\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 1: Iloczyn Dwóch Liczb\u003c/h3\u003e\\n\u003cp\u003eNapisz funkcję o nazwie \u003ccode\u003eobliczIloczyn\u003c/code\u003e, która przyjmuje \u003cstrong\u003edwie liczby\u003c/strong\u003e jako argumenty (parametry) i \u003cstrong\u003ezwraca\u003c/strong\u003e ich iloczyn (czyli wynik mnożenia). Następnie wywołaj tę funkcję z dowolnymi dwoma liczbami i wypisz wynik w konsoli.\u003c/p\u003e\\n\u003cdetails\u003e\\n\u003csummary\u003e\\n\u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n\u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 1\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eobliczIloczyn\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eliczbaA, liczbaB\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e liczbaA * liczbaB; \u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja zwraca iloczyn dwóch liczb\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykładowe użycie funkcji\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e wynikZadania1 = \u003cspan class=\\\"hljs-title function_\\\"\u003eobliczIloczyn\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e7\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e8\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Iloczyn liczb 7 i 8 wynosi: \u003cspan class=\\\"hljs-subst\\\"\u003e${wynikZadania1}\u003c/span\u003e`\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Oczekiwany wynik: 56\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e innyWynik = \u003cspan class=\\\"hljs-title function_\\\"\u003eobliczIloczyn\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e12\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e3\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e
