\u003c/code\u003e lub \u003ccode\u003efor...of\u003c/code\u003e do iteracji. 👋\u003c/p\u003e\\n\u003cdetails\u003e\\n\u003csummary\u003e\\n\u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n\u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-javascript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 4\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003ewyswietlImiona\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003elistaImion\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"--- Lista Powitań ---\\\"\u003c/span\u003e);\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003efor\u003c/span\u003e (\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e i = \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e; i \u0026#x3C; listaImion.\u003cspan class=\\\"hljs-property\\\"\u003elength\u003c/span\u003e; i++) {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Witaj, \u003cspan class=\\\"hljs-subst\\\"\u003e${listaImion[i]}\u003c/span\u003e!`\u003c/span\u003e);\\n  }\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"--- Koniec Listy ---\\\"\u003c/span\u003e);\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Alternatywnie, używając pętli for...of (nowocześniejsza i często czytelniejsza dla tablic)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/*\\nfunction wyswietlImiona(listaImion) {\\n  console.log(\\\"--- Lista Powitań ---\\\");\\n  for (const imie of listaImion) {\\n    console.log(`Witaj, ${imie}!`);\\n  }\\n  console.log(\\\"--- Koniec Listy ---\\\");\\n}\\n*/\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykładowe użycie funkcji\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e imiona = [\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Alicja\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Bartek\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Cezary\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Diana\\\"\u003c/span\u003e];\\n\u003cspan class=\\\"hljs-title function_\\\"\u003ewyswietlImiona\u003c/span\u003e(imiona);\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/*\\nOczekiwany wynik w konsoli:\\n--- Lista Powitań ---\\nWitaj, Alicja!\\nWitaj, Bartek!\\nWitaj, Cezary!\\nWitaj, Diana!\\n--- Koniec Listy ---\\n*/\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podsumowanie\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podsumowanie\\\"\u003e\u003e\u003e\u003c/a\u003ePodsumowanie\u003c/h2\u003e\\n\u003cp\u003eGratulacje! 🎉 Dotarłeś/aś do końca tego wprowadzenia do JavaScript! Nauczyłeś/aś się podstaw, które są fundamentem każdego dewelopera webowego:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eCzym jest JavaScript i dlaczego jest tak wszechstronny.\u003c/li\u003e\\n\u003cli\u003eJak deklarować i używać \u003cstrong\u003ezmiennych\u003c/strong\u003e (\u003ccode\u003evar\u003c/code\u003e, \u003ccode\u003elet\u003c/code\u003e, \u003ccode\u003econst\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003ePoznałeś/aś kluczowe \u003cstrong\u003etypy danych\u003c/strong\u003e (Number, String, Boolean, Object, Array, Undefined, Null).\u003c/li\u003e\\n\u003cli\u003eZrozumiałeś/aś działanie \u003cstrong\u003eoperatorów\u003c/strong\u003e (arytmetycznych, porównania, logicznych, przypisania).\u003c/li\u003e\\n\u003cli\u003eNauczyłeś/aś się sterować przepływem programu za pomocą \u003cstrong\u003estruktur kontrolnych\u003c/strong\u003e (\u003ccode\u003eif\u003c/code\u003e/\u003ccode\u003eelse\u003c/code\u003e, \u003ccode\u003efor\u003c/code\u003e, \u003ccode\u003ewhile\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eOpanowałeś/aś tworzenie i używanie \u003cstrong\u003efunkcji\u003c/strong\u003e (klasyczne i strzałkowe) do organizacji kodu.\u003c/li\u003e\\n\u003cli\u003ePoznałeś/aś, jak pracować z \u003cstrong\u003eobiektami\u003c/strong\u003e i \u003cstrong\u003etablicami\u003c/strong\u003e do przechowywania złożonych danych.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eTo solidny start! Pamiętaj, że nauka programowania to ciągły proces. Nie zniechęcaj się, jeśli coś sprawia Ci trudność. Kluczem jest konsekwencja, praktyka i nieustanne eksperymentowanie z kodem. Im więcej będziesz kodować, tym lepiej będziesz rozumieć i tym swobodniej będziesz się czuć z JavaScriptem. 💪\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eCo dalej?\u003c/strong\u003e\u003c/p\u003e\\n\u003cp\u003eTeraz, gdy masz mocne podstawy, możesz zagłębić się w bardziej zaawansowane tematy, takie jak:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eDOM Manipulation:\u003c/strong\u003e Jak JavaScript \\\"rozmawia\\\" ze stroną HTML, by zmieniać jej zawartość, style i strukturę. 🖼️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eEvent Handling:\u003c/strong\u003e Jak reagować na działania użytkownika (kliknięcia, ruchy myszy, wprowadzanie danych). 🖱️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eAsynchronous JavaScript:\u003c/strong\u003e Jak radzić sobie z operacjami, które trwają pewien czas (np. pobieranie danych z internetu). ⏳\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eES6+ Features:\u003c/strong\u003e Wiele nowszych funkcji JavaScriptu, które ułatwiają pisanie kodu. ✨\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eFrameworks i Biblioteki:\u003c/strong\u003e React, Angular, Vue.js - narzędzia, które przyspieszają i ułatwiają budowanie skomplikowanych aplikacji. 🏗️\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eNiech Twoja podróż z JavaScriptem będzie ekscytująca i pełna sukcesów! Jeśli masz jakieś pytania, śmiało pytaj! Happy coding! 🚀\u003c/p\u003e\",\"readingTime\",\"20 minut\",\"headings\",[85,96,100,104,124,140,156,160,164,184],{\"_86\":87,\"_88\":89,\"_83\":90,\"_95\":40},\"id\",\"czym-jest-javascript-i-dlaczego-jest-tak-ważny\",\"label\",\"Czym jest JavaScript i dlaczego jest tak ważny?\",[91],{\"_86\":92,\"_88\":93,\"_83\":94,\"_95\":59},\"gdzie-spotkasz-javascript\",\"Gdzie spotkasz JavaScript?\",[],\"level\",{\"_86\":97,\"_88\":98,\"_83\":99,\"_95\":40},\"zmienne-szafki-na-twoje-dane\",\"Zmienne: Szafki na Twoje Dane\",[],{\"_86\":101,\"_88\":102,\"_83\":103,\"_95\":40},\"typy-danych-co-javascript-potrafi-przechowywać\",\"Typy Danych: Co JavaScript potrafi przechowywać?\",[],{\"_86\":105,\"_88\":106,\"_83\":107,\"_95\":40},\"operatory-matematyka-i-logika-w-kodzie\",\"Operatory: Matematyka i Logika w Kodzie\",[108,112,116,120],{\"_86\":109,\"_88\":110,\"_83\":111,\"_95\":59},\"operatory-arytmetyczne\",\"Operatory Arytmetyczne\",[],{\"_86\":113,\"_88\":114,\"_83\":115,\"_95\":59},\"operatory-porównania\",\"Operatory Porównania\",[],{\"_86\":117,\"_88\":118,\"_83\":119,\"_95\":59},\"operatory-logiczne\",\"Operatory Logiczne\",[],{\"_86\":121,\"_88\":122,\"_83\":123,\"_95\":59},\"operatory-przypisania\",\"Operatory Przypisania\",[],{\"_86\":125,\"_88\":126,\"_83\":127,\"_95\":40},\"struktury-kontrolne-podejmowanie-decyzji-i-powtarzanie-zadań\",\"Struktury Kontrolne: Podejmowanie Decyzji i Powtarzanie Zadań\",[128,132,136],{\"_86\":129,\"_88\":130,\"_83\":131,\"_95\":59},\"instrukcja-ifelse-rozgałęzianie-kodu\",\"Instrukcja  if / else : Rozgałęzianie Kodu\",[],{\"_86\":133,\"_88\":134,\"_83\":135,\"_95\":59},\"pętla-for-powtarzaj-od-liczby-do-liczby\",\"Pętla
