span class=\\\"hljs-attr\\\"\u003ex\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ey\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n};\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emojPunkt\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003ePunkt2D\u003c/span\u003e = { \u003cspan class=\\\"hljs-attr\\\"\u003ex\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003ey\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e20\u003c/span\u003e };\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(mojPunkt); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: { x: 10, y: 20 }\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Alias dla funkcji\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003etype\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eFunkcjaMatematyczna\u003c/span\u003e = \u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003cspan class=\\\"hljs-attr\\\"\u003ea\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003eb\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e\u003c/span\u003e) =\u003e\u003c/span\u003e \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003edodawanie\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eFunkcjaMatematyczna\u003c/span\u003e = \u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003enum1, num2\u003c/span\u003e) =\u003e\u003c/span\u003e num1 + num2;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eodejmowanie\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eFunkcjaMatematyczna\u003c/span\u003e = \u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003enum1, num2\u003c/span\u003e) =\u003e\u003c/span\u003e num1 - num2;\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-title function_\\\"\u003edodawanie\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e3\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 8\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-title function_\\\"\u003eodejmowanie\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e10\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e4\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: 6\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eAliasy typów sprawiają, że Twój kod jest bardziej czytelny, łatwiejszy do refaktoryzacji i ogólnie przyjemniejszy w obsłudze. Kiedy widzisz \u003ccode\u003eID\u003c/code\u003e zamiast \u003ccode\u003estring | number\u003c/code\u003e, od razu wiesz, o co chodzi! ✨\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"jak-używać-typów-w-praktyce-codzienne-scenariusze\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#jak-używać-typów-w-praktyce-codzienne-scenariusze\\\"\u003e\u003e\u003e\u003c/a\u003eJak używać typów w praktyce? Codzienne Scenariusze\u003c/h2\u003e\\n\u003cp\u003eTeraz, gdy znasz podstawy składni, zobaczmy, jak możesz je wykorzystać w codziennej pracy programisty!\u003c/p\u003e\\n\u003ch3 id=\\\"funkcje-z-typami-zwracanymi-i-parametrami-opcjonalnymi\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#funkcje-z-typami-zwracanymi-i-parametrami-opcjonalnymi\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eFunkcje z typami zwracanymi i parametrami opcjonalnymi\u003c/h3\u003e\\n\u003cp\u003eCzęsto zdarza się, że funkcja może, ale nie musi, przyjąć pewien argument, albo że jeden z jej argumentów ma wartość domyślną. TypeScript świetnie sobie z tym radzi.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Parametr opcjonalny 'imie' - oznaczony znakiem '?'\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Wartość zwracana funkcji to 'string'\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003epowiedzCzesc\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003cspan class=\\\"hljs-attr\\\"\u003eimie\u003c/span\u003e?: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Operator '??' (nullish coalescing) to super sprawa!\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Jeśli 'imie' jest 'null' lub 'undefined', użyje \\\"nieznajomy\\\", w przeciwnym razie użyje 'imie'.\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e`Cześć, \u003cspan class=\\\"hljs-subst\\\"\u003e${imie ?? \u003cspan class=\\\"hljs-string\\\"\u003e\\\"nieznajomy\\\"\u003c/span\u003e}\u003c/span\u003e!`\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-title function_\\\"\u003epowiedzCzesc\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Ania\\\"\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: Cześć, Ania!\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-title function_\\\"\u003epowiedzCzesc\u003c/span\u003e()); \u003cspan class=\\\"hljs-comment\\\"\u003e// Wypisze: Cześć, nieznajomy!\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// console.log(powiedzCzesc(123)); // 🚨 Błąd: Argument of type 'number' is not assignable to parameter of type 'string | undefined'.\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"łączenie-kilku-typów-unie-typów-w-akcji\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#łączenie-kilku-typów-unie-typów-w-akcji\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eŁączenie kilku typów (Unie Typów w akcji!)\u003c/h3\u003e\\n\u003cp\u003eGdy masz dane, które mogą przyjmować różne, ale określone formy, unie typów są Twoim przyjacielem.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Typy reprezentujące różne role użytkownika\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003etype\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eAdmin\u003c/span\u003e = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003erola\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"admin\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Literalny typ string\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003epoziomUprawnien\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003epanelDostepu\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n};\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003etype\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUzytkownik\u003c/span\u003e = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003erola\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"user\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Literalny typ string\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwaUzytkownika\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eostatnieLogowanie\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eDate\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Używamy wbudowanego typu Date\u003c/span\u003e\\n};\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Typ 'OsobaNaPlatformie' może być ALBO Adminem, ALBO Uzytkownikiem\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003etype\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eOsobaNaPlatformie\u003c/span\u003e = \u003cspan class=\\\"hljs-title class_\\\"\u003eAdmin\u003c/span\u003e | \u003cspan class=\\\"hljs-title class_\\\"\u003eUzytkownik\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Tworzymy tablicę, która może zawierać obiekty obu typów\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003elistaOsob\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eOsobaNaPlatformie\u003c/span\u003e[] = [\\n  { \u003cspan class=\\\"hljs-attr\\\"\u003erola\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"admin\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003epoziomUprawnien\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003epanelDostepu\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"/admin/dashboard\\\"\u003c/span\u003e },\\n  {\\n    \u003cspan class=\\\"hljs-attr\\\"\u003erola\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"user\\\"\u003c/span\u003e,\\n    \u003cspan class=\\\"hljs-attr\\\"\u003enazwaUzytkownika\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"super_gracz\\\"\u003c/span\u003e,\\n    \u003cspan class=\\\"hljs-attr\\\"\u003eostatnieLogowanie\u003c/span\u003e: \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eDate\u003c/span\u003e(),\\n  },\\n  { \u003cspan class=\\\"hljs-attr\\\"\u003erola\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"admin\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003epoziomUprawnien\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003epanelDostepu\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"/admin/stats\\\"\u003c/span\u003e },\\n];\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Możemy iterować po liście i sprawdzić typ obiektu (tzw. \\\"type guarding\\\")\u003c/span\u003e\\nlistaOsob.\u003cspan class=\\\"hljs-title function_\\\"\u003eforEach\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eosoba\u003c/span\u003e) =\u003e\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (osoba.\u003cspan class=\\\"hljs-property\\\"\u003erola\u003c/span\u003e === \u003cspan class=\\\"hljs-string\\\"\u003e\\\"admin\\\"\u003c/span\u003e) {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// W tym bloku TypeScript wie, że 'osoba' to typ 'Admin'\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\\n      \u003cspan class=\\\"hljs-string\\\"\u003e`Administrator: \u003cspan class=\\\"hljs-subst\\\"\u003e${osoba.panelDostepu}\u003c/span\u003e (poziom: \u003cspan class=\\\"hljs-subst\\\"\u003e${osoba.poziomUprawnien}\u003c/span\u003e)`\u003c/span\u003e,\\n    );\\n  } \u003cspan class=\\\"hljs-keyword\\\"\u003eelse\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Tutaj TypeScript wie, że 'osoba' to typ 'Uzytkownik'\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\\n      \u003cspan class=\\\"hljs-string\\\"\u003e`Użytkownik: \u003cspan class=\\\"hljs-subst\\\"\u003e${\\n        osoba.nazwaUzytkownika\\n      }\u003c/span\u003e (logował się: \u003cspan class=\\\"hljs-subst\\\"\u003e${osoba.ostatnieLogowanie.toLocaleDateString()}\u003c/span\u003e)`\u003c/span\u003e,\\n    );\\n  }\\n});\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eTo podejście sprawia, że kod jest bardziej odporny na błędy i łatwiejszy do zrozumienia dla innych programistów (i dla Ciebie za kilka miesięcy! 😉).\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"narzędzia-i-integracje-twoi-pomocnicy-w-rozwoju\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#narzędzia-i-integracje-twoi-pomocnicy-w-rozwoju\\\"\u003e\u003e\u003e\u003c/a\u003eNarzędzia i Integracje: Twoi Pomocnicy w Rozwoju\u003c/h2\u003e\\n\u003cp\u003eTypeScript to nie tylko sam język, ale też cały ekosystem narzędzi, które ułatwiają życie programistom.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eVS Code (Visual Studio Code)\u003c/strong\u003e: To absolutny król wśród edytorów kodu dla TypeScripta! 👑 Jest stworzony przez Microsoft (tak jak TypeScript!) i ma wbudowane, doskonałe wsparcie dla typowania. Oznacza to, że dostajesz inteligentne podpowiedzi (IntelliSense), automatyczne uzupełnianie kodu, wykrywanie błędów na bieżąco, refaktoryzację, a wszystko to działa jak marzenie! Jeśli jeszcze nie używasz VS Code, to jest to moment, by spróbować.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etsconfig.json\u003c/code\u003e\u003c/strong\u003e: Już o nim mówiliśmy, ale warto podkreślić, że to serce konfiguracji Twojego projektu TypeScript. Dzięki niemu możesz precyzyjnie dostosować, jak kompilator ma przetwarzać Twój kod. To jak centrala sterowania! 🎛️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eIntegracja z narzędziami budującymi (Build Tools)\u003c/strong\u003e: TypeScript bez problemu integruje się z najpopularniejszymi narzędziami do budowania aplikacji, takimi jak:\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eWebpack\u003c/strong\u003e: Pakowanie modułów, transformacje kodu.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBabel\u003c/strong\u003e: Transpilacja (konwersja kodu na starsze wersje JS). Często używa się Babel razem z TypeScriptem, aby skorzystać z najnowszych funkcji JS, które TypeScript jeszcze nie w pełni obsługuje w kompilacji.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eESLint\u003c/strong\u003e: Narzędzie do statycznej analizy kodu, które pomaga utrzymać jego jakość i spójność (np. wymusza określony styl pisania).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eVite / Parcel\u003c/strong\u003e: Szybkie i nowoczesne bundlery, które mają wbudowane wsparcie dla TypeScripta.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSystemy CI/CD (Continuous Integration/Continuous Deployment)\u003c/strong\u003e: TypeScript świetnie wpisuje się w nowoczesne procesy wytwarzania oprogramowania. Łatwo zintegrujesz kompilację TypeScripta z pipeline’ami takimi jak GitHub Actions, GitLab CI czy Jenkins. Oznacza to, że Twoje typy będą sprawdzane automatycznie przy każdym wgraniu kodu, zanim trafi on na produkcję! 🤖\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eTypeScript jest domyślnym językiem dla wielu popularnych frameworków frontendowych, takich jak \u003cstrong\u003eAngular\u003c/strong\u003e. Coraz więcej projektów w \u003cstrong\u003eReact\u003c/strong\u003e i \u003cstrong\u003eVue\u003c/strong\u003e również przechodzi na TypeScript. To oznacza, że znajomość tego języka to \u003cstrong\u003eogromny plus\u003c/strong\u003e na rynku pracy! 📈\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"częste-pułapki-i-praktyczne-wskazówki-jak-unikać-problemów\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#częste-pułapki-i-praktyczne-wskazówki-jak-unikać-problemów\\\"\u003e\u003e\u003e\u003c/a\u003eCzęste Pułapki i Praktyczne Wskazówki: Jak Unikać Problemów?\u003c/h2\u003e\\n\u003cp\u003eNauka nowego języka (a w zasadzie \\\"rozszerzenia\\\" języka) zawsze wiąże się z pewnymi wyzwaniami. Oto kilka częstych pułapek i wskazówek, które pomogą Ci szybko stać się ninja TypeScripta! 🥷\u003c/p\u003e\\n\u003ch3 id=\\\"nie-musisz-typować-wszystkiego-od-razu\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#nie-musisz-typować-wszystkiego-od-razu\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eNie musisz typować wszystkiego od razu!\u003c/h3\u003e\\n\u003cp\u003eTo jest jedna z najważniejszych rad! Nie czuj presji, żeby od razu typować każdą zmienną, każdy parametr i każdą funkcję w swoim projekcie. Możesz zacząć od typowania kluczowych fragmentów kodu (np. interfejsów dla danych z API, typów dla skomplikowanych funkcji). Stopniowo rozszerzaj typowanie w miarę, jak czujesz się pewniej. Małe kroki to klucz do sukcesu! 🚶‍♀️\u003c/p\u003e\\n\u003ch3 id=\\\"stopniowa-migracja-powoli-ale-skutecznie\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#stopniowa-migracja-powoli-ale-skutecznie\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eStopniowa migracja: Powoli, ale skutecznie!\u003c/h3\u003e\\n\u003cp\u003eJeśli masz już duży projekt w JavaScript, nie musisz go przepisywać od nowa! Możesz migrować go na TypeScript krok po kroku. Po prostu zacznij zmieniać rozszerzenia plików z \u003ccode\u003e.js\u003c/code\u003e na \u003ccode\u003e.ts\u003c/code\u003e (lub \u003ccode\u003e.tsx\u003c/code\u003e dla Reacta). Kompilator TypeScripta potraktuje czysty JavaScript jako poprawny kod, a Ty będziesz mógł/mogła stopniowo dodawać typy i naprawiać błędy kompilatora. To jak renowacja, a nie budowa od podstaw! 🏡\u003c/p\u003e\\n\u003ch3 id=\\\"współpraca-z-bibliotekami-js-poznaj-types\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#współpraca-z-bibliotekami-js-poznaj-types\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eWspółpraca z bibliotekami JS: Poznaj \u003ccode\u003e@types/\u003c/code\u003e!\u003c/h3\u003e\\n\u003cp\u003eCo zrobić, jeśli używasz popularnej biblioteki JavaScript (np. Lodash, jQuery, Express), która nie jest napisana w TypeScript? Czy stracisz korzyści z typowania? Absolutnie nie! Istnieje specjalne repozytorium \u003cstrong\u003eDefinitelyTyped\u003c/strong\u003e, które zawiera pliki deklaracji typów (\u003ccode\u003e.d.ts\u003c/code\u003e) dla tysięcy bibliotek JavaScript.\u003c/p\u003e\\n\u003cp\u003eWystarczy zainstalować odpowiedni pakiet z typami (zazwyczaj zaczyna się od \u003ccode\u003e@types/\u003c/code\u003e):\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm install --save-dev @types/lodash\\nnpm install --save-dev @types/jquery\\nnpm install --save-dev @types/express\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003ePo zainstalowaniu takiego pakietu, Twój edytor kodu (np. VS Code) będzie magicznie rozumiał typy z tych bibliotek, dając Ci podpowiedzi i wyłapując błędy, tak jakby były napisane w TypeScript! 🧙‍♀️\u003c/p\u003e\\n\u003ch3 id=\\\"wyłączaj-sprawdzanie-niektórych-plików-dla-ekstremalnych-przypadków\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wyłączaj-sprawdzanie-niektórych-plików-dla-ekstremalnych-przypadków\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eWyłączaj sprawdzanie niektórych plików (dla ekstremalnych przypadków)\u003c/h3\u003e\\n\u003cp\u003eJeśli natrafisz na plik JavaScript, który jest absolutnym bałaganem i nie masz czasu go typować, a TypeScript ciągle krzyczy błędami, możesz go tymczasowo wyciszyć. Dodaj na górze pliku:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// @ts-nocheck\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eTo polecenie mówi kompilatorowi TypeScripta, żeby zignorował sprawdzanie typów w tym konkretnym pliku. Używaj tego oszczędnie, bo tracisz wtedy korzyści z typowania! To taka \\\"ostatnia deska ratunku\\\". 😉\u003c/p\u003e\\n\u003ch3 id=\\\"czytaj-błędy-kompilatora-to-twoi-nauczyciele\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czytaj-błędy-kompilatora-to-twoi-nauczyciele\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eCzytaj błędy kompilatora: To Twoi nauczyciele!\u003c/h3\u003e\\n\u003cp\u003eNa początku komunikaty o błędach z TypeScripta mogą wydawać się straszne. Pełno czerwonych podkreśleń i długich wiadomości. Ale prawda jest taka, że błędy TypeScripta są zazwyczaj \u003cstrong\u003ebardzo pomocne\u003c/strong\u003e! Dokładnie wskazują, gdzie jest problem i często sugerują, jak go naprawić.\u003c/p\u003e\\n\u003ch3 id=\\\"najczęstsze-błędy-i-jak-je-naprawić-nie-bój-się-czerwonych-podkreśleń\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#najczęstsze-błędy-i-jak-je-naprawić-nie-bój-się-czerwonych-podkreśleń\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eNajczęstsze błędy i jak je naprawić: Nie bój się czerwonych podkreśleń!\u003c/h3\u003e\\n\u003cp\u003ePoczątki bywają trudne, ale z każdym błędem uczysz się czegoś nowego! Oto kilka typowych błędów, które możesz napotkać, i jak sobie z nimi radzić:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eBłąd typowania: Typ X nie jest przypisywalny do typu Y.\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ewiek\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"dwadzieścia pięć\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// 🚨 Błąd: Type 'string' is not assignable to type 'number'.\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eNaprawa:\u003c/strong\u003e Upewnij się, że przypisujesz wartość odpowiedniego typu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ewiek\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e = \u003cspan class=\\\"hljs-number\\\"\u003e25\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Poprawnie!\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eBrak typu dla zwracanej wartości funkcji (albo niezgodność)\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003ezwrocTekst\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e42\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// 🚨 Błąd: Type 'number' is not assignable to type 'string'.\u003c/span\u003e\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eNaprawa:\u003c/strong\u003e Upewnij się, że funkcja zwraca wartość zgodną z zadeklarowanym typem zwracanym.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003ezwrocTekst\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"To jest tekst.\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Poprawnie!\u003c/span\u003e\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eBrakujące właściwości w interfejsie\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eProdukt\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwa\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ecena\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003edostepny\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emojProdukt\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eProdukt\u003c/span\u003e = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwa\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Książka\\\"\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ecena\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e50\u003c/span\u003e, \u003cspan class=\\\"hljs-comment\\\"\u003e// 🚨 Błąd: Property 'dostepny' is missing in type '{ nazwa: string; cena: number; }' but required in type 'Produkt'.\u003c/span\u003e\\n};\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eNaprawa:\u003c/strong\u003e Dodaj wszystkie wymagane właściwości z interfejsu (lub oznacz je jako opcjonalne w interfejsie \u003ccode\u003e?\u003c/code\u003e).\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emojProdukt\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eProdukt\u003c/span\u003e = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwa\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Książka\\\"\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ecena\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e50\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003edostepny\u003c/span\u003e: \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e, \u003cspan class=\\\"hljs-comment\\\"\u003e// Poprawnie!\u003c/span\u003e\\n};\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003ePróba użycia \u003ccode\u003enull\u003c/code\u003e lub \u003ccode\u003eundefined\u003c/code\u003e tam, gdzie nie powinno być\u003c/strong\u003e\\nW trybie \u003ccode\u003estrict: true\u003c/code\u003e (który jest bardzo zalecany!), TypeScript jest bardzo restrykcyjny, jeśli chodzi o \u003ccode\u003enull\u003c/code\u003e i \u003ccode\u003eundefined\u003c/code\u003e.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003enazwisko\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e = \u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// 🚨 Błąd: Type 'null' is not assignable to type 'string'.\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eNaprawa:\u003c/strong\u003e Jeśli zmienna może być \u003ccode\u003enull\u003c/code\u003e lub \u003ccode\u003eundefined\u003c/code\u003e, musisz to jawnie określić za pomocą unii typów:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003enazwisko\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e | \u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e = \u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Poprawnie!\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003ePamiętaj, że każdy błąd to szansa na naukę! Nie zniechęcaj się, analizuj komunikaty, a szybko zobaczysz, jak Twój kod staje się coraz bardziej solidny. 💪\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"typescript-w-projektach-open-source-i-pracy-zespołowej-graj-zespołowo\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#typescript-w-projektach-open-source-i-pracy-zespołowej-graj-zespołowo\\\"\u003e\u003e\u003e\u003c/a\u003eTypeScript w Projektach Open-Source i Pracy Zespołowej: Graj zespołowo!\u003c/h2\u003e\\n\u003cp\u003eTypeScript to prawdziwy game-changer, jeśli chodzi o pracę w zespole i duże projekty! 🕹️ Dlaczego?\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eUłatwia współpracę:\u003c/strong\u003e Kiedy wielu programistów pracuje nad tym samym kodem, typy są jak uniwersalny język. Każdy od razu wie, jakiego typu danych spodziewać się po funkcji czy obiekcie, bez potrzeby ciągłego dopytywania. To minimalizuje nieporozumienia i przyspiesza development! 🧑‍💻👩‍💻\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003ePoprawia czytelność i utrzymanie kodu:\u003c/strong\u003e W dużych bazach kodu, gdzie funkcje i moduły mają wiele zależności, typy pełnią rolę żywej dokumentacji. Zmiana czegoś w jednym miejscu? TypeScript od razu pokaże, gdzie indziej ta zmiana może mieć wpływ. To jak mieć mapę skarbów w gęstej dżungli kodu! 🗺️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eZwiększa pewność siebie podczas refaktoryzacji:\u003c/strong\u003e Refaktoryzacja (czyli restrukturyzacja kodu w celu poprawy jego czytelności i utrzymywalności, bez zmiany jego funkcjonalności) jest znacznie bezpieczniejsza z TypeScriptem. Jeśli zmienisz nazwę właściwości obiektu lub zmienisz typ zwracany przez funkcję, kompilator natychmiast wskaże wszystkie miejsca, które wymagają aktualizacji. Koniec z obawami, że coś się zepsuje po małej zmianie! 👷‍♀️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eStandard w Open-Source i Enterprise:\u003c/strong\u003e Jak już wspomniano, wiele gigantów technologicznych i popularnych bibliotek (Angular, React, Vue, NestJS, Express, VSCode, Deno) jest napisanych w TypeScript. Oznacza to, że jeśli chcesz wnieść wkład w projekty open-source lub pracować w dużej firmie, znajomość TypeScripta to praktycznie standard. Otwiera Ci to wiele drzwi! 🚪\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"gdzie-znaleźć-deklaracje-typów-do-bibliotek-js\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#gdzie-znaleźć-deklaracje-typów-do-bibliotek-js\\\"\u003e\u003e\u003e\u003c/a\u003eGdzie znaleźć deklaracje typów do bibliotek JS?\u003c/h2\u003e\\n\u003cp\u003eTo pytanie, które zadaje sobie każdy początkujący z TypeScriptem: \\\"Skoro używam biblioteki X napisanej w JavaScript, to czy tracę wszystkie zalety typowania?\\\" Na szczęście odpowiedź brzmi: \u003cstrong\u003eNIE!\u003c/strong\u003e 🎉\u003c/p\u003e\\n\u003cp\u003eDzięki społeczności TypeScripta i projektowi \u003cstrong\u003eDefinitelyTyped\u003c/strong\u003e, dla większości popularnych bibliotek JavaScript istnieją tzw. \u003cstrong\u003epliki deklaracji typów\u003c/strong\u003e. Są to pliki z rozszerzeniem \u003ccode\u003e.d.ts\u003c/code\u003e, które nie zawierają kodu wykonawczego, a jedynie opisują struktury typów (interfejsy, typy funkcji itp.) danej biblioteki.\u003c/p\u003e\\n\u003cp\u003eInstaluje się je bardzo prosto za pomocą npm, dodając przed nazwą biblioteki prefiks \u003ccode\u003e@types/\u003c/code\u003e. Przykłady:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eDla biblioteki \u003ccode\u003elodash\u003c/code\u003e:\u003c/strong\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm install --save-dev @types/lodash\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eDla biblioteki \u003ccode\u003ejquery\u003c/code\u003e:\u003c/strong\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm install --save-dev @types/jquery\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eDla frameworka \u003ccode\u003eexpress\u003c/code\u003e:\u003c/strong\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm install --save-dev @types/express\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003ePo zainstalowaniu odpowiedniego pakietu \u003ccode\u003e@types/\u003c/code\u003e, Twój edytor kodu (szczególnie VS Code!) zacznie \\\"rozumieć\\\" strukturę typów z tej biblioteki, dając Ci pełne wsparcie IntelliSense, podpowiedzi i wykrywanie błędów, tak jakby sama biblioteka była napisana w TypeScript! To jest po prostu magiczne! 🪄\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"gdzie-szukać-pomocy-nie-jesteś-sam\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#gdzie-szukać-pomocy-nie-jesteś-sam\\\"\u003e\u003e\u003e\u003c/a\u003eGdzie szukać pomocy? Nie jesteś sam!\u003c/h2\u003e\\n\u003cp\u003eNauka programowania, zwłaszcza tak rozbudowanego języka jak TypeScript, to długa podróż. Ale nie musisz iść nią samotnie! Społeczność TypeScripta jest ogromna i bardzo pomocna.\u003c/p\u003e\\n\u003cp\u003eOto miejsca, gdzie zawsze znajdziesz wsparcie:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eOficjalna Dokumentacja TypeScript:\u003c/strong\u003e To najlepsze miejsce, aby zacząć i pogłębić wiedzę. Dokumentacja jest świetnie napisana, pełna przykładów i regularnie aktualizowana.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"https://www.typescriptlang.org/docs/\\\"\u003eTypeScript: The starting point for learning TypeScript\u003c/a\u003e (anglojęzyczna, ale bardzo przystępna)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eTypeScript Playground Online:\u003c/strong\u003e To super narzędzie! Możesz w nim pisać kod TypeScript bezpośrednio w przeglądarce, zobaczyć, jak jest kompilowany do JavaScriptu i od razu sprawdzić błędy typów. Idealne do szybkich eksperymentów i testowania małych fragmentów kodu.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"https://www.typescriptlang.org/play\\\"\u003eTypeScript: TS Playground - An online editor for exploring TypeScript and JavaScript\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eStack Overflow:\u003c/strong\u003e To prawdziwa skarbnica wiedzy dla programistów! Jeśli masz konkretne pytanie lub natkniesz się na błąd, szanse są ogromne, że ktoś już miał podobny problem i rozwiązanie jest dostępne. Używaj tagu \u003ccode\u003e[typescript]\u003c/code\u003e w swoich pytaniach.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"https://stackoverflow.com/questions/tagged/typescript\\\"\u003eNewest 'typescript' Questions - Stack Overflow\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eSpołeczności na Discordzie i Forach:\u003c/strong\u003e Istnieje wiele aktywnych społeczności, gdzie możesz zadawać pytania i dyskutować z innymi deweloperami. Poszukaj serwerów Discord poświęconych JavaScriptowi, Node.js czy frontendowi - na pewno znajdziesz tam kanały poświęcone TypeScriptowi.\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eGitHub:\u003c/strong\u003e Przeglądaj projekty open-source napisane w TypeScript! To świetny sposób, aby zobaczyć, jak inni deweloperzy używają typów w praktyce i jakie wzorce stosują. Możesz też zadawać pytania w sekcji \\\"Issues\\\" danego projektu.\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003eKursy online i YouTube:\u003c/strong\u003e Mnóstwo darmowych i płatnych kursów, a także kanałów na YouTube, oferuje świetne samouczki dotyczące TypeScripta. Znajdź styl nauki, który najbardziej Ci odpowiada! 🎬\u003c/p\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003ePamiętaj, że każdy kiedyś zaczynał! Nie krępuj się zadawać pytań, nawet jeśli wydają Ci się proste. Wzajemna pomoc to podstawa silnej społeczności programistów. Działaj! 💪\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zadania-praktyczne-ćwicz-ćwicz-ćwicz\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadania-praktyczne-ćwicz-ćwicz-ćwicz\\\"\u003e\u003e\u003e\u003c/a\u003eZadania Praktyczne: Ćwicz, ćwicz, ćwicz!\u003c/h2\u003e\\n\u003cp\u003eTeoria to jedno, ale prawdziwa nauka dzieje się, gdy piszesz kod! Spróbuj samodzielnie rozwiązać poniższe zadania. Nie bój się popełniać błędów - to najlepszy sposób na naukę! Zanim zajrzysz do rozwiązań, spróbuj pogłówkować trochę sam/a. Powodzenia! 🍀\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-1-typowanie-zmiennych\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-1-typowanie-zmiennych\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 1: Typowanie zmiennych\u003c/h3\u003e\\n\u003cp\u003eZadeklaruj trzy zmienne z jawnym typowaniem:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003emojaLiczba\u003c/code\u003e typu \u003ccode\u003enumber\u003c/code\u003e i przypisz jej dowolną liczbę.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003emojTekst\u003c/code\u003e typu \u003ccode\u003estring\u003c/code\u003e i przypisz jej dowolny tekst.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eczyJestSlonce\u003c/code\u003e typu \u003ccode\u003eboolean\u003c/code\u003e i przypisz jej wartość logiczną.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cdetails\u003e\\n  \u003csummary\u003e\\n    \u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n  \u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 1\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emojaLiczba\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e = \u003cspan class=\\\"hljs-number\\\"\u003e77\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emojTekst\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"TypeScript jest super!\\\"\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eczyJestSlonce\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e = \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(mojaLiczba, mojTekst, czyJestSlonce);\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-2-funkcja-z-typowanymi-argumentami-i-wartością-zwracaną\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-2-funkcja-z-typowanymi-argumentami-i-wartością-zwracaną\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 2: Funkcja z typowanymi argumentami i wartością zwracaną\u003c/h3\u003e\\n\u003cp\u003eNapisz funkcję o nazwie \u003ccode\u003epomnozDwieLiczby\u003c/code\u003e, która:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003ePrzyjmuje dwa argumenty: \u003ccode\u003eparametr1\u003c/code\u003e i \u003ccode\u003eparametr2\u003c/code\u003e, oba typu \u003ccode\u003enumber\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eZwraca ich iloczyn (wynik mnożenia), który również powinien być typu \u003ccode\u003enumber\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eWywołaj tę funkcję i wypisz wynik w konsoli.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cdetails\u003e\\n  \u003csummary\u003e\\n    \u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n  \u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 2\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003epomnozDwieLiczby\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003cspan class=\\\"hljs-attr\\\"\u003eparametr1\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003eparametr2\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e parametr1 * parametr2;\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e wynikMnozenia = \u003cspan class=\\\"hljs-title function_\\\"\u003epomnozDwieLiczby\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e6\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e9\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Wynik mnożenia to: \u003cspan class=\\\"hljs-subst\\\"\u003e${wynikMnozenia}\u003c/span\u003e`\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Powinno wypisać: Wynik mnożenia to: 54\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-3-interfejs-i-obiekt-użytkownika\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-3-interfejs-i-obiekt-użytkownika\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 3: Interfejs i obiekt użytkownika\u003c/h3\u003e\\n\u003cp\u003eZdefiniuj interfejs \u003ccode\u003eUzytkownikProfil\u003c/code\u003e z następującymi polami:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003eid\u003c/code\u003e: typu \u003ccode\u003enumber\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003enazwa\u003c/code\u003e: typu \u003ccode\u003estring\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eemail\u003c/code\u003e: typu \u003ccode\u003estring\u003c/code\u003e (opcjonalny, użyj \u003ccode\u003e?\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eczyAktywny\u003c/code\u003e: typu \u003ccode\u003eboolean\u003c/code\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eNastępnie utwórz obiekt o nazwie \u003ccode\u003emojProfil\u003c/code\u003e typu \u003ccode\u003eUzytkownikProfil\u003c/code\u003e, który będzie miał wszystkie wymagane pola oraz jedno opcjonalne.\u003c/p\u003e\\n\u003cdetails\u003e\\n  \u003csummary\u003e\\n    \u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n  \u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 3\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUzytkownikProfil\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwa\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eemail\u003c/span\u003e?: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Opcjonalne pole\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eczyAktywny\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emojProfil\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eUzytkownikProfil\u003c/span\u003e = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1234\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003enazwa\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"programistaJunior\\\"\u003c/span\u003e,\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eemail\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"junior@example.com\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-comment\\\"\u003e// Możesz dodać, ale nie musisz\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eczyAktywny\u003c/span\u003e: \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e,\\n};\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(mojProfil);\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-4-alias-typu-i-unia-typów-dla-statusu\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-4-alias-typu-i-unia-typów-dla-statusu\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 4: Alias typu i unia typów dla statusu\u003c/h3\u003e\\n\u003cp\u003eZdefiniuj alias typu o nazwie \u003ccode\u003eStatusOperacji\u003c/code\u003e, który może przyjąć jedną z trzech wartości tekstowych: \u003ccode\u003e\\\"oczekujący\\\"\u003c/code\u003e, \u003ccode\u003e\\\"udany\\\"\u003c/code\u003e lub \u003ccode\u003e\\\"nieudany\\\"\u003c/code\u003e. Następnie zadeklaruj zmienną \u003ccode\u003ebiezacyStatus\u003c/code\u003e i przypisz jej jedną z tych wartości.\u003c/p\u003e\\n\u003cdetails\u003e\\n  \u003csummary\u003e\\n    \u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n  \u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 4\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003etype\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eStatusOperacji\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"oczekujący\\\"\u003c/span\u003e | \u003cspan class=\\\"hljs-string\\\"\u003e\\\"udany\\\"\u003c/span\u003e | \u003cspan class=\\\"hljs-string\\\"\u003e\\\"nieudany\\\"\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ebiezacyStatus\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eStatusOperacji\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"udany\\\"\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Aktualny status: \u003cspan class=\\\"hljs-subst\\\"\u003e${biezacyStatus}\u003c/span\u003e`\u003c/span\u003e);\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// biezacyStatus = \\\"w toku\\\"; // 🚨 Błąd! Typ '\\\"w toku\\\"' nie jest przypisywalny do typu 'StatusOperacji'.\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-5-klasa-z-dziedziczeniem-i-metodą\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-5-klasa-z-dziedziczeniem-i-metodą\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 5: Klasa z dziedziczeniem i metodą\u003c/h3\u003e\\n\u003cp\u003eStwórz klasę \u003ccode\u003ePojazd\u003c/code\u003e z polem \u003ccode\u003emarka\u003c/code\u003e (string) i metodą \u003ccode\u003ejedz()\u003c/code\u003e, która wypisuje komunikat \\\"Pojazd jedzie.\\\".\\nNastępnie utwórz klasę \u003ccode\u003eSamochod\u003c/code\u003e dziedziczącą po \u003ccode\u003ePojazd\u003c/code\u003e. W klasie \u003ccode\u003eSamochod\u003c/code\u003e dodaj pole \u003ccode\u003emodel\u003c/code\u003e (string) i nadpisz metodę \u003ccode\u003ejedz()\u003c/code\u003e, aby wypisywała np. \\\"Samochód [marka] [model] jedzie z piskiem opon!\\\".\\nUtwórz instancję klasy \u003ccode\u003eSamochod\u003c/code\u003e i wywołaj jej metodę \u003ccode\u003ejedz()\u003c/code\u003e.\u003c/p\u003e\\n\u003cdetails\u003e\\n  \u003csummary\u003e\\n    \u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n  \u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Rozwiązanie Zadania 5\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePojazd\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003econstructor\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003epublic\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003emarka\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e\u003c/span\u003e) {}\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003ejedz\u003c/span\u003e(): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Pojazd jedzie.\\\"\u003c/span\u003e);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eSamochod\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eextends\u003c/span\u003e \u003cspan class=\\\"hljs-
