anę algorytmu działania programu\",\"Budowanie złożonych obiektów krok po kroku\",\"Tworzenie jednej instancji klasy\",\"Strategy pozwala dynamicznie zmieniać algorytm działania programu.\",{\"_28\":64,\"_30\":65,\"_36\":67,\"_38\":68},\"\u003cp\u003eKtóry wzorzec stosujesz, by uprościć korzystanie z kilku skomplikowanych systemów przez jeden prosty interfejs?\u003c/p\u003e\",[45,66,46,44],\"Singleton\",0,\"Facade upraszcza złożone systemy przez prosty interfejs.\",\"slug\",\"wzorce-projektowe\",\"content\",\"\u003cp\u003ePoznaj praktyczne zastosowania najważniejszych \u003cstrong\u003ewzorców projektowych\u003c/strong\u003e - prosto, przystępnie, z przykładami w \u003cstrong\u003eTypeScript\u003c/strong\u003e oraz z zadaniami do samodzielnego wykonania! 🏗️🚀\u003c/p\u003e\\n\u003cp\u003eTen przewodnik to nie tylko teoria, ale również konkretne przykłady, wskazówki i gotowe rozwiązania do typowych problemów programistycznych, zarówno po stronie frontendu, jak i backendu.\u003c/p\u003e\\n\u003ch2 id=\\\"czym-są-wzorce-projektowe\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czym-są-wzorce-projektowe\\\"\u003e\u003e\u003e\u003c/a\u003eCzym są wzorce projektowe?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eWzorce projektowe\u003c/strong\u003e (Design Patterns) to sprawdzone, uniwersalne rozwiązania dla często spotykanych problemów w programowaniu. Możesz potraktować je jak gotowe \\\"przepisy\\\" - zamiast wymyślać wszystko od nowa, korzystasz z doświadczenia i najlepszych praktyk innych inżynierów oprogramowania. Są to abstrakcyjne koncepcje, które należy zaadaptować do konkretnego kontekstu problemu.\u003c/p\u003e\\n\u003ch3 id=\\\"dlaczego-warto-ich-używać\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#dlaczego-warto-ich-używać\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eDlaczego warto ich używać?\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e🤝 \u003cstrong\u003eUłatwiają komunikację w zespole:\u003c/strong\u003e Kiedy używasz nazwy wzorca, wszyscy w zespole rozumieją intencje i strukturę danego rozwiązania.\u003c/li\u003e\\n\u003cli\u003e🏗️ \u003cstrong\u003ePoprawiają strukturę, elastyczność i czytelność kodu:\u003c/strong\u003e Wzorce promują modułowość, separację odpowiedzialności i otwarte na rozbudowę, ale zamknięte na modyfikację rozwiązania.\u003c/li\u003e\\n\u003cli\u003e⚡ \u003cstrong\u003ePrzyspieszają projektowanie i rozwój systemów:\u003c/strong\u003e Nie musisz \\\"wynajdować koła na nowo\\\", możesz skupić się na unikalnych aspektach swojej aplikacji.\u003c/li\u003e\\n\u003cli\u003e🐞 \u003cstrong\u003ePozwalają unikać typowych błędów:\u003c/strong\u003e Wzorce projektowe to rozwiązania, które przetrwały próbę czasu i zostały zoptymalizowane pod kątem stabilności i efektywności.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"jak-je-dzielimy\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#jak-je-dzielimy\\\"\u003e\u003e\u003e\u003c/a\u003eJak je dzielimy?\u003c/h2\u003e\\n\u003cp\u003eWzorce projektowe są klasyfikowane na podstawie ich celu i problemu, który rozwiązują. Najpopularniejszy podział pochodzi z książki \\\"Design Patterns: Elements of Reusable Object-Oriented Software\\\" (tzw. Gang of Four - GoF):\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003eKreacyjne (Creational Patterns)\u003c/strong\u003e - dotyczą sposobów tworzenia obiektów, zapewniając elastyczność i kontrolę nad procesem instancjonowania. Przykłady: Singleton, Factory Method, Builder.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eStrukturalne (Structural Patterns)\u003c/strong\u003e - pokazują, jak łączyć obiekty i klasy w większe struktury, zachowując ich elastyczność i efektywność. Przykłady: Facade, Adapter.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBehawioralne (Behavioral Patterns)\u003c/strong\u003e - opisują interakcje i przepływ informacji między obiektami, ułatwiając komunikację i zarządzanie złożonym zachowaniem. Przykłady: Observer, Strategy.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003eKażda kategoria rozwiązuje inne typy problemów, dlatego tak ważne jest, by znać przynajmniej po jednym wzorcu z każdej grupy.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"wzorce-kreacyjne\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wzorce-kreacyjne\\\"\u003e\u003e\u003e\u003c/a\u003eWzorce kreacyjne\u003c/h2\u003e\\n\u003cp\u003eWzorce kreacyjne koncentrują się na procesie tworzenia obiektów. Pozwalają na dynamiczne i elastyczne tworzenie instancji, oddzielając logikę tworzenia od klienta, który ich używa.\u003c/p\u003e\\n\u003ch3 id=\\\"singleton\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#singleton\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eSingleton\u003c/h3\u003e\\n\u003cp\u003eWzorzec \u003cstrong\u003eSingleton\u003c/strong\u003e zapewnia, że dana klasa posiada tylko jedną instancję w całej aplikacji i jednocześnie dostarcza globalny punkt dostępu do tej instancji. Jest to użyteczne w sytuacjach, gdy tylko jeden obiekt danego typu powinien istnieć.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003estatic\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003einstance\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Statyczna zmienna przechowująca instancję\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003econstructor\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Prywatny konstruktor zapobiega tworzeniu nowych instancji z zewnątrz\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Logger instance created!\\\"\u003c/span\u003e);\\n  }\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003estatic\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003egetInstance\u003c/span\u003e(): \u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (!\u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003einstance\u003c/span\u003e) {\\n      \u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003einstance\u003c/span\u003e = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e();\\n    }\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eLogger\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003einstance\u003c/span\u003e;\\n  }\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003emessage\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hl span\u003e(\u003cspan class=\\\"hljs-variable language_\\\"\u003edocument\u003c/span\u003e);\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Użycie:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e legacyPrinter = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eOldLegacyPrinter\u003c/span\u003e();\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// printDocument(legacyPrinter, \\\"This will fail because interfaces don't match!\\\"); // Compile-time error\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e adapter = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePrinterAdapter\u003c/span\u003e(legacyPrinter);\\n\u003cspan class=\\\"hljs-title function_\\\"\u003eprintDocument\u003c/span\u003e(adapter, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Hello from the modern interface!\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Działa!\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eZastosowania:\u003c/strong\u003e Integracja z zewnętrznymi bibliotekami o innym API, dostosowywanie starszego kodu do nowych standardów, migracje systemów, tworzenie warstw kompatybilności.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"wzorce-behawioralne\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wzorce-behawioralne\\\"\u003e\u003e\u003e\u003c/a\u003eWzorce behawioralne\u003c/h2\u003e\\n\u003cp\u003eWzorce behawioralne zajmują się algorytmami i przypisywaniem odpowiedzialności między obiektami. Opisują sposoby komunikacji i interakcji między obiektami.\u003c/p\u003e\\n\u003ch3 id=\\\"observer\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#observer\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eObserver\u003c/h3\u003e\\n\u003cp\u003eWzorzec \u003cstrong\u003eObserver\u003c/strong\u003e (Obserwator) definiuje mechanizm subskrypcji, dzięki któremu obiekt (tzw. \u003ccode\u003eSubject\u003c/code\u003e lub \u003ccode\u003ePublisher\u003c/code\u003e) może powiadamiać wiele innych obiektów (tzw. \u003ccode\u003eObservers\u003c/code\u003e lub \u003ccode\u003eSubscribers\u003c/code\u003e) o wszelkich zmianach stanu, bez ścisłego powiązania między nimi. Jest to kluczowy wzorzec w programowaniu reaktywnym i sterowanym zdarzeniami.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Interfejs Obserwatora\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eObserver\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003eupdate\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003edata\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eany\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Klasa Podmiotu (Subject)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eEventPublisher\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eobservers\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eObserver\u003c/span\u003e[] = [];\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003eaddObserver\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003eobserver\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eObserver\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable ing\\\"\u003e\\\"Notifying observers with data:\\\"\u003c/span\u003e, data);\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003efor\u003c/span\u003e (\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e obs \u003cspan class=\\\"hljs-keyword\\\"\u003eof\u003c/span\u003e \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003eobservers\u003c/span\u003e) {\\n      obs.\u003cspan class=\\\"hljs-title function_\\\"\u003eupdate\u003c/span\u003e(data);\\n    }\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Konkretne klasy Obserwatorów\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eLoggerObserver\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eimplements\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eObserver\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003eupdate\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003edata\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eany\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`[Logger] Data received: \u003cspan class=\\\"hljs-subst\\\"\u003e${\u003cspan class=\\\"hljs-built_in\\\"\u003eJSON\u003c/span\u003e.stringify(data)}\u003c/span\u003e`\u003c/span\u003e);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eEmailSenderObserver\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eimplements\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eObserver\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003eupdate\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003edata\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eany\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`[EmailSender] Sending email about: \u003cspan class=\\\"hljs-subst\\\"\u003e${\u003cspan class=\\\"hljs-built_in\\\"\u003eJSON\u003c/span\u003e.stringify(data)}\u003c/span\u003e`\u003c/span\u003e);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Użycie:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e publisher = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eEventPublisher\u003c/span\u003e();\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e logger = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eLoggerObserver\u003c/span\u003e();\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e emailSender = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eEmailSenderObserver\u003c/span\u003e();\\n\\npublisher.\u003cspan class=\\\"hljs-title function_\\\"\u003eaddObserver\u003c/span\u003e(logger);\\npublisher.\u003cspan class=\\\"hljs-title function_\\\"\u003eaddObserver\u003c/span\u003e(emailSender);\\n\\npublisher.\u003cspan class=\\\"hljs-title function_\\\"\u003enotifyObservers\u003c/span\u003e({ \u003cspan class=\\\"hljs-attr\\\"\u003eevent\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"userLoggedIn\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e123\u003c/span\u003e });\\n\\npublisher.\u003cspan class=\\\"hljs-title function_\\\"\u003eremoveObserver\u003c/span\u003e(emailSender);\\npublisher.\u003cspan class=\\\"hljs-title function_\\\"\u003enotifyObservers\u003c/span\u003e({ \u003cspan class=\\\"hljs-attr\\\"\u003eevent\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"productAddedToCart\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003eproductId\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e456\u003c/span\u003e });\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eZastosowania:\u003c/strong\u003e Systemy notyfikacji (np. powiadomienia email, SMS), reactive programming (np. RxJS), architektury event-driven (mikroserwisy), widoki UI reagujące na zmiany modelu danych (np. w frameworkach MVVM).\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"strategy\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#strategy\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eStrategy\u003c/h3\u003e\\n\u003cp\u003eWzorzec \u003cstrong\u003eStrategy\u003c/strong\u003e (Strategia) pozwala definiować rodzinę algorytmów, umieszczać każdy z nich w osobnej klasie i sprawiać, że są one wymienne. Klient może wybrać algorytm w trakcie działania aplikacji, bez zmiany struktury kodu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Interfejs Strategii\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePaymentStrategy\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003epay\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003eamount\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Konkretne Strategie\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePayPalStrategy\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eimplements\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePaymentStrategy\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003epay\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003eamount\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Paying \u003cspan class=\\\"hljs-subst\\\"\u003e${amount}\u003c/span\u003e PLN using PayPal.`\u003c/span\u003e);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eCreditCardStrategy\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eimplements\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePaymentStrategy\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003epay\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003eamount\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Paying \u003cspan class=\\\"hljs-subst\\\"\u003e${amount}\u003c/span\u003e PLN using Credit Card.`\u003c/span\u003e);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eBankTransferStrategy\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eimplements\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePaymentStrategy\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003epay\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003eamount\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`Paying \u003cspan class=\\\"hljs-subst\\\"\u003e${amount}\u003c/span\u003e PLN using Bank Transfer.`\u003c/span\u003e);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Kontekst, który używa strategii\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eShoppingCart\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003epaymentStrategy\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003ePaymentStrategy\u003c/span\u003e;\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003esetPaymentStrategy\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003estrategy\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003ePaymentStrategy\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003epaymentStrategy\u003c/span\u003e = strategy;\\n  }\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003echeckout\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003eamount\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (!\u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003epaymentStrategy\u003c/span\u003e) {\\n      \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003eerror\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Payment strategy not set!\\\"\u003c/span\u003e);\\n      \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e;\\n    }\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e`nProcessing payment for \u003cspan class=\\\"hljs-subst\\\"\u003e${amount}\u003c/span\u003e PLN...`\u003c/span\u003e);\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003epaymentStrategy\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003epay\u003c/span\u003e(amount);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Użycie:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e cart = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eShoppingCart\u003c/span\u003e();\\n\\ncart.\u003cspan class=\\\"hljs-title function_\\\"\u003esetPaymentStrategy\u003c/span\u003e(\u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003ePayPalStrategy\u003c/span\u003e());\\ncart.\u003cspan class=\\\"hljs-title function_\\\"\u003echeckout\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e150\u003c/span\u003e);\\n\\ncart.\u003cspan class=\\\"hljs-title function_\\\"\u003esetPaymentStrategy\u003c/span\u003e(\u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eCreditCardStrategy\u003c/span\u003e());\\ncart.\u003cspan class=\\\"hljs-title function_\\\"\u003echeckout\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e200\u003c/span\u003e);\\n\\ncart.\u003cspan class=\\\"hljs-title function_\\\"\u003esetPaymentStrategy\u003c/span\u003e(\u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eBankTransferStrategy\u003c/span\u003e());\\ncart.\u003cspan class=\\\"hljs-title function_\\\"\u003echeckout\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e50\u003c/span\u003e);\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eZastosowania:\u003c/strong\u003e Algorytmy płatności, różne strategie walidacji danych, sortowania, eksportu danych, dynamiczna logika decyzyjna (np. AI), różne algorytmy kompresji plików.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zastosowania-wzorców-w-praktyce\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zastosowania-wzorców-w-praktyce\\\"\u003e\u003e\u003e\u003c/a\u003eZastosowania wzorców w praktyce\u003c/h2\u003e\\n\u003cp\u003eWzorce projektowe nie są tylko teorią, ale są wszechobecne w realnych aplikacjach i frameworkach:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eFrontend (React, Angular, Vue):\u003c/strong\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eObserver:\u003c/strong\u003e Wiele bibliotek do zarządzania stanem (np. Redux, NgRx, Vuex) opiera się na idei obserwatorów. React Hooks (\u003ccode\u003euseState\u003c/code\u003e, \u003ccode\u003euseEffect\u003c/code\u003e) również w pewnym sensie korzystają z mechanizmów reaktywności podobnych do Observera.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eStrategy:\u003c/strong\u003e Dynamiczny wybór komponentów do renderowania na podstawie stanu aplikacji, różne strategie parsowania danych wejściowych.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eFactory Method:\u003c/strong\u003e Tworzenie instancji komponentów lub widżetów w zależności od konfiguracji.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eFacade:\u003c/strong\u003e Warstwa usług, która upraszcza komunikację z API backendowym lub złożonymi bibliotekami JS.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBackend (Node.js, Java, .NET, Python):\u003c/strong\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eSingleton:\u003c/strong\u003e Połączenia do bazy danych, menedżery konfiguracji, globalne instancje logowania.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBuilder:\u003c/strong\u003e Generowanie złożonych zapytań SQL, budowanie odpowiedzi HTTP, tworzenie obiektów z wieloma opcjonalnymi polami.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eAdapter:\u003c/strong\u003e Integracja z zewnętrznymi API (np. płatności, dostawcy SMS), dostosowywanie danych z legacy systemów.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eStrategy:\u003c/strong\u003e Różne algorytmy uwierzytelniania, polityki buforowania, procesy biznesowe.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"przydatne-narzędzia-i-materiały\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#przydatne-narzędzia-i-materiały\\\"\u003e\u003e\u003e\u003c/a\u003ePrzydatne narzędzia i materiały\u003c/h2\u003e\\n\u003cp\u003eAby pogłębić swoją wiedzę i lepiej zrozumieć wzorce projektowe, polecam następujące zasoby:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ca href=\\\"https://refactoring.guru/pl/design-patterns\\\"\u003eRefactoring.guru - wzorce projektowe po polsku i angielsku\u003c/a\u003e\u003c/strong\u003e: Prawdopodobnie najlepsze źródło online z klarownymi opisami i przykładami kodu w wielu językach.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ca href=\\\"https://www.typescriptlang.org/play\\\"\u003eTypeScript Playground\u003c/a\u003e\u003c/strong\u003e: Idealne narzędzie do szybkiego testowania i eksperymentowania z przykładami kodu w TypeScript, bez potrzeby konfiguracji lokalnego środowiska.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ca href=\\\"https://pl.wikipedia.org/wiki/Wzorzec_projektowy\\\"\u003eWzorce projektowe - Wikipedia\u003c/a\u003e\u003c/strong\u003e: Dobre źródło do ogólnego przeglądu i definicji.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eKsiążka \\\"Wzorce projektowe. Elementy oprogramowania obiektowego\\\" - Gamma, Helm, Johnson, Vlissides (tzw. Gang of Four)\u003c/strong\u003e: Klasyka, która zapoczątkowała całą dyskusję o wzorcach. Obowiązkowa lektura dla każdego, kto chce dogłębnie zrozumieć temat.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zadania-do-wykonania\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadania-do-wykonania\\\"\u003e\u003e\u003e\u003c/a\u003eZadania do wykonania\u003c/h2\u003e\\n\u003cp\u003ePoniższe zadania pomogą Ci utrwalić wiedzę o wzorcach projektowych w praktyce. Spróbuj zaimplementować je w środowisku TypeScript, skupiając się na czystości kodu i poprawnym typowaniu.\u003c/p\u003e\\n\u003ch3 id=\\\"zadanie-1-singleton-w-praktyce\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-1-singleton-w-praktyce\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 1: Singleton w praktyce\u003c/h3\u003e\\n\u003cp\u003eZaimplementuj klasę \u003ccode\u003eConfigurationManager\u003c/code\u003e, która realizuje wzorzec Singleton i umożliwia przechowywanie oraz pobieranie globalnych ustawień aplikacji. Upewnij się, że niezależnie od liczby wywołań \u003ccode\u003egetInstance()\u003c/code\u003e, zawsze używana jest ta sama instancja menedżera konfiguracji.\u003c/p\u003e\\n\u003cdetails\u003e\\n\u003csummary\u003e\\n\u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n\u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003estatic\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003einstance\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003esettings\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eMap\u003c/span\u003e\u0026#x3C;\u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e, \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e\u003e = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eMap\u003c/span\u003e();\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003econstructor\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Initialize default settings or load from a file\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003esettings\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003eset\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"apiUrl\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"https://api.example.com\\\"\u003c/span\u003e);\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003esettings\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003eset\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"timeout\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"5000\\\"\u003c/span\u003e);\\n  }\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003estatic\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003egetInstance\u003c/span\u003e(): \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (!\u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003einstance\u003c/span\u003e) {\\n      \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003einstance\u003c/span\u003e = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e();\\n    }\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003einstance\u003c/span\u003e;\\n  }\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetSetting\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003ekey\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e | \u003cspan class=\\\"hljs-literal\\\"\u003eundefined\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003esettings\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003eget\u003c/span\u003e(key);\\n  }\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003esetSetting\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003ekey\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003evalue\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003evoid\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003esettings\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003eset\u003c/span\u003e(key, value);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Usage:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e config1 = \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetInstance\u003c/span\u003e();\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(config1.\u003cspan class=\\\"hljs-title function_\\\"\u003egetSetting\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"apiUrl\\\"\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// https://api.example.com\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e config2 = \u003cspan class=\\\"hljs-title class_\\\"\u003eConfigurationManager\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetInstance\u003c/span\u003e();\\nconfig2.\u003cspan class=\\\"hljs-title function_\\\"\u003esetSetting\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"timeout\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"10000\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Change setting via second instance\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(config1.\u003cspan class=\\\"hljs-title function_\\\"\u003egetSetting\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"timeout\\\"\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// 10000 (shows they are the same instance)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(config1 === config2); \u003cspan class=\\\"hljs-comment\\\"\u003e// true\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-2-factory-dla-przycisków\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-2-factory-dla-przycisków\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 2: Factory dla przycisków\u003c/h3\u003e\\n\u003cp\u003eZaimplementuj prostą fabrykę (Factory Method), która w zależności od przekazanego typu (\u003ccode\u003e\\\"primary\\\"\u003c/code\u003e lub \u003ccode\u003e\\\"secondary\\\"\u003c/code\u003e) zwróci obiekt reprezentujący przycisk z różnymi stylami (np. kolor tła, kolor tekstu). Zdefiniuj wspólny interfejs \u003ccode\u003eIButton\u003c/code\u003e dla wszystkich typów przycisków.\u003c/p\u003e\\n\u003cdetails\u003e\\n\u003csummary\u003e\\n\u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n\u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eIButton\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003erender\u003c/span\u003e(): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-title fu
