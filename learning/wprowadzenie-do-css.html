a-klasy\",\"*nazwa-klasy\",2,\"Selektor klasy zapisujemy z kropką, np. .header.\",{\"_28\":58,\"_30\":59,\"_36\":64,\"_38\":65},\"\u003cp\u003eJak ustawić kolor tła elementu na żółty?\u003c/p\u003e\",[60,61,62,63],\"background-color: yellow;\",\"border-color: yellow;\",\"color: yellow;\",\"background: yellow-text;\",0,\"Do ustawienia koloru tła służy background-color.\",{\"_28\":67,\"_30\":68,\"_36\":37,\"_38\":73},\"\u003cp\u003eZa co odpowiada właściwość 'border-radius'?\u003c/p\u003e\",[69,70,71,72],\"Ustawienie tła obrazkowego\",\"Zaokrąglenie rogów elementu\",\"Zmiana rozmiaru czcionki\",\"Zmiana koloru ramki\",\"border-radius pozwala na zaokrąglenie rogów elementu.\",\"slug\",\"wprowadzenie-do-css\",\"content\",\"\u003cp\u003eWitaj w świecie \u003cstrong\u003eCSS\u003c/strong\u003e! 🎨 Jeśli HTML to szkielet Twojej strony, to CSS jest niczym jej garderoba - nadaje jej styl, kolory, układ i całą estetykę. Bez CSS strony internetowe byłyby po prostu nagim tekstem bez żadnej wizualnej atrakcyjności. Ten przewodnik wprowadzi Cię w podstawy CSS, pokazując, jak sprawić, by Twoje strony wyglądały profesjonalnie i były przyjemne dla oka. Gotowy/a, by nadać styl swoim kreacjom webowym? Zaczynamy! 🖌️\u003c/p\u003e\\n\u003ch2 id=\\\"czym-jest-css-i-dlaczego-jest-tak-ważny\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czym-jest-css-i-dlaczego-jest-tak-ważny\\\"\u003e\u003e\u003e\u003c/a\u003eCzym jest CSS i dlaczego jest tak ważny?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eCSS\u003c/strong\u003e to skrót od \u003cstrong\u003eCascading Style Sheets\u003c/strong\u003e, co po polsku oznacza \u003cstrong\u003eKaskadowe Arkusze Stylów\u003c/strong\u003e. Jest to język, który daje Ci pełną kontrolę nad \u003cstrong\u003ewyglądem i formatowaniem\u003c/strong\u003e dokumentów HTML. Pomyśl o tym w ten sposób:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eHTML\u003c/strong\u003e (HyperText Markup Language) to \u003cstrong\u003estruktura\u003c/strong\u003e i \u003cstrong\u003etreść\u003c/strong\u003e strony. Określa, co jest nagłówkiem, co akapitem, gdzie jest obrazek. To jak plan architektoniczny domu z opisem, gdzie są ściany i okna.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eCSS\u003c/strong\u003e to \u003cstrong\u003estyl i dekoracja\u003c/strong\u003e. To on decyduje o kolorze ścian, rodzaju mebli, zasłonach, a nawet o tym, jak przestrzeń jest zagospodarowana.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eGłówna idea CSS to \u003cstrong\u003eoddzielenie treści od prezentacji\u003c/strong\u003e. Zamiast umieszczać informacje o kolorze tekstu czy rozmiarze czcionki bezpośrednio w kodzie HTML (co jest nieefektywne i utrudnia zmiany), umieszczasz je w osobnym pliku CSS. Dzięki temu:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwość zmian:\u003c/strong\u003e Chcesz zmienić kolor wszystkich nagłówków \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e na swojej stronie? Wystarczy jedna zmiana w pliku CSS, zamiast przeszukiwania każdego \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e w HTML.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSpójność:\u003c/strong\u003e Wszystkie elementy o tym samym stylu wyglądają identycznie, zapewniając profesjonalny i ujednolicony wygląd.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSzybsze ładowanie:\u003c/strong\u003e Przeglądarka może raz pobrać plik CSS i używać go na wielu podstronach, co przyspiesza ładowanie witryny.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eResponsywność:\u003c/strong\u003e CSS jest kluczowy do tworzenia stron, które wyglądają dobrze na różnych urządzeniach (komputery, tablety, smartfony).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003ePodsumowując, CSS jest niezbędny, jeśli chcesz, aby Twoja strona internetowa była nie tylko funkcjonalna, ale też estetyczna i przyjemna w odbiorze.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"jak-działa-css-deklaracje-i-reguły\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#jak-działa-css-deklaracje-i-reguły\\\"\u003e\u003e\u003e\u003c/a\u003eJak działa CSS? Deklaracje i reguły\u003c/h2\u003e\\n\u003cp\u003eCSS działa na zasadzie \u003cstrong\u003ereguł stylowania\u003c/strong\u003e, które składają się z dwóch głównych części:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003eSelektor\u003c/strong\u003e: Wskazuje, który element (lub elementy) HTML ma zostać ostylowany. To jak \\\"adres\\\", pod który wysyłasz instrukcje.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBlok deklaracji\u003c/strong\u003e: Zawiera jedną lub więcej \u003cstrong\u003edeklaracji\u003c/strong\u003e, które określają, jak element ma wyglądać. Każda deklaracja składa się z \u003cstrong\u003ewłaściwości\u003c/strong\u003e i jej \u003cstrong\u003ewartości\u003c/strong\u003e, oddzielonych dwukropkiem, a zakończona średnikiem.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład reguły CSS:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-selector-tag\\\"\u003ep\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e/* Selektor - wybiera wszystkie elementy \u0026#x3C;p\u003e */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: blue; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Deklaracja: właściwość 'color', wartość 'blue' */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003efont-size\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e16px\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Deklaracja: właściwość 'font-size', wartość '16px' */\u003c/span\u003e\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eW tym przykładzie:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003ep\u003c/code\u003e to \u003cstrong\u003eselektor\u003c/strong\u003e, który wybierze wszystkie akapity (\u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e) w Twoim dokumencie HTML.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e{ ... }\u003c/code\u003e to \u003cstrong\u003eblok deklaracji\u003c/strong\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003ecolor: blue;\u003c/code\u003e to jedna \u003cstrong\u003edeklaracja\u003c/strong\u003e. \u003ccode\u003ecolor\u003c/code\u003e to \u003cstrong\u003ewłaściwość\u003c/strong\u003e (określa kolor tekstu), a \u003ccode\u003eblue\u003c/code\u003e to jej \u003cstrong\u003ewartość\u003c/strong\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003efont-size: 16px;\u003c/code\u003e to kolejna \u003cstrong\u003edeklaracja\u003c/strong\u003e. \u003ccode\u003efont-size\u003c/code\u003e to właściwość (rozmiar czcionki), a \u003ccode\u003e16px\u003c/code\u003e to jej wartość.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eKiedy przeglądarka napotka taką regułę, zastosuje podane style do wszystkich pasujących elementów HTML.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"sposoby-załączania-css-do-html---gdzie-umieścić-style\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#sposoby-załączania-css-do-html---gdzie-umieścić-style\\\"\u003e\u003e\u003e\u003c/a\u003eSposoby załączania CSS do HTML - gdzie umieścić style?\u003c/h2\u003e\\n\u003cp\u003eIstnieją trzy główne sposoby na połączenie stylów CSS z dokumentem HTML. Każdy z nich ma swoje zastosowanie i zalety.\u003c/p\u003e\\n\u003ch3 id=\\\"inline-css-style-w-linii\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#inline-css-style-w-linii\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eInline CSS (style w linii)\u003c/h3\u003e\\n\u003cp\u003eTo najprostszy, ale \u003cstrong\u003enajmniej zalecany\u003c/strong\u003e sposób. Polega na umieszczeniu stylów bezpośrednio w atrybucie \u003ccode\u003estyle\u003c/code\u003e konkretnego elementu HTML.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eKiedy używać?\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eDo \u003cstrong\u003ebardzo prostych, pojedynczych\u003c/strong\u003e zmian, które dotyczą tylko jednego elementu i nigdy się nie powtórzą.\u003c/li\u003e\\n\u003cli\u003eDo szybkiego testowania.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eUnikaj w większości przypadków\u003c/strong\u003e, ponieważ miesza HTML z CSS, utrudnia zarządzanie stylami i sprawia, że kod jest nieczytelny.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e\u0026#x3C;!DOCTYPE \u003cspan class=\\\"hljs-keyword\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003elang\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"pl\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003echarset\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"UTF-8\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"viewport\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003econtent\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"width=device-width, initial-scale=1.0\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003eInline CSS\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003estyle\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"color: blue; font-family: Arial;\\\"\u003c/span\u003e\u003e\u003c/span\u003eWitaj, świecie!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003estyle\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"background-color: lightgray;\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n      To jest akapit ze stylami inline.\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"internal-css-style-wewnętrzne\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#internal-css-style-wewnętrzne\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eInternal CSS (style wewnętrzne)\u003c/h3\u003e\\n\u003cp\u003ePolega na umieszczeniu wszystkich reguł CSS w sekcji \u003ccode\u003e\u0026#x3C;head\u003e\u003c/code\u003e dokumentu HTML, wewnątrz tagu \u003ccode\u003e\u0026#x3C;style\u003e\u003c/code\u003e.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eKiedy używać?\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eDla \u003cstrong\u003emałych stron internetowych\u003c/strong\u003e lub pojedynczych plików HTML, które nie będą rozwijane.\u003c/li\u003e\\n\u003cli\u003eDla prototypów lub demo, gdzie wszystkie style są potrzebne tylko w jednym miejscu.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eUnikaj w dużych projektach\u003c/strong\u003e, bo jeśli masz wiele stron, musisz kopiować i utrzymywać te same style w każdym pliku HTML.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e\u0026#x3C;!DOCTYPE \u003cspan class=\\\"hljs-keyword\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003elang\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"pl\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003echarset\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"UTF-8\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"viewport\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003econtent\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"width=device-width, initial-scale=1.0\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003eInternal CSS\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003estyle\u003c/span\u003e\u003e\u003c/span\u003e\u003cspan class=\\\"css\\\"\u003e\\n      \u003cspan class=\\\"hljs-comment\\\"\u003e/* Tutaj umieszczamy reguły CSS */\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-selector-tag\\\"\u003ebody\u003c/span\u003e {\\n        \u003cspan class=\\\"hljs-attribute\\\"\u003efont-family\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Segoe UI\\\"\u003c/span\u003e, Tahoma, Geneva, Verdana, sans-serif;\\n        \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#f4f4f4\u003c/span\u003e;\\n      }\\n\\n      \u003cspan class=\\\"hljs-selector-tag\\\"\u003eh1\u003c/span\u003e {\\n        \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: darkorange;\\n        \u003cspan class=\\\"hljs-attribute\\\"\u003etext-align\u003c/span\u003e: center;\\n      }\\n\\n      \u003cspan class=\\\"hljs-selector-tag\\\"\u003ep\u003c/span\u003e {\\n        \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#333\u003c/span\u003e;\\n        \u003cspan class=\\\"hljs-attribute\\\"\u003eline-height\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1.6\u003c/span\u003e;\\n      }\\n    \u003c/span\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003estyle\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eMoja strona z Internal CSS\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      Ten akapit jest ostylowany za pomocą wewnętrznych stylów. Cała strona ma\\n      też ustawioną czcionkę i tło.\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"external-css-zewnętrzny-arkusz-stylów\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#external-css-zewnętrzny-arkusz-stylów\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eExternal CSS (zewnętrzny arkusz stylów)\u003c/h3\u003e\\n\u003cp\u003eTo \u003cstrong\u003enajbardziej zalecany i profesjonalny sposób\u003c/strong\u003e. Tworzysz osobny plik z rozszerzeniem \u003ccode\u003e.css\u003c/code\u003e (np. \u003ccode\u003estyle.css\u003c/code\u003e), a następnie dołączasz go do swojego dokumentu HTML za pomocą tagu \u003ccode\u003e\u0026#x3C;link\u003e\u003c/code\u003e umieszczonego w sekcji \u003ccode\u003e\u0026#x3C;head\u003e\u003c/code\u003e.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eKiedy używać?\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eZawsze w większych projektach\u003c/strong\u003e i tam, gdzie planujesz rozwijać stronę.\u003c/li\u003e\\n\u003cli\u003eGdy style mają być używane na wielu stronach w witrynie.\u003c/li\u003e\\n\u003cli\u003eGdy chcesz zachować \u003cstrong\u003eczysty i zorganizowany kod\u003c/strong\u003e.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003eJak to działa?\u003c/strong\u003e\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003eTworzysz plik CSS, np. \u003ccode\u003estyle.css\u003c/code\u003e, w tym samym folderze co Twój plik HTML (lub w podfolderze, np. \u003ccode\u003ecss/style.css\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eW pliku \u003ccode\u003estyle.css\u003c/code\u003e piszesz tylko czyste reguły CSS.\u003c/li\u003e\\n\u003cli\u003eW pliku HTML, w sekcji \u003ccode\u003e\u0026#x3C;head\u003e\u003c/code\u003e, dodajesz znacznik \u003ccode\u003e\u0026#x3C;link\u003e\u003c/code\u003e:\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003eindex.html\u003c/code\u003e:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e\u0026#x3C;!DOCTYPE \u003cspan class=\\\"hljs-keyword\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003elang\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"pl\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003echarset\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"UTF-8\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"viewport\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003econtent\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"width=device-width, initial-scale=1.0\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003eExternal CSS\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003elink\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003erel\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"stylesheet\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"style.css\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eMoja strona z External CSS\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eTen akapit również jest ostylowany. Style są w osobnym pliku!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003eKliknij mnie\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003estyle.css\u003c/code\u003e (tworzysz osobny plik):\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e/* To jest plik style.css */\u003c/span\u003e\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ebody\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#e0f2f7\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Jasnoniebieskie tło dla całej strony */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003efont-family\u003c/span\u003e: Georgia, serif;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003eh1\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#0056b3\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Ciemnoniebieski nagłówek */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003etext-decoration\u003c/span\u003e: underline; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Podkreślony tekst */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ep\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#333\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003emargin-bottom\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e15px\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Odstęp pod akapitem */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ebutton\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#28a745\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Zielony przycisk */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e10px\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e20px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder\u003c/span\u003e: none;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder-radius\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e5px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecursor\u003c/span\u003e: pointer;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eZalety External CSS:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwość zarządzania:\u003c/strong\u003e Wszystkie style są w jednym miejscu.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003ePonowne użycie:\u003c/strong\u003e Ten sam plik CSS może być używany przez wiele stron HTML, zapewniając spójny wygląd całej witryny.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSzybsze ładowanie:\u003c/strong\u003e Przeglądarka buforuje plik CSS, więc nie musi go pobierać ponownie przy każdej wizycie na nowej podstronie.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowe-selektory-css---jak-wybierać-elementy-do-stylowania\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowe-selektory-css---jak-wybierać-elementy-do-stylowania\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowe selektory CSS - jak wybierać elementy do stylowania?\u003c/h2\u003e\\n\u003cp\u003eSelektory to najważniejsza część reguł CSS. Mówią przeglądarce, \u003cstrong\u003ektóre elementy HTML\u003c/strong\u003e mają otrzymać konkretne style. Bez selektorów nie wiedziałbyś/wiedziałabyś, do czego przypisać dany kolor czy rozmiar czcionki.\u003c/p\u003e\\n\u003ch3 id=\\\"selektory-elementów-type-selectors\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#selektory-elementów-type-selectors\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eSelektory elementów (Type Selectors)\u003c/h3\u003e\\n\u003cp\u003eTo najprostszy typ selektora. Wybiera \u003cstrong\u003ewszystkie wystąpienia danego typu elementu HTML\u003c/strong\u003e (np. wszystkie \u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e, wszystkie \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e, wszystkie \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e).\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eSkładnia:\u003c/strong\u003e po prostu nazwa elementu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e/* Ostyluje wszystkie nagłówki h1 na stronie */\u003c/span\u003e\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003eh1\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: darkred;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003efont-family\u003c/span\u003e: sans-serif;\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/* Ostyluje wszystkie akapity p na stronie */\u003c/span\u003e\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ep\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eline-height\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1.5\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Wysokość linii tekstu */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003etext-align\u003c/span\u003e: justify; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Wyrównanie tekstu */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/* Ostyluje wszystkie przyciski button na stronie */\u003c/span\u003e\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ebutton\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#f0f0f0\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1px\u003c/span\u003e solid gray;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"selektory-klas-class-selectors\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#selektory-klas-class-selectors\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eSelektory klas (Class Selectors)\u003c/h3\u003e\\n\u003cp\u003eTo bardzo często używane selektory. Pozwalają na stylowanie elementów, które mają przypisaną określoną \u003cstrong\u003eklasę\u003c/strong\u003e. Klasy są definiowane w HTML za pomocą atrybutu \u003ccode\u003eclass=\\\"nazwa-klasy\\\"\u003c/code\u003e. Jedna klasa może być użyta \u003cstrong\u003ewielokrotnie\u003c/strong\u003e na różnych elementach, a jeden element może mieć \u003cstrong\u003ewiele klas\u003c/strong\u003e.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eSkładnia w CSS:\u003c/strong\u003e kropka \u003ccode\u003e.\u003c/code\u003e przed nazwą klasy.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eHTML:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"tytul-strony\\\"\u003c/span\u003e\u003e\u003c/span\u003eWitaj, na mojej stronie!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"tekst-wazny\\\"\u003c/span\u003e\u003e\u003c/span\u003eTen tekst jest szczególnie istotny.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"tekst-wazny\\\"\u003c/span\u003e\u003e\u003c/span\u003eTo jest inny ważny akapit.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"przycisk-glowny\\\"\u003c/span\u003e\u003e\u003c/span\u003eNaciśnij mnie!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"karta produkt\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eProdukt A\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eOpis produktu A.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eCSS:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.tytul-strony\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003efont-size\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e48px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#4caf50\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Zielony */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.tekst-wazny\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003efont-weight\u003c/span\u003e: bold; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Pogrubiony tekst */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: purple;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.przycisk-glowny\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e12px\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e25px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#007bff\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Niebieski */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder-radius\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e8px\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e/* Możesz też łączyć klasy w selektorze: styluj element, który ma OBYDWIE klasy */\u003c/span\u003e\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.karta\u003c/span\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.produkt\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e/* Ostyluje tylko div, który ma klasy \\\"karta\\\" ORAZ \\\"produkt\\\" */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1px\u003c/span\u003e solid \u003cspan class=\\\"hljs-number\\\"\u003e#ccc\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebox-shadow\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e2px\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e2px\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e5px\u003c/span\u003e \u003cspan class=\\\"hljs-built_in\\\"\u003ergba\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0.2\u003c/span\u003e);\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e15px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003emargin\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e10px\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"selektory-identyfikatorów-id-selectors\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#selektory-identyfikatorów-id-selectors\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eSelektory identyfikatorów (ID Selectors)\u003c/h3\u003e\\n\u003cp\u003eSelektory ID pozwalają na stylowanie elementu z unikalnym identyfikatorem (\u003ccode\u003eid\u003c/code\u003e). W przeciwieństwie do klas, każdy \u003cstrong\u003e\u003ccode\u003eid\u003c/code\u003e musi być unikalny\u003c/strong\u003e na całej stronie HTML! Oznacza to, że nie możesz mieć dwóch elementów o tym samym \u003ccode\u003eid\u003c/code\u003e. ID jest często używane do stylowania bardzo specyficznych, pojedynczych elementów lub jako \\\"kotwica\\\" dla JavaScript.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eSkładnia w CSS:\u003c/strong\u003e hash \u003ccode\u003e#\u003c/code\u003e przed nazwą ID.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eHTML:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eheader\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"naglowek-glowny\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eMoja Super Strona\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eheader\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003efooter\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"stopka-strony\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\u003cspan class=\\\"hljs-symbol\\\"\u003e\u0026#x26;copy;\u003c/span\u003e 2024 Wszystkie prawa zastrzeżone.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003efooter\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eCSS:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-selector-id\\\"\u003e#naglowek-glowny\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#333\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Ciemne tło */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e20px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003etext-align\u003c/span\u003e: center;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-id\\\"\u003e#stopka-strony\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#eee\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#555\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e10px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003etext-align\u003c/span\u003e: center;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003efont-size\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e0.9em\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWskazówka:\u003c/strong\u003e W większości przypadków do stylowania elementów używaj \u003cstrong\u003eklas\u003c/strong\u003e. ID rezerwuj dla bardzo unikalnych elementów, które będą wymagały bezpośredniego odwoływania się przez JavaScript lub jako kotwice nawigacyjne.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowe-właściwości-css---twój-zestaw-narzędzi-do-stylizacji\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowe-właściwości-css---twój-zestaw-narzędzi-do-stylizacji\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowe właściwości CSS - Twój zestaw narzędzi do stylizacji\u003c/h2\u003e\\n\u003cp\u003ePoznałeś/aś, jak wybrać elementy (selektory) i gdzie umieścić style. Teraz czas na naukę \u003cstrong\u003ewłaściwości CSS\u003c/strong\u003e, które faktycznie zmieniają wygląd Twoich elementów. Poniżej przedstawiamy kilka najważniejszych i najczęściej używanych.\u003c/p\u003e\\n\u003ch3 id=\\\"kolory-colors---nadaj-barwę-tekstowi\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#kolory-colors---nadaj-barwę-tekstowi\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eKolory (Colors) - nadaj barwę tekstowi\u003c/h3\u003e\\n\u003cp\u003eWłaściwość \u003ccode\u003ecolor\u003c/code\u003e służy do ustawiania \u003cstrong\u003ekoloru tekstu\u003c/strong\u003e w elemencie.\\nMożesz definiować kolory na kilka sposobów:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eNazwy kolorów:\u003c/strong\u003e \u003ccode\u003ered\u003c/code\u003e, \u003ccode\u003eblue\u003c/code\u003e, \u003ccode\u003egreen\u003c/code\u003e, \u003ccode\u003eyellow\u003c/code\u003e, \u003ccode\u003eorange\u003c/code\u003e, \u003ccode\u003eblack\u003c/code\u003e, \u003ccode\u003ewhite\u003c/code\u003e, \u003ccode\u003elightgray\u003c/code\u003e, \u003ccode\u003edarkblue\u003c/code\u003e itp. (istnieje wiele predefiniowanych nazw).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWartości szesnastkowe (Hexadecimal)\u003c/strong\u003e: Zaczynają się od \u003ccode\u003e#\u003c/code\u003e, po których następuje 6 cyfr/liter (0-9, A-F). Każde dwie cyfry reprezentują natężenie koloru czerwonego, zielonego i niebieskiego (RGB). Np. \u003ccode\u003e#FF0000\u003c/code\u003e to czysty czerwony, \u003ccode\u003e#000000\u003c/code\u003e to czarny, \u003ccode\u003e#FFFFFF\u003c/code\u003e to biały.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eRGB (Red, Green, Blue)\u003c/strong\u003e: \u003ccode\u003ergb(czerwony, zielony, niebieski)\u003c/code\u003e. Wartości od 0 do 255. Np. \u003ccode\u003ergb(255, 0, 0)\u003c/code\u003e to czerwony. Możesz też dodać kanał alfa dla przezroczystości: \u003ccode\u003ergba(czerwony, zielony, niebieski, alfa)\u003c/code\u003e. \u003ccode\u003ealfa\u003c/code\u003e to wartość od 0 (całkowicie przezroczysty) do 1 (całkowicie nieprzezroczysty). Np. \u003ccode\u003ergba(0, 0, 0, 0.5)\u003c/code\u003e to półprzezroczysty czarny.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eHSL (Hue, Saturation, Lightness)\u003c/strong\u003e: \u003ccode\u003ehsl(odcień, nasycenie, jasność)\u003c/code\u003e. Odcień (Hue) to kąt na kole barw (0-360 stopni), nasycenie (Saturation) i jasność (Lightness) to procenty (0-100%). Np. \u003ccode\u003ehsl(0, 100%, 50%)\u003c/code\u003e to czerwony. Możesz też dodać kanał alfa: \u003ccode\u003ehsla(odcień, nasycenie, jasność, alfa)\u003c/code\u003e.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e/* Różne sposoby definiowania koloru tekstu */\u003c/span\u003e\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003eh1\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: red; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Nazwa koloru */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ep\u003c/span\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.info\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#008080\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Ciemny turkus (szesnastkowo) */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ea\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003ergb\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e75\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e130\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e/* Indygo (RGB) */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003espan\u003c/span\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.highlight\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003ehsl\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e120\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e100%\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e25%\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e/* Ciemnozielony (HSL) */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003ediv\u003c/span\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.overlay\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003ergba\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0.7\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e/* Półprzezroczysty czarny (RGBA) */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: white;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"tło-background---pokoloruj-przestrzeń\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#tło-background---pokoloruj-przestrzeń\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eTło (Background) - pokoloruj przestrzeń\u003c/h3\u003e\\n\u003cp\u003eWłaściwości z prefiksem \u003ccode\u003ebackground-\u003c/code\u003e służą do stylowania tła elementów.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ebackground-color\u003c/code\u003e\u003c/strong\u003e: Ustawia kolor tła elementu. Możesz użyć dowolnego formatu koloru (nazwa, hex, RGB, HSL).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ebackground-image\u003c/code\u003e\u003c/strong\u003e: Ustawia obrazek jako tło elementu. Podaj ścieżkę do pliku obrazu za pomocą \u003ccode\u003eurl()\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ebackground-repeat\u003c/code\u003e\u003c/strong\u003e: Określa, czy i jak obrazek tła ma się powtarzać.\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003eno-repeat\u003c/code\u003e: Obrazek nie powtarza się.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003erepeat\u003c/code\u003e: Obrazek powtarza się wzdłuż osi X i Y.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003erepeat-x\u003c/code\u003e: Powtarza się tylko poziomo.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003erepeat-y\u003c/code\u003e: Powtarza się tylko pionowo.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ebackground-position\u003c/code\u003e\u003c/strong\u003e: Określa początkową pozycję obrazka tła. Możesz użyć słów kluczowych (\u003ccode\u003etop\u003c/code\u003e, \u003ccode\u003ebottom\u003c/code\u003e, \u003ccode\u003eleft\u003c/code\u003e, \u003ccode\u003eright\u003c/code\u003e, \u003ccode\u003ecenter\u003c/code\u003e) lub wartości procentowych/pikselowych.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ebackground-size\u003c/code\u003e\u003c/strong\u003e: Określa rozmiar obrazka tła.\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003eauto\u003c/code\u003e: Domyślny rozmiar.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003ecover\u003c/code\u003e: Skaluje obrazek tak, aby pokrył całą powierzchnię elementu, przycinając go w razie potrzeby.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003econtain\u003c/code\u003e: Skaluje obrazek tak, aby był w pełni widoczny wewnątrz elementu, bez przycinania (mogą pojawić się puste przestrzenie).\u003c/li\u003e\\n\u003cli\u003eWartości pikselowe/procentowe (np. \u003ccode\u003e100px 200px\u003c/code\u003e, \u003ccode\u003e50% 100%\u003c/code\u003e).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-selector-tag\\\"\u003ebody\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#f8f8f8\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Bardzo jasnoszare tło dla całej strony */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-tag\\\"\u003eheader\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-image\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eurl\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"header-bg.jpg\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e/* Obrazek tła w nagłówku */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-repeat\u003c/span\u003e: no-repeat; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Bez powtarzania */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-position\u003c/span\u003e: center top; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Na środku, u góry */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-size\u003c/span\u003e: cover; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Pokryj całą powierzchnię */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e50px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003etext-align\u003c/span\u003e: center;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.card\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e20px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003emargin\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e10px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebox-shadow\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e4px\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e8px\u003c/span\u003e \u003cspan class=\\\"hljs-built_in\\\"\u003ergba\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e0.1\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e/* Delikatny cień */\u003c/span\u003e\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"marginesy-i-wypełnienia-margin--padding---kontroluj-odstępy\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#marginesy-i-wypełnienia-margin--padding---kontroluj-odstępy\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eMarginesy i wypełnienia (Margin \u0026#x26; Padding) - kontroluj odstępy\u003c/h3\u003e\\n\u003cp\u003eWłaściwości \u003ccode\u003emargin\u003c/code\u003e i \u003ccode\u003epadding\u003c/code\u003e są kluczowe do kontrolowania odstępów między elementami i wewnątrz nich. Aby to dobrze zrozumieć, wyobraź sobie każdy element HTML jako pudełko. 📦\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003epadding\u003c/code\u003e (wypełnienie)\u003c/strong\u003e: To przestrzeń \u003cstrong\u003ewewnątrz\u003c/strong\u003e pudełka, między jego zawartością (tekstem, obrazem) a krawędzią ramki. Powiększa rozmiar wizualny elementu, ale nie dodaje odstępu od innych elementów.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003emargin\u003c/code\u003e (margines)\u003c/strong\u003e: To przestrzeń \u003cstrong\u003ena zewnątrz\u003c/strong\u003e pudełka, między krawędzią ramki a innymi elementami. Tworzy odstęp między jednym elementem a drugim.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eObie właściwości można ustawić dla wszystkich czterech stron elementu (góra, prawo, dół, lewo) jednocześnie lub indywidualnie.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eSkładnia:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eJedna wartość:\u003c/strong\u003e \u003ccode\u003epadding: 20px;\u003c/code\u003e (20px ze wszystkich stron).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eDwie wartości:\u003c/strong\u003e \u003ccode\u003epadding: 10px 20px;\u003c/code\u003e (10px góra/dół, 20px lewo/prawo).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eCztery wartości:\u003c/strong\u003e \u003ccode\u003epadding: 10px 20px 30px 40px;\u003c/code\u003e (góra, prawo, dół, lewo - zgodnie z ruchem wskazówek zegara).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eIndywidualne właściwości:\u003c/strong\u003e \u003ccode\u003epadding-top\u003c/code\u003e, \u003ccode\u003epadding-right\u003c/code\u003e, \u003ccode\u003epadding-bottom\u003c/code\u003e, \u003ccode\u003epadding-left\u003c/code\u003e (analogicznie dla \u003ccode\u003emargin\u003c/code\u003e).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.box\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#cfe2f3\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Jasnoniebieski */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e1px\u003c/span\u003e solid \u003cspan class=\\\"hljs-number\\\"\u003e#a9d0ed\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.content-box\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epadding\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e20px\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* 20px wypełnienia z każdej strony */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.spaced-element\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003emargin\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e15px\u003c/span\u003e \u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* 15px marginesu góra/dół, 0px lewo/prawo */\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.specific-margins\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003emargin-top\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e50px\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003emargin-left\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e25px\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"ramki-borders---obramuj-i-zaokrąglaj\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#ramki-borders---obramuj-i-zaokrąglaj\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eRamki (Borders) - obramuj i zaokrąglaj\u003c/h3\u003e\\n\u003cp\u003eWłaściwości z prefiksem \u003ccode\u003eborder-\u003c/code\u003e pozwalają na dodanie obramowania wokół elementu.\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003eborder\u003c/code\u003e\u003c/strong\u003e: Skrócona właściwość do ustawienia szerokości, stylu i koloru ramki.\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003eborder: 1px solid black;\u003c/code\u003e\u003c/strong\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e1px\u003c/code\u003e: szerokość ramki.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003esolid\u003c/code\u003e: styl ramki (inne to np. \u003ccode\u003edashed\u003c/code\u003e, \u003ccode\u003edotted\u003c/code\u003e, \u003ccode\u003edouble\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eblack\u003c/code\u003e: kolor ramki.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003eborder-width\u003c/code\u003e\u003c/strong\u003e: Szerokość ramki (np. \u003ccode\u003e2px\u003c/code\u003e, \u003ccode\u003emedium\u003c/code\u003e, \u003ccode\u003ethick\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003eborder-style\u003c/code\u003e\u003c/strong\u003e: Styl ramki (np. \u003ccode\u003esolid\u003c/code\u003e, \u003ccode\u003edotted\u003c/code\u003e, \u003ccode\u003edashed\u003c/code\u003e, \u003ccode\u003edouble\u003c/code\u003e, \u003ccode\u003egroove\u003c/code\u003e, \u003ccode\u003eridge\u003c/code\u003e, \u003ccode\u003einset\u003c/code\u003e, \u003ccode\u003eoutset\u003c/code\u003e, \u003ccode\u003enone\u003c/code\u003e, \u003ccode\u003ehidden\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003eborder-color\u003c/code\u003e\u003c/strong\u003e: Kolor ramki.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003eborder-radius\u003c/code\u003e\u003c/strong\u003e: \u003cstrong\u003eZaokrągla rogi\u003c/strong\u003e elementu. Podajesz wartość promienia zaokrąglenia (np. \u003ccode\u003e5px\u003c/code\u003e, \u003ccode\u003e1em\u003c/code\u003e, \u003ccode\u003e50%\u003c/code\u003e dla idealnego koła/elipsy).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-css\\\"\u003e\u003cspan class=\\\"hljs-selector-class\\\"\u003e.card\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e2px\u003c/span\u003e solid \u003cspan class=\\\"hljs-number\\\"\u003e#5cb85c\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Zielona, ciągła ramka o grubości 2px */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder-radius\u003c/span\u003e: \u003cspan class=\\\"hljs-n
