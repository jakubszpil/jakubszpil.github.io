cimg src=\\\"adres\\\" alt=\\\"opis\\\" /\u003e.\",{\"_26\":55,\"_28\":56,\"_34\":60,\"_36\":61},\"\u003cp\u003eKtóry element tworzy nieuporządkowaną listę?\u003c/p\u003e\",[57,44,58,59],\"\u003cdl\u003e\",\"\u003cul\u003e\",\"\u003col\u003e\",2,\"\u003cul\u003e to lista nieuporządkowana, \u003col\u003e - uporządkowana.\",{\"_26\":63,\"_28\":64,\"_34\":60,\"_36\":69},\"\u003cp\u003eZa co odpowiada atrybut 'action' w tagu \u003ccode\u003e\u0026#x3C;form\u003e\u003c/code\u003e?\u003c/p\u003e\",[65,66,67,68],\"Dodaje pole tekstowe\",\"Włącza walidację formularza\",\"Określa adres, pod który zostaną przesłane dane formularza\",\"Definiuje typ przesyłanych danych\",\"Atrybut action określa adres, pod który zostaną wysłane dane formularza.\",\"slug\",\"wprowadzenie-do-html\",\"content\",\"\u003cp\u003eWitaj w świecie tworzenia stron internetowych! 👋 Jeśli kiedykolwiek zastanawiałeś/aś się, jak powstają strony, które codziennie przeglądasz, ten kurs jest dla Ciebie. Nauczysz się podstaw \u003cstrong\u003eHTML\u003c/strong\u003e, języka, który jest fundamentem każdej witryny. Nie musisz mieć żadnego wcześniejszego doświadczenia - wszystko wytłumaczymy krok po kroku! Gotowy/a, aby zacząć tworzyć swoje pierwsze strony? Zaczynamy! 🚀\u003c/p\u003e\\n\u003ch2 id=\\\"co-to-jest-html\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#co-to-jest-html\\\"\u003e\u003e\u003e\u003c/a\u003eCo to jest HTML?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eHTML\u003c/strong\u003e to skrót od \u003cstrong\u003eHyperText Markup Language\u003c/strong\u003e, czyli \u003cstrong\u003eHypertekstowy Język Znaczników\u003c/strong\u003e. Co to oznacza w praktyce? To język, który służy do tworzenia szkieletu i struktury każdej strony internetowej. Pomyśl o nim jak o planie architektonicznym domu - określa, gdzie będą ściany, okna, drzwi i podłogi, zanim jeszcze zajmiesz się dekoracją. 🏠\u003c/p\u003e\\n\u003cp\u003eHTML nie jest językiem programowania (nie wykonuje skomplikowanych operacji ani obliczeń), ale językiem znaczników. Oznacza to, że używa specjalnych kodów, zwanych \u003cstrong\u003eznacznikami\u003c/strong\u003e (ang. \u003cem\u003etags\u003c/em\u003e), aby opisać różne części dokumentu. Dzięki nim przeglądarka internetowa (taka jak Chrome, Firefox czy Safari) wie, co jest nagłówkiem, co akapitem, gdzie znajduje się obrazek, a gdzie link. Bez HTML-a strony internetowe byłyby po prostu blokiem niezrozumiałego tekstu.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"jak-działa-html-znaczniki-i-elementy\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#jak-działa-html-znaczniki-i-elementy\\\"\u003e\u003e\u003e\u003c/a\u003eJak działa HTML? Znaczniki i elementy\u003c/h2\u003e\\n\u003cp\u003eHTML działa na zasadzie \u003cstrong\u003eelementów\u003c/strong\u003e, które są tworzone za pomocą \u003cstrong\u003eznaczników\u003c/strong\u003e.\u003c/p\u003e\\n\u003cp\u003eNajprościej mówiąc, znacznik to słowo kluczowe ujęte w nawiasy kątowe, np. \u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e lub \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e.\u003c/p\u003e\\n\u003cp\u003eWiększość znaczników występuje w parach:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eZnacznik otwierający:\u003c/strong\u003e np. \u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eZnacznik zamykający:\u003c/strong\u003e np. \u003ccode\u003e\u0026#x3C;/p\u003e\u003c/code\u003e (z ukośnikiem!)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003ePomiędzy tymi dwoma znacznikami umieszczamy zawartość, którą chcemy oznaczyć. Całość - znacznik otwierający, zawartość i znacznik zamykający - tworzy \u003cstrong\u003eelement HTML\u003c/strong\u003e.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eTo jest mój pierwszy akapit!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eTutaj:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e to znacznik otwierający,\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e\u0026#x3C;/p\u003e\u003c/code\u003e to znacznik zamykający,\u003c/li\u003e\\n\u003cli\u003e\\\"To jest mój pierwszy akapit!\\\" to zawartość,\u003c/li\u003e\\n\u003cli\u003eCałość to \u003cstrong\u003eelement akapitu\u003c/strong\u003e.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eSą też znaczniki, które nie potrzebują znacznika zamykającego, ponieważ nie zawierają żadnej zawartości między znacznikami. Nazywamy je \u003cstrong\u003eznacznikami pustymi\u003c/strong\u003e lub \u003cstrong\u003esamozamykającymi się\u003c/strong\u003e. Przykładem jest znacznik obrazka \u003ccode\u003e\u0026#x3C;img\u003e\u003c/code\u003e lub przejścia do nowej linii \u003ccode\u003e\u0026#x3C;br\u003e\u003c/code\u003e.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowa-struktura-dokumentu-html\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowa-struktura-dokumentu-html\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowa struktura dokumentu HTML\u003c/h2\u003e\\n\u003cp\u003eKażdy plik HTML powinien mieć podstawową, określoną strukturę, która informuje przeglądarkę, jak ma interpretować i wyświetlać zawartość. To jak szkielet, na którym zbudujemy całą resztę. 💀\u003c/p\u003e\\n\u003cp\u003eOto standardowy szablon, który zawsze będzie punktem wyjścia:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e\u0026#x3C;!DOCTYPE \u003cspan class=\\\"hljs-keyword\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003elang\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"pl\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003echarset\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"UTF-8\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003emeta\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"viewport\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003econtent\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"width=device-width, initial-scale=1.0\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003eTytuł mojej wspaniałej strony\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eWitaj, świecie HTML!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      To jest moja pierwsza prawdziwa strona internetowa. Jestem\\n      podekscytowany/a!\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"wyjaśnienie-struktury-krok-po-kroku\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wyjaśnienie-struktury-krok-po-kroku\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eWyjaśnienie struktury krok po kroku\u003c/h3\u003e\\n\u003cp\u003eRozbierzmy ten kod na części, aby dokładnie zrozumieć, co oznacza każdy element:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;!DOCTYPE html\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eTo pierwsza linia w każdym dokumencie HTML. Mówi przeglądarce, że używasz \u003cstrong\u003eHTML5\u003c/strong\u003e, najnowszej wersji HTML. To ważne, bo pomaga przeglądarce prawidłowo renderować stronę.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;html lang=\\\"pl\\\"\u003e...\u0026#x3C;/html\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eTo jest \u003cstrong\u003ekorzeń\u003c/strong\u003e całego dokumentu HTML. Wszystkie inne elementy strony muszą znajdować się wewnątrz tego znacznika. Atrybut \u003ccode\u003elang=\\\"pl\\\"\u003c/code\u003e informuje przeglądarkę i wyszukiwarki, że język treści na stronie to \u003cstrong\u003epolski\u003c/strong\u003e. To jest ważne dla dostępności i SEO (pozycjonowania w wyszukiwarkach).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;head\u003e...\u0026#x3C;/head\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\\n\u003cp\u003eSekcja \u003ccode\u003e\u0026#x3C;head\u003e\u003c/code\u003e zawiera \u003cstrong\u003emeta dane\u003c/strong\u003e - informacje o stronie, które nie są widoczne bezpośrednio dla użytkownika na stronie, ale są kluczowe dla przeglądarki, wyszukiwarek i mediów społecznościowych. To tak, jakbyś przygotowywał/a brief dla kogoś, kto ma zobaczyć Twoją pracę. 📋\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;meta charset=\\\"UTF-8\\\" /\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eTen znacznik ustawia \u003cstrong\u003ekodowanie znaków\u003c/strong\u003e na \u003cstrong\u003eUTF-8\u003c/strong\u003e. UTF-8 to standardowe kodowanie, które obsługuje wszystkie języki świata, w tym polskie znaki (ą, ę, ć, ł, itd.). Bez tego znacznika polskie litery mogłyby wyświetlać się jako \\\"krzaczki\\\". 🐛\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;meta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1.0\\\" /\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eTen meta tag jest niezwykle ważny dla \u003cstrong\u003eresponsywności\u003c/strong\u003e strony. Mówi przeglądarce na urządzeniach mobilnych (smartfonach, tabletach), aby strona była wyświetlana z odpowiednią szerokością (\u003ccode\u003ewidth=device-width\u003c/code\u003e) i początkowym skalowaniem (\u003ccode\u003einitial-scale=1.0\u003c/code\u003e). Dzięki temu Twoja strona będzie wyglądać dobrze zarówno na dużym ekranie komputera, jak i na małym ekranie telefonu. 📱🖥️\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;title\u003eTytuł mojej wspaniałej strony\u0026#x3C;/title\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eTekst wewnątrz znacznika \u003ccode\u003e\u0026#x3C;title\u003e\u003c/code\u003e to \u003cstrong\u003etytuł strony\u003c/strong\u003e, który pojawia się na karcie przeglądarki lub w zakładkach. Jest to również to, co widzą użytkownicy w wynikach wyszukiwania Google. Wybierz chwytliwy i opisowy tytuł! 🔖\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;body\u003e...\u0026#x3C;/body\u003e\u003c/code\u003e\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eSekcja \u003ccode\u003e\u0026#x3C;body\u003e\u003c/code\u003e zawiera całą \u003cstrong\u003ewidoczną treść strony\u003c/strong\u003e - to, co użytkownik faktycznie zobaczy w oknie przeglądarki. Wszystkie Twoje nagłówki, akapity, obrazy, linki, listy i formularze znajdą się tutaj. Pomyśl o tym jako o głównym \\\"ciele\\\" Twojej strony. 🖼️\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowe-elementy-html---twój-zestaw-narzędzi\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowe-elementy-html---twój-zestaw-narzędzi\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowe elementy HTML - Twój zestaw narzędzi\u003c/h2\u003e\\n\u003cp\u003eTeraz, gdy znasz podstawową strukturę, przejdźmy do konkretnych elementów, których będziesz używać najczęściej do tworzenia treści. To jak Twoje klocki LEGO do budowania strony! 🧱\u003c/p\u003e\\n\u003ch3 id=\\\"nagłówki-od-najważniejszych-do-najmniej-ważnych\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#nagłówki-od-najważniejszych-do-najmniej-ważnych\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eNagłówki: Od najważniejszych do najmniej ważnych\u003c/h3\u003e\\n\u003cp\u003eNagłówki (\u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e do \u003ccode\u003e\u0026#x3C;h6\u003e\u003c/code\u003e) służą do definiowania tytułów i podtytułów na stronie. Są kluczowe dla struktury treści i pomagają użytkownikom (i wyszukiwarkom) zrozumieć hierarchię informacji. \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e to najważniejszy nagłówek, a \u003ccode\u003e\u0026#x3C;h6\u003e\u003c/code\u003e najmniej ważny. Używaj ich logicznie, jak w książce: \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e dla tytułu rozdziału, \u003ccode\u003e\u0026#x3C;h2\u003e\u003c/code\u003e dla podrozdziału itd. 📚\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eTo jest główny tytuł strony (najważniejszy)\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh2\u003c/span\u003e\u003e\u003c/span\u003eTo jest podtytuł drugiego poziomu\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh2\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eTo jest podtytuł trzeciego poziomu\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh4\u003c/span\u003e\u003e\u003c/span\u003ePodtytuł czwartego poziomu\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh4\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh5\u003c/span\u003e\u003e\u003c/span\u003ePodtytuł piątego poziomu\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh5\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh6\u003c/span\u003e\u003e\u003c/span\u003ePodtytuł szóstego poziomu (najmniej ważny)\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh6\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"akapity-tworzenie-bloków-tekstu\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#akapity-tworzenie-bloków-tekstu\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eAkapity: Tworzenie bloków tekstu\u003c/h3\u003e\\n\u003cp\u003eAkapity tekstu oznacza się elementem \u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e. Służą one do grupowania zwykłego tekstu. Każdy akapit zaczyna się w nowej linii i ma pewne marginesy, które oddzielają go od innych elementów.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n  To jest pierwszy akapit mojej strony. Tutaj mogę pisać o czym tylko zechcę.\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n  A to jest drugi akapit. Widzisz, jak przeglądarka automatycznie dodaje odstęp\\n  między nimi?\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"linki-łączenie-stron-ze-sobą\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#linki-łączenie-stron-ze-sobą\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eLinki: Łączenie stron ze sobą\u003c/h3\u003e\\n\u003cp\u003eLinki (\u003ccode\u003e\u0026#x3C;a\u003e\u003c/code\u003e, od ang. \u003cem\u003eanchor\u003c/em\u003e) to serce internetu! Pozwalają użytkownikom nawigować między stronami internetowymi. Aby stworzyć link, użyj znacznika \u003ccode\u003e\u0026#x3C;a\u003e\u003c/code\u003e i atrybutu \u003cstrong\u003e\u003ccode\u003ehref\u003c/code\u003e\u003c/strong\u003e (Hypertext Reference), który wskazuje adres docelowy.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"https://www.example.com\\\"\u003c/span\u003e\\n  \u003e\u003c/span\u003eKliknij tutaj, aby przejść do strony Example.com\u0026#x3C;/a\\n\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n  Odwiedź również \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"https://www.google.com\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003etarget\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"_blank\\\"\u003c/span\u003e\u003e\u003c/span\u003eGoogle\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e,\\n  aby szukać informacji (otworzy się w nowej karcie).\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ehref\u003c/code\u003e\u003c/strong\u003e: Ten atrybut jest najważniejszy - określa adres URL, na który link prowadzi.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etarget=\\\"_blank\\\"\u003c/code\u003e\u003c/strong\u003e: Jeśli dodasz ten atrybut, link otworzy się w nowej karcie przeglądarki, co jest często przydatne, gdy nie chcesz, by użytkownik opuścił Twoją stronę.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003ch3 id=\\\"obrazy-dodawanie-grafiki-do-strony\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#obrazy-dodawanie-grafiki-do-strony\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eObrazy: Dodawanie grafiki do strony\u003c/h3\u003e\\n\u003cp\u003eElement \u003ccode\u003e\u0026#x3C;img\u003e\u003c/code\u003e służy do wstawiania obrazów na stronę. Jest to \u003cstrong\u003eznacznik pusty\u003c/strong\u003e, co oznacza, że nie ma znacznika zamykającego, ponieważ obrazek \\\"nie zawiera\\\" tekstu między znacznikami, a jedynie odwołuje się do pliku graficznego.\u003c/p\u003e\\n\u003cp\u003eWymaga dwóch kluczowych atrybutów:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003esrc\u003c/code\u003e\u003c/strong\u003e (source): Określa ścieżkę do pliku obrazu (adres URL lub ścieżka do pliku na Twoim komputerze/serwerze).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003ealt\u003c/code\u003e\u003c/strong\u003e (alternative text): Jest to \u003cstrong\u003eniezwykle ważny\u003c/strong\u003e tekst alternatywny, który wyświetla się, jeśli obrazek się nie załaduje, lub jest odczytywany przez czytniki ekranowe dla osób niewidomych. Zawsze dodawaj sensowny \u003ccode\u003ealt\u003c/code\u003e!\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c!-- end list --\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eimg\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003esrc\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"https://via.placeholder.com/300x200\\\"\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ealt\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Przykładowy obrazek prostokątny o wymiarach 300x200 pikseli\\\"\u003c/span\u003e\\n/\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eimg\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003esrc\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"moj-pies.jpg\\\"\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ealt\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Zdjęcie mojego psa rasy golden retriever leżącego na trawie\\\"\u003c/span\u003e\\n/\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"listy-uporządkowanie-informacji\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#listy-uporządkowanie-informacji\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eListy: Uporządkowanie informacji\u003c/h3\u003e\\n\u003cp\u003eListy to świetny sposób na uporząd ing\\\"\u003e\\\"newsletter\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003evalue\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"yes\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003elabel\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003efor\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"newsletter\\\"\u003c/span\u003e\u003e\u003c/span\u003eZapisz się do newslettera\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003elabel\u003c/span\u003e\u003e\u003c/span\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebr\u003c/span\u003e /\u003e\u003c/span\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebr\u003c/span\u003e /\u003e\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003einput\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003etype\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"submit\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003evalue\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Wyślij formularz\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eform\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"elementy-formularza-pola-tekstowe-przyciski-i-inne\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#elementy-formularza-pola-tekstowe-przyciski-i-inne\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eElementy formularza: Pola tekstowe, przyciski i inne\u003c/h3\u003e\\n\u003cul\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003eaction\u003c/code\u003e\u003c/strong\u003e: Ten atrybut w tagu \u003ccode\u003e\u0026#x3C;form\u003e\u003c/code\u003e określa \u003cstrong\u003eadres URL\u003c/strong\u003e, na który zostaną wysłane dane z formularza po jego zatwierdzeniu. Zazwyczaj jest to adres skryptu na serwerze, który przetworzy te dane.\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003emethod\u003c/code\u003e\u003c/strong\u003e: Określa \u003cstrong\u003emetodę HTTP\u003c/strong\u003e, jaką dane zostaną wysłane. Najczęściej używa się:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003e\\\"post\\\"\u003c/code\u003e\u003c/strong\u003e: Dane są wysyłane \\\"za kulisami\\\" i nie są widoczne w adresie URL. Używane do przesyłania wrażliwych danych (np. haseł) lub dużych ilości danych.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003e\\\"get\\\"\u003c/code\u003e\u003c/strong\u003e: Dane są dodawane do adresu URL. Dobre dla prostych zapytań (np. wyszukiwanie).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;label for=\\\"id_pola\\\"\u003eEtykieta:\u0026#x3C;/label\u003e\u003c/code\u003e\u003c/strong\u003e: Element \u003ccode\u003e\u0026#x3C;label\u003e\u003c/code\u003e tworzy etykietę (opis) dla pola formularza. Atrybut \u003ccode\u003efor\u003c/code\u003e powinien mieć tę samą wartość co atrybut \u003ccode\u003eid\u003c/code\u003e w powiązanym polu \u003ccode\u003e\u0026#x3C;input\u003e\u003c/code\u003e. Dzięki temu kliknięcie etykiety aktywuje pole, co poprawia dostępność.\u003c/p\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003e\u0026#x3C;input type=\\\"...\\\"\u003e\u003c/code\u003e\u003c/strong\u003e: To najbardziej wszechstronny element formularza. Atrybut \u003ccode\u003etype\u003c/code\u003e definiuje rodzaj pola:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etype=\\\"text\\\"\u003c/code\u003e\u003c/strong\u003e: Standardowe pole do wprowadzania krótkiego tekstu (np. imię, nazwisko).\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003eplaceholder\u003c/code\u003e: Tekst podpowiedzi widoczny w polu, zanim użytkownik zacznie pisać.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etype=\\\"email\\\"\u003c/code\u003e\u003c/strong\u003e: Pole do wprowadzania adresu e-mail. Przeglądarka może sprawdzić, czy format adresu jest poprawny.\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003erequired\u003c/code\u003e: Atrybut, który sprawia, że pole jest obowiązkowe do wypełnienia przed wysłaniem formularza.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etype=\\\"password\\\"\u003c/code\u003e\u003c/strong\u003e: Pole do wprowadzania hasła. Wpisywany tekst jest maskowany (np. kropkami).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etype=\\\"radio\\\"\u003c/code\u003e\u003c/strong\u003e: Przyciski wyboru. Pozwalają wybrać \u003cstrong\u003etylko jedną\u003c/strong\u003e opcję z grupy. Opcje w tej samej grupie muszą mieć tę samą wartość atrybutu \u003ccode\u003ename\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etype=\\\"checkbox\\\"\u003c/code\u003e\u003c/strong\u003e: Pola wyboru. Pozwalają wybrać \u003cstrong\u003ejedną lub więcej\u003c/strong\u003e opcji z listy.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003etype=\\\"submit\\\"\u003c/code\u003e\u003c/strong\u003e: Przycisk służący do wysłania danych formularza. Atrybut \u003ccode\u003evalue\u003c/code\u003e określa tekst wyświetlany na przycisku.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003c/li\u003e\\n\u003cli\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003eid=\\\"nazwa_id\\\"\u003c/code\u003e\u003c/strong\u003e: Unikalny identyfikator dla każdego elementu HTML na stronie. Jest używany do łączenia etykiet z polam
