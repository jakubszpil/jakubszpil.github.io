\u003e\",[53,54,55,56],\"Wyłącznie przez any.\",\"Przez interface lub type i przekazać go do propsów funkcji.\",\"Nie trzeba typować propsów w TS.\",\"Tylko poprzez klasę.\",1,\"Propsy typujemy przez interface lub type i używamy ich w definicji funkcji.\",{\"_29\":60,\"_31\":61,\"_37\":57,\"_39\":66},\"\u003cp\u003eKtóry kod prawidłowo typuje referencję do przycisku?\u003c/p\u003e\",[62,63,64,65],\"const ref = useRef\u003cButton\u003e(null);\",\"const ref = useRef\u003cHTMLButtonElement\u003e(null);\",\"const ref = useRef(null);\",\"const ref = useRef\u003cHTMLDivElement\u003e(null);\",\"Poprawny typ dla referencji do buttona to HTMLButtonElement.\",{\"_29\":68,\"_31\":69,\"_37\":74,\"_39\":75},\"\u003cp\u003eCo wyświetli poniższy komponent?nn\u003ccode\u003etsxntype WelcomeProps = { name: string };nconst Welcome = ({ name }: WelcomeProps) =\u003e \u0026#x3C;p\u003eCześć, {name}!\u0026#x3C;/p\u003e;n\u003c/code\u003enJeśli wywołasz \u003ccode\u003e\u0026#x3C;Welcome name='Ala' /\u003e\u003c/code\u003e\u003c/p\u003e\",[70,71,72,73],\"undefined\",\"Błąd kompilacji\",\"Cześć, Ala!\",\"Witaj, Ala!\",2,\"Komponent wyświetli 'Cześć, Ala!'.\",\"slug\",\"pierwsze-kroki-z-typescript-w-react\",\"content\",\"\u003cp\u003eWitaj w świecie \u003cstrong\u003eReacta\u003c/strong\u003e połączonego z \u003cstrong\u003eTypeScriptem\u003c/strong\u003e! 🚀 Jeśli chcesz pisać nowoczesne aplikacje i mieć pewność, że Twój kod jest czysty, bezpieczny i przyszłościowy, to właśnie znalazłeś/aś odpowiednie narzędzie. TypeScript w połączeniu z React to duet, który pokochasz od pierwszego projektu! Ten przewodnik przeprowadzi Cię krok po kroku przez najważniejsze podstawy - bez zbędnych teorii, za to z praktycznymi przykładami i zadaniami, które pomogą Ci naprawdę zrozumieć temat. ✨\u003c/p\u003e\\n\u003ch2 id=\\\"dlaczego-warto-używać-typescript-w-react\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#dlaczego-warto-używać-typescript-w-react\\\"\u003e\u003e\u003e\u003c/a\u003eDlaczego warto używać TypeScript w React?\u003c/h2\u003e\\n\u003cp\u003eTypeScript to nie tylko “lepszy JavaScript\\\" - to Twoja tajna broń na błędy w kodzie! Dzięki niemu:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e🛡️ \u003cstrong\u003eKod jest bardziej przewidywalny i bezpieczniejszy\u003c/strong\u003e - typy wykrywają literówki i błędy logiczne już podczas pisania. To jak posiadanie prywatnego asystenta, który sprawdza Twój kod na bieżąco!\u003c/li\u003e\\n\u003cli\u003e⚡ \u003cstrong\u003ePraca w zespole staje się łatwiejsza\u003c/strong\u003e - czytelny kod, lepsze podpowiedzi w edytorze (IntelliSense), szybkie ogarnianie cudzych projektów. Koniec z \\\"zgadywaniem\\\" jakie dane funkcja przyjmuje!\u003c/li\u003e\\n\u003cli\u003e🔄 \u003cstrong\u003eRefaktoryzacje nie są już straszne\u003c/strong\u003e - zmiany w typach wymuszają poprawki w całym projekcie, więc nic Ci nie umknie. TypeScript prowadzi Cię za rękę przez proces zmian.\u003c/li\u003e\\n\u003cli\u003e📖 \u003cstrong\u003eTypy to żywa dokumentacja\u003c/strong\u003e - od razu wiesz, co i gdzie przekazujesz do komponentów oraz funkcji. Twój kod staje się samoopisujący.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eW React TypeScript to must-have, jeśli chcesz:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003ejasno typować \u003cstrong\u003epropsy\u003c/strong\u003e i \u003cstrong\u003estan\u003c/strong\u003e (\u003ccode\u003euseState\u003c/code\u003e, \u003ccode\u003euseReducer\u003c/code\u003e),\u003c/li\u003e\\n\u003cli\u003ewygodnie pracować z \u003cstrong\u003ereferencjami\u003c/strong\u003e (\u003ccode\u003euseRef\u003c/code\u003e),\u003c/li\u003e\\n\u003cli\u003ebez obaw korzystać z zewnętrznych bibliotek i API.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowe-typy-w-typescript\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowe-typy-w-typescript\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowe typy w TypeScript\u003c/h2\u003e\\n\u003cp\u003eNajczęściej spotkasz się z podstawowymi typami, które pomogą Ci kontrolować dane w Twojej aplikacji:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003euserName\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Alice\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Tekst\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003euserAge\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e = \u003cspan class=\\\"hljs-number\\\"\u003e25\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Liczba\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eisActive\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e = \u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Wartość logiczna (prawda/fałsz)\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eprimes\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e[] = [\u003cspan class=\\\"hljs-number\\\"\u003e2\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e3\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e5\u003c/span\u003e, \u003cspan class=\\\"hljs-number\\\"\u003e7\u003c/span\u003e]; \u003cspan class=\\\"hljs-comment\\\"\u003e// Tablica liczb\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003euserProfile\u003c/span\u003e: { \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e; \u003cspan class=\\\"hljs-attr\\\"\u003eage\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e } = { \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"John\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-attr\\\"\u003eage\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e30\u003c/span\u003e }; \u003cspan class=\\\"hljs-comment\\\"\u003e// Obiekt\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eanyValue\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eany\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Can be anything!\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Typ 'any' - używaj z ostrożnością! Wyłącza sprawdzanie typów.\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eunknownValue\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eunknown\u003c/span\u003e = \u003cspan class=\\\"hljs-number\\\"\u003e123\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Typ 'unknown' - bezpieczniejsza alternatywa dla 'any', wymaga sprawdzenia typu.\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003elet\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003euserStatus\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"active\\\"\u003c/span\u003e | \u003cspan class=\\\"hljs-string\\\"\u003e\\\"inactive\\\"\u003c/span\u003e = \u003cspan class=\\\"hljs-string\\\"\u003e\\\"active\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Literał (union type) - tylko te dwie wartości są dozwolone.\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eChcesz być PRO? Twórz własne \u003cstrong\u003etypy\u003c/strong\u003e i \u003cstrong\u003einterfejsy\u003c/strong\u003e - kod będzie czytelniejszy i łatwiejszy do rozbudowy:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-ts\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład użycia 'type'\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003etype\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUser\u003c/span\u003e = {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eemail\u003c/span\u003e?: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Opcjonalne pole\u003c/span\u003e\\n};\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład użycia 'interface'\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eProduct\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eprice\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003edescription\u003c/span\u003e?: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Opcjonalne pole\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eonSale\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003e\u003ccode\u003etype\u003c/code\u003e vs \u003ccode\u003einterface\u003c/code\u003e\u003c/strong\u003e\\nChoć często używane zamiennie, istnieją pewne różnice. \u003ccode\u003einterface\u003c/code\u003e może być rozszerzany i implementowany przez klasy, \u003ccode\u003etype\u003c/code\u003e jest bardziej elastyczny do tworzenia aliasów typów złożonych (np. unii). W prostych przypadkach, takich jak definicja propsów, wybór między \u003ccode\u003etype\u003c/code\u003e a \u003ccode\u003einterface\u003c/code\u003e często sprowadza się do preferencji.\u003c/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e💡 \u003cstrong\u003eTIP:\u003c/strong\u003e Korzystaj z własnych typów (\u003ccode\u003etype\u003c/code\u003e lub \u003ccode\u003einterface\u003c/code\u003e) zawsze, gdy masz złożone obiekty, struktury danych lub korzystasz z API! Ułatwi to debugowanie i utrzymanie kodu.\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"tworzenie-komponentów-funkcyjnych-z-typami\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#tworzenie-komponentów-funkcyjnych-z-typami\\\"\u003e\u003e\u003e\u003c/a\u003eTworzenie komponentów funkcyjnych z typami\u003c/h2\u003e\\n\u003cp\u003eNajprostszy komponent funkcyjny w TypeScript, który nie przyjmuje żadnych propsów, nie wymaga jawnego typowania:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-tsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eHelloWorld\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eHello, World!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eJeśli komponent nie przyjmuje żadnych propsów, TypeScript sam to zrozumie. Jeśli jednak chcesz być super precyzyjny (i czasami jest to wymagane przez lintery lub pewne schematy projektowe), możesz użyć typu \u003ccode\u003eReact.FC\u003c/code\u003e (Functional Component) lub \u003ccode\u003eReact.FunctionComponent\u003c/code\u003e.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-tsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { \u003cspan class=\\\"hljs-variable constant_\\\"\u003eFC\u003c/span\u003e } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"react\\\"\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eSimpleComponent\u003c/span\u003e: \u003cspan class=\\\"hljs-variable constant_\\\"\u003eFC\u003c/span\u003e = \u003cspan class=\\\"hljs-function\\\"\u003e() =\u003e\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eThis is a simple component.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n};\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// lub bardziej zwięźle\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eAnotherSimpleComponent\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) =\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eAnother simple component.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n};\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eZauważ, że importujemy \u003ccode\u003eFC\u003c/code\u003e bezpośrednio z pakietu \u003ccode\u003ereact\u003c/code\u003e, a nie cały obiekt \u003ccode\u003eReact\u003c/code\u003e.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"props-i-typowanie-propsów\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#props-i-typowanie-propsów\\\"\u003e\u003e\u003e\u003c/a\u003eProps i typowanie propsów\u003c/h2\u003e\\n\u003cp\u003ePropsy to podstawa przekazywania danych do komponentów w React! W TypeScript opisujesz je przez \u003cstrong\u003einterfejs\u003c/strong\u003e lub \u003cstrong\u003etyp\u003c/strong\u003e, a następnie wskazujesz ten typ jako argument komponentu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-tsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eWelcomeProps\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attr\\\"\u003euserName\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attr\\\"\u003eage\u003c/span\u003e?: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Opcjonalny prop\u003c/span\u003e\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eWelcome\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e{ userName, age }: \u003cspan class=\\\"hljs-title class_\\\"\u003eWelcomeProps\u003c/span\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      Hello, {userName}! {age \u0026#x26;\u0026#x26; `You are ${age} years old.`} 👋\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Użycie komponentu:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// \u0026#x3C;Welcome userName=\\\"Alice\\\" /\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// \u0026#x3C;Welcome userName=\\\"Bob\\\" age={30} /\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eCo zyskujesz?\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eIntelliSense:\u003c/strong\u003e Edytor podpowiada, jakie propsy są dostępne i jakiego są typu, gdy piszesz \u003ccode\u003e\u0026#x3C;Welcome ...\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWykrywanie błędów na etapie kompilacji:\u003c/strong\u003e Jeśli zapomnisz przekazać wymagany prop, lub przekazujesz go z niewłaściwym typem, TypeScript od razu Cię o tym poinformuje.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSamodokumentujący się kod:\u003c/strong\u003e Definicja interfejsu propsów służy jako jasna dokumentacja dla każdego, kto używa Twojego komponentu.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"typowanie-stanu-usestate\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#typowanie-stanu-usestate\\\"\u003e\u003e\u003e\u003c/a\u003eTypowanie stanu (useState)\u003c/h2\u003e\\n\u003cp\u003eHook \u003ccode\u003euseState\u003c/code\u003e pozwala komponentom funkcyjnym zarządzać ich wewnętrznym stanem. Z TypeScriptem możesz jasno określić, co przechowujesz w stanie, zwiększając tym samym bezpieczeństwo i czytelność kodu.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-tsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { useState } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"react\\\"\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eCounter\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [count, setCount] = useState\u0026#x3C;\u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Jawnie typujemy stan jako 'number'\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [message, setMessage] = useState\u0026#x3C;\u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Hello\\\"\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Jawnie typujemy stan jako 'string'\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [isActive, setIsActive] = useState\u0026#x3C;\u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e\u003e(\u003cspan class=\\\"hljs-literal\\\"\u003efalse\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Jawnie typujemy stan jako 'boolean'\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład złożonego stanu: obiekt\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003einterface\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserProfile\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n    \u003cspan class=\\\"hljs-attr\\\"\u003eemail\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e;\\n    \u003cspan class=\\\"hljs-attr\\\"\u003eisLoggedIn\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003eboolean\u003c/span\u003e;\\n  }\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [user, setUser] = useState\u0026#x3C;\u003cspan class=\\\"hljs-title class_\\\"\u003eUserProfile\u003c/span\u003e\u003e({\\n    \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"John Doe\\\"\u003c/span\u003e,\\n    \u003cspan class=\\\"hljs-attr\\\"\u003eemail\u003c/span\u003e: \u003cspan class=\\\"hljs-string\\\"\u003e\\\"john@example.com\\\"\u003c/span\u003e,\\n    \u003cspan class=\\\"hljs-attr\\\"\u003eisLoggedIn\u003c/span\u003e: \u003cspan class=\\\"hljs-literal\\\"\u003efalse\u003c/span\u003e,\\n  });\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eCounter:\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eCurrent count: {count}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{()\u003c/span\u003e =\u003e\u003c/span\u003e setCount((prevCount) =\u003e prevCount - 1)}\u003e\\n        Decrement\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{()\u003c/span\u003e =\u003e\u003c/span\u003e setCount((prevCount) =\u003e prevCount + 1)}\u003e\\n        Increment\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eMessage:\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e{message}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{()\u003c/span\u003e =\u003e\u003c/span\u003e setMessage(\\\"Updated message!\\\")}\u003e\\n        Update Message\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eUser Profile:\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eName: {user.name}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eEmail: {user.email}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eLogged In: {user.isLoggedIn ? \\\"Yes\\\" : \\\"No\\\"}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\\n        \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{()\u003c/span\u003e =\u003e\u003c/span\u003e setUser({ ...user, isLoggedIn: !user.isLoggedIn })}\\n      \u003e\\n        Toggle Login Status\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003e⭐ \u003cstrong\u003ePro tip:\u003c/strong\u003e Przy bardziej złożonych stanach (np. obiekty, tablice) - zawsze jawnie wpisuj typ. Nawet jeśli TypeScript czasem sam się domyśli (tzw. inferencja typów), jawne typowanie jest bardziej czytelne i odporne na błędy, zwłaszcza gdy stan może być początkowo \u003ccode\u003enull\u003c/code\u003e lub pustą tablicą.\u003c/p\u003e\\n\u003c/blockquote\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"typowanie-referencji-useref\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#typowanie-referencji-useref\\\"\u003e\u003e\u003e\u003c/a\u003eTypowanie referencji (useRef)\u003c/h2\u003e\\n\u003cp\u003eHook \u003ccode\u003euseRef\u003c/code\u003e służy do tworzenia referencji do elementów DOM lub do przechowywania wartości, które mają przetrwać ponowne renderowanie komponentu, ale nie wywołują go. Z TypeScriptem musisz jawnie określić, do jakiego typu elementu lub wartości odwołuje się referencja.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-tsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { useRef, useCallback } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"react\\\"\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eFocusButton\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Typujemy ref jako referencję do elementu HTMLButtonElement,\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// która może być null, zanim ref zostanie przypisany do elementu DOM.\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e buttonRef = useRef\u0026#x3C;\u003cspan class=\\\"hljs-title class_\\\"\u003eHTMLButtonElement\u003c/span\u003e\u003e(\u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e);\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e handleClick = \u003cspan class=\\\"hljs-title function_\\\"\u003euseCallback\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e() =\u003e\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Używamy operatora łańcuchowania opcjonalnego (?.) aby upewnić się,\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// że buttonRef.current nie jest null przed wywołaniem focus().\u003c/span\u003e\\n    buttonRef.\u003cspan class=\\\"hljs-property\\\"\u003ecurrent\u003c/span\u003e?.\u003cspan class=\\\"hljs-title function_\\\"\u003efocus\u003c/span\u003e();\\n  }, []); \u003cspan class=\\\"hljs-comment\\\"\u003e// useCallback bez zależności, ponieważ buttonRef jest stały.\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład referencji do przechowywania wartości, która nie jest elementem DOM\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e counterRef = useRef\u0026#x3C;\u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e);\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Current value in counterRef:\\\"\u003c/span\u003e, counterRef.\u003cspan class=\\\"hljs-property\\\"\u003ecurrent\u003c/span\u003e);\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eincrementCounter\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) =\u003e {\\n    counterRef.\u003cspan class=\\\"hljs-property\\\"\u003ecurrent\u003c/span\u003e += \u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e;\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"New value in counterRef:\\\"\u003c/span\u003e, counterRef.\u003cspan class=\\\"hljs-property\\\"\u003ecurrent\u003c/span\u003e);\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Zauważ, że zmiana counterRef.current nie spowoduje ponownego renderowania!\u003c/span\u003e\\n  };\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eFocus Button Example:\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{handleClick}\u003c/span\u003e\u003e\u003c/span\u003eClick to focus the other button\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{buttonRef}\u003c/span\u003e\u003e\u003c/span\u003eAnother Button\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003eRef for value storage:\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh3\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eCheck console for counterRef value. It won't update UI directly.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{incrementCounter}\u003c/span\u003e\u003e\u003c/span\u003eIncrement Counter in Ref\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eDzięki typowaniu masz pewność, do jakiego elementu się odwołujesz (\u003ccode\u003eHTMLButtonElement\u003c/code\u003e) i jakie ma on właściwości/metody. Typy \u003ccode\u003eHTMLElement\u003c/code\u003e, \u003ccode\u003eHTMLDivElement\u003c/code\u003e, \u003ccode\u003eHTMLInputElement\u003c/code\u003e itp. są wbudowane w bibliotekę DOM.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"przydatne-narzędzia-i-wskazówki\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#przydatne-narzędzia-i-wskazówki\\\"\u003e\u003e\u003e\u003c/a\u003ePrzydatne narzędzia i wskazówki\u003c/h2\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eTSX (lub JSX z TypeScriptem)\u003c/strong\u003e - Twoje pliki React powinny mieć rozszerzenie \u003ccode\u003e.tsx\u003c/code\u003e (lub \u003ccode\u003e.jsx\u003c/code\u003e jeśli używasz React w trybie TypeScript, ale \u003ccode\u003e.tsx\u003c/code\u003e jest standardem). Pozwalają one na mieszanie składni JSX z typami TypeScript!\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eTypeScript Playground\u003c/strong\u003e - idealne narzędzie do szybkiego testowania kodu TypeScript online bez konfiguracji środowiska:\\n\u003ccode\u003ehttps://www.typescriptlang.org/play\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eOficjalna dokumentacja React + TypeScript:\u003c/strong\u003e Zawsze warto zajrzeć do źródła - dokumentacja Reacta ma dedykowaną sekcję o TypeScript:\\n\u003ccode\u003ehttps://react.dev/learn/typescript\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eChcesz szybko wystartować z nowym projektem?\u003c/strong\u003e Użyj Vite z szablonem React + TypeScript:\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm create vite@latest my-react-ts-app -- --template react-ts\\n\u003c/code\u003e\u003c/pre\u003e\\nTo polecenie automatycznie skonfiguruje projekt z Vite, Reactem i TypeScriptem, gotowy do pracy od razu.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zadania-do-wykonania\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadania-do-wykonania\\\"\u003e\u003e\u003e\u003c/a\u003eZadania do wykonania\u003c/h2\u003e\\n\u003cp\u003ePoniższe zadania pomogą Ci utrwalić wiedzę o podstawach typowania w React z TypeScriptem. Stwórz nowy projekt React z Vite (jeśli jeszcze tego nie zrobiłeś/aś za pomocą polecenia \u003ccode\u003enpm create vite@latest my-react-ts-app -- --template react-ts\u003c/code\u003e), a następnie wykonaj w nim poniższe zadania, tworząc osobne komponenty w katalogu \u003ccode\u003esrc/components\u003c/code\u003e. P
