utton--primary.\",{\"_28\":59,\"_30\":60,\"_36\":56,\"_38\":65},\"\u003cp\u003eKtóre z poniższych NIE jest zgodne z zasadami BEM?\u003c/p\u003e\",[61,62,63,64],\"form__input__label\",\"form__group\",\"form__input--active\",\"form--login\",\"form__input__label łamie zasadę: nie zagnieżdżamy elementów w elementach.\",{\"_28\":67,\"_30\":68,\"_36\":47,\"_38\":73},\"\u003cp\u003eDlaczego warto stosować BEM?\u003c/p\u003e\",[69,70,71,72],\"Bo jest wymagane przez wszystkie przeglądarki\",\"Bo pozwala pisać CSS wyłącznie w JavaScript\",\"Bo wymusza używanie tylko jednego pliku CSS\",\"Bo ułatwia modularność i unikanie konfliktów nazw klas\",\"BEM zwiększa modularność, czytelność i pomaga unikać konfliktów w nazwach klas.\",\"slug\",\"szybszy-css-czyli-wprowadzenie-do-bem\",\"content\",\"\u003cp\u003eWitaj w świecie \u003cstrong\u003eBEM\u003c/strong\u003e! 🚀 Jeśli pracujesz nad coraz większymi i bardziej złożonymi projektami webowymi, z pewnością zauważasz, jak łatwo kod CSS może stać się chaotyczny i trudny do zarządzania. Właśnie tutaj z pomocą przychodzi \u003cstrong\u003eBEM\u003c/strong\u003e - metodyka, która wprowadza porządek i logikę do Twoich stylów, sprawiając, że są one \u003cstrong\u003emodułowe, skalowalne i łatwe do utrzymania\u003c/strong\u003e. Gotowy/a na rewolucję w sposobie pisania CSS? Zaczynamy! 💡\u003c/p\u003e\\n\u003ch2 id=\\\"czym-jest-bem-i-dlaczego-warto-go-stosować\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czym-jest-bem-i-dlaczego-warto-go-stosować\\\"\u003e\u003e\u003e\u003c/a\u003eCzym jest BEM i dlaczego warto go stosować?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eBEM\u003c/strong\u003e to skrót od \u003cstrong\u003eBlock, Element, Modifier\u003c/strong\u003e (Blok, Element, Modyfikator). To nie jest język programowania ani framework CSS, lecz \u003cstrong\u003emetodyka nazewnictwa klas CSS\u003c/strong\u003e. Jej głównym celem jest uporządkowanie i ustandaryzowanie sposobu, w jaki nadajesz nazwy swoim klasom w HTML i CSS, co prowadzi do:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eModularności:\u003c/strong\u003e Każdy komponent jest niezależny i może być ponownie użyty w różnych miejscach projektu bez obawy o konflikty stylów.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwości utrzymania:\u003c/strong\u003e Dzięki jasnym i przewidywalnym nazwom klas, Ty (lub inni deweloperzy) możecie szybko zrozumieć strukturę i przeznaczenie każdego elementu, co ułatwia debugowanie i wprowadzanie zmian.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSkalowalności:\u003c/strong\u003e Metodyka BEM świetnie sprawdza się w dużych projektach z wieloma deweloperami, zapewniając spójność i minimalizując ryzyko regresji.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eUnikania konfliktów:\u003c/strong\u003e Unikalne nazwy klas dla bloków, elementów i modyfikatorów znacznie zmniejszają szansę na niepożądane nadpisywanie stylów.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eJasności kodu:\u003c/strong\u003e Nazwa klasy od razu mówi, co dany element reprezentuje i jaką ma rolę w kontekście bloku.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eWyobraź sobie budowanie domu z klocków LEGO. HTML to Twoje klocki, a CSS to farby i dekoracje. Bez BEM, każdy deweloper mógłby nazwać czerwony klocek \\\"czerwony\\\", \\\"blok-kolor\\\", \\\"rzecz-czerwona\\\", co szybko prowadziłoby do bałaganu. BEM zapewnia, że wszyscy nazywają ten klocek \\\"budynek__ściana--czerwona\\\", od razu wiedząc, że to ściana należąca do budynku, w wariancie czerwonym.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"trzy-filary-bem-blok-element-modyfikator\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#trzy-filary-bem-blok-element-modyfikator\\\"\u003e\u003e\u003e\u003c/a\u003eTrzy filary BEM: Blok, Element, Modyfikator\u003c/h2\u003e\\n\u003cp\u003ePodstawą metodyki BEM są trzy kluczowe koncepty, które określają sposób organizacji i nazewnictwa klas CSS.\u003c/p\u003e\\n\u003ch3 id=\\\"blok-block\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#blok-block\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eBlok (Block)\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eBlok\u003c/strong\u003e to niezależny, samodzielny komponent interfejsu użytkownika. Możesz go myśleć jako o \\\"funkcjonalnej\\\" i \\\"wizualnej\\\" całości, którą można przenieść i użyć w dowolnym miejscu strony. Blok może zawierać w sobie inne bloki lub elementy.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eCechy bloku:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eJest niezależny i może być umieszczony w dowolnym miejscu.\u003c/li\u003e\\n\u003cli\u003eMa unikalną nazwę, która opisuje jego przeznaczenie (np. \u003ccode\u003eheader\u003c/code\u003e, \u003ccode\u003emenu\u003c/code\u003e, \u003ccode\u003ebutton\u003c/code\u003e, \u003ccode\u003eform\u003c/code\u003e, \u003ccode\u003ecard\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eNie powinien mieć marginesów zewnętrznych (margin) ani pozycji (position), które mogłyby wpłynąć na jego umiejscowienie w innym kontekście. Te style powinny być zarządzane przez jego rodzica lub inny blok.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykłady nazw bloków:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e.header\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.button\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.search\u003c/code\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.product-card\u003c/code\u003e\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład HTML:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eheader\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"header\\\"\u003c/span\u003e\u003e\u003c/span\u003e...\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eheader\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"button\\\"\u003c/span\u003e\u003e\u003c/span\u003e...\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eform\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"search\\\"\u003c/span\u003e\u003e\u003c/span\u003e...\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eform\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"element-element\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#element-element\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eElement (Element)\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eElement\u003c/strong\u003e to część bloku, która \u003cstrong\u003enie ma samodzielnego znaczenia\u003c/strong\u003e poza kontekstem swojego bloku. Jest funkcjonalnie zależny od bloku, do którego należy.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eCechy elementu:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eNie można go używać samodzielnie poza blokiem.\u003c/li\u003e\\n\u003cli\u003eNazwa elementu jest związana z nazwą bloku za pomocą \u003cstrong\u003edwóch podkreślników (\u003ccode\u003e__\u003c/code\u003e)\u003c/strong\u003e.\u003c/li\u003e\\n\u003cli\u003eNazwa opisuje jego przeznaczenie w kontekście bloku (np. \u003ccode\u003emenu__item\u003c/code\u003e, \u003ccode\u003ebutton__icon\u003c/code\u003e, \u003ccode\u003eform__input\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eElement może zawierać w sobie inne elementy, ale w nazewnictwie BEM zawsze odwołujemy się do \u003cstrong\u003ebloku rodzica\u003c/strong\u003e, a nie do elementu, który jest jego bezpośrednim rodzicem. Dzięki temu struktura nazewnictwa jest \\\"płaska\\\" i czytelna.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykłady nazw elementów:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e.menu__item\u003c/code\u003e (element \u003ccode\u003eitem\u003c/code\u003e bloku \u003ccode\u003emenu\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.button__icon\u003c/code\u003e (element \u003ccode\u003eicon\u003c/code\u003e bloku \u003ccode\u003ebutton\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.search__field\u003c/code\u003e (element \u003ccode\u003efield\u003c/code\u003e bloku \u003ccode\u003esearch\u003c/code\u003e)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład HTML:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"menu\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"menu__item\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"#\\\"\u003c/span\u003e\u003e\u003c/span\u003eStrona główna\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"menu__item\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"#\\\"\u003c/span\u003e\u003e\u003c/span\u003eO nas\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"button\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003espan\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"button__icon\\\"\u003c/span\u003e\u003e\u003c/span\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003espan\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003espan\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"button__text\\\"\u003c/span\u003e\u003e\u003c/span\u003eWyślij\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003espan\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"modyfikator-modifier\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#modyfikator-modifier\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eModyfikator (Modifier)\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eModyfikator\u003c/strong\u003e to flaga lub atrybut, który definiuje \u003cstrong\u003ewygląd, stan lub zachowanie\u003c/strong\u003e bloku lub elementu. Modyfikatory służą do tworzenia wariantów komponentów bez konieczności duplikowania kodu CSS.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eCechy modyfikatora:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eZawsze występuje obok nazwy bloku lub elementu, do którego się odnosi.\u003c/li\u003e\\n\u003cli\u003eNazwa modyfikatora jest związana z nazwą bloku lub elementu za pomocą \u003cstrong\u003edwóch myślników (\u003ccode\u003e--\u003c/code\u003e)\u003c/strong\u003e.\u003c/li\u003e\\n\u003cli\u003eOpisuje cechę lub stan (np. \u003ccode\u003ebutton--primary\u003c/code\u003e, \u003ccode\u003ebutton--disabled\u003c/code\u003e, \u003ccode\u003emenu__item--active\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eElement może mieć wiele modyfikatorów.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykłady nazw modyfikatorów:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003e.button--primary\u003c/code\u003e (blok \u003ccode\u003ebutton\u003c/code\u003e w wariancie \u003ccode\u003eprimary\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.button--disabled\u003c/code\u003e (blok \u003ccode\u003ebutton\u003c/code\u003e w stanie \u003ccode\u003edisabled\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003e.menu__item--active\u003c/code\u003e (element \u003ccode\u003eitem\u003c/code\u003e bloku \u003ccode\u003emenu\u003c/code\u003e w stanie \u003ccode\u003eactive\u003c/code\u003e)\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykład HTML:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"button button--primary\\\"\u003c/span\u003e\u003e\u003c/span\u003eGłówny przycisk\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"button button--disabled\\\"\u003c/span\u003e\u003e\u003c/span\u003eWyłączony przycisk\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"menu\\\"\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"menu__item menu__item--active\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"#\\\"\u003c/span\u003e\u003e\u003c/span\u003eAktywna pozycja menu\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"menu__item\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"#\\\"\u003c/span\u003e\u003e\u003c/span\u003eInna pozycja menu\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWażne:\u003c/strong\u003e Zauważ, że modyfikator \u003cstrong\u003ezawsze jest dodawany jako dodatkowa klasa\u003c/strong\u003e do istniejącej klasy bloku lub elementu, a nie zastępuje jej.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"konwencje-nazewnictwa-w-bem\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#konwencje-nazewnictwa-w-bem\\\"\u003e\u003e\u003e\u003c/a\u003eKonwencje nazewnictwa w BEM\u003c/h2\u003e\\n\u003cp\u003eKonwencje nazewnictwa w BEM są rygorystyczne, co pomaga utrzymać spójność i czytelność:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eNazwy klas powinny być pisane małymi literami.\u003c/strong\u003e\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eSłowa w nazwach oddzielamy pojedynczym myślnikiem \u003ccode\u003e-\u003c/code\u003e.\u003c/strong\u003e (np. \u003ccode\u003eproduct-card\u003c/code\u003e, \u003ccode\u003esearch-field\u003c/code\u003e)\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eBlok\u003c/strong\u003e\\n\u003cul\u00 ecolor\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#007bff\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.button--primary\u003c/span\u003e\u003cspan class=\\\"hljs-selector-pseudo\\\"\u003e:hover\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#0056b3\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.button--danger\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#dc3545\u003c/span\u003e;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecolor\u003c/span\u003e: white;\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eborder-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#dc3545\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.button--danger\u003c/span\u003e\u003cspan class=\\\"hljs-selector-pseudo\\\"\u003e:hover\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ebackground-color\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e#c82333\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-selector-class\\\"\u003e.button--disabled\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003eopacity\u003c/span\u003e: \u003cspan class=\\\"hljs-number\\\"\u003e0.6\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Lekka przezroczystość */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003ecursor\u003c/span\u003e: not-allowed; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Kursor \\\"zakaz\\\" */\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-attribute\\\"\u003epointer-events\u003c/span\u003e: none; \u003cspan class=\\\"hljs-comment\\\"\u003e/* Blokuje interakcje z myszą */\u003c/span\u003e\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eW tym przykładzie widać, jak BEM pomaga w jasny sposób zdefiniować:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003e.button\u003c/code\u003e\u003c/strong\u003e: Podstawowy styl dla każdego przycisku.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003e.button__text\u003c/code\u003e\u003c/strong\u003e, \u003cstrong\u003e\u003ccode\u003e.button__icon\u003c/code\u003e\u003c/strong\u003e: Style dla wewnętrznych części przycisku.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003e\u003ccode\u003e.button--primary\u003c/code\u003e\u003c/strong\u003e, \u003cstrong\u003e\u003ccode\u003e.button--danger\u003c/code\u003e\u003c/strong\u003e, \u003cstrong\u003e\u003ccode\u003e.button--disabled\u003c/code\u003e\u003c/strong\u003e: Specyficzne warianty lub stany przycisku, które nadpisują lub dodają style do podstawowego bloku \u003ccode\u003e.button\u003c/code\u003e.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zasady-i-najlepsze-praktyki-bem\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zasady-i-najlepsze-praktyki-bem\\\"\u003e\u003e\u003e\u003c/a\u003eZasady i najlepsze praktyki BEM\u003c/h2\u003e\\n\u003cp\u003eAby w pełni wykorzystać potencjał BEM, warto przestrzegać kilku kluczowych zasad:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003eStruktura klas jest płaska:\u003c/strong\u003e Każdy element odnosi się bezpośrednio do swojego bloku (np. \u003ccode\u003eblock__element\u003c/code\u003e), a nie do zagnieżdżonego elementu (\u003ccode\u003eblock__element__nested-element\u003c/code\u003e jest błędem). To zapobiega zbyt długim i nieczytelnym nazwom.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eUnikaj selektorów tagów i ID w CSS:\u003c/strong\u003e Style powinny być przypisywane tylko do klas BEM. Użycie selektorów tagów (np. \u003ccode\u003ediv {}\u003c/code\u003e) lub ID (np. \u003ccode\u003e#my-id {}\u003c/code\u003e) sprawia, że style są mniej modularne i trudniejsze do ponownego użycia.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eModyfikatory nie zmieniają struktury:\u003c/strong\u003e Modyfikatory powinny zmieniać wygląd lub zachowanie, a nie strukturę bloku czy elementu. Jeśli potrzebujesz fundamentalnie innej struktury, rozważ stworzenie nowego bloku.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eNazwy są opisowe:\u003c/strong\u003e Nazwy powinny jasno wskazywać, co dany blok, element lub modyfikator robi lub reprezentuje.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eModularność ponad wszystko:\u003c/strong\u003e Myśl o każdym bloku jako o samodzielnym, przenośnym komponencie.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eUżywaj preprocesorów CSS:\u003c/strong\u003e Takie narzędzia jak Sass/Less mogą znacznie ułatwić pisanie CSS w oparciu o BEM dzięki możliwościom zagnieżdżania i zmiennych.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003e\u003cstrong\u003eKiedy NIE stosować BEM?\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eW bardzo małych projektach (jedna, dwie strony), gdzie narzut na nazewnictwo może być większy niż korzyści.\u003c/li\u003e\\n\u003cli\u003eGdy preferujesz inne metodyki (np. CSS Modules, styled-components w React, Utility-First CSS jak Tailwind).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zaawansowane-przykłady-zastosowania-bem\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zaawansowane-przykłady-zastosowania-bem\\\"\u003e\u003e\u003e\u003c/a\u003eZaawansowane przykłady zastosowania BEM\u003c/h2\u003e\\n\u003ch3 id=\\\"formularz-logowania\\\" class=\\\"scroll-mt-19\\\"\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#formularz-logowania\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eFormularz logowania\u003c/
