{\"_26\":56,\"_28\":57,\"_34\":45,\"_36\":62},\"\u003cp\u003eJak za pomocą DOM dodać nowy element do listy \u003ccode\u003eul\u003c/code\u003e?\u003c/p\u003e\",[58,59,60,61],\"Utworzyć element przez createElement i dołączyć przez appendChild\",\"Użyć innerHTML na ul\",\"Zmienić atrybut src\",\"Użyć metody getElementsByTagName\",\"Tworzymy element createElement i dołączamy przez appendChild.\",{\"_26\":64,\"_28\":65,\"_34\":70,\"_36\":71},\"\u003cp\u003eCo umożliwia metoda \u003ccode\u003equerySelectorAll?\u003c/code\u003e\u003c/p\u003e\",[66,67,68,69],\"Usunięcie elementu\",\"Zmianę atrybutu id\",\"Zmianę tekstu elementu\",\"Wybór wielu elementów za pomocą selektora CSS\",3,\"querySelectorAll wybiera wszystkie pasujące elementy zgodnie z selektorem CSS.\",\"slug\",\"wprowadzenie-do-dom\",\"content\",\"\u003cp\u003eWitaj w świecie \u003cstrong\u003eDOM\u003c/strong\u003e! 🌐 Jeśli HTML to struktura Twojej strony, a CSS to jej styl, to \u003cstrong\u003eDOM\u003c/strong\u003e jest niczym most, który pozwala Ci komunikować się z nimi za pomocą JavaScriptu. Dzięki DOM Twoje statyczne strony internetowe mogą ożyć, reagować na interakcje użytkownika i dynamicznie zmieniać swoją zawartość. Gotowy/a, by dowiedzieć się, jak JavaScript \\\"widzi\\\" Twoją stronę i jak możesz ją programowo modyfikować? Zaczynamy! 💻\u003c/p\u003e\\n\u003ch2 id=\\\"wprowadzenie-czym-jest-dom\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wprowadzenie-czym-jest-dom\\\"\u003e\u003e\u003e\u003c/a\u003eWprowadzenie: Czym jest DOM?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eDOM\u003c/strong\u003e (ang. \u003cstrong\u003eDocument Object Model\u003c/strong\u003e, czyli Model Obiektowy Dokumentu) to \u003cstrong\u003einterfejs programistyczny (API)\u003c/strong\u003e, który pozwala na interakcję z dokumentami HTML i XML za pomocą języków skryptowych, takich jak \u003cstrong\u003eJavaScript\u003c/strong\u003e.\u003c/p\u003e\\n\u003cp\u003eWyobraź sobie przeglądarkę internetową, która ładuje stronę HTML. Kiedy to się dzieje, przeglądarka nie widzi tylko surowego tekstu kodu. Zamiast tego, tworzy w pamięci \u003cstrong\u003eobiektową reprezentację\u003c/strong\u003e tego dokumentu - właśnie to jest DOM.\u003c/p\u003e\\n\u003cp\u003eDOM przedstawia cały dokument jako \u003cstrong\u003estrukturę drzewiastą\u003c/strong\u003e, gdzie każdy element HTML (jak \u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e, \u003ccode\u003e\u0026#x3C;div\u003e\u003c/code\u003e), każdy atrybut (jak \u003ccode\u003ehref\u003c/code\u003e, \u003ccode\u003esrc\u003c/code\u003e, \u003ccode\u003eid\u003c/code\u003e, \u003ccode\u003eclass\u003c/code\u003e) i każdy fragment tekstu (nawet komentarze) jest oddzielnym \u003cstrong\u003ewęzłem (node)\u003c/strong\u003e. Te węzły są ze sobą powiązane relacjami rodzic-dziecko-rodzeństwo, tworząc hierarchiczne \\\"drzewo\\\".\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eDlaczego to takie ważne?\u003c/strong\u003e\\nBez DOM, strony internetowe byłyby statyczne. Nie moglibyśmy:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eZmieniać tekstu na stronie po jej załadowaniu.\u003c/li\u003e\\n\u003cli\u003eDodawać lub usuwać nowych elementów (np. pozycji na liście zakupów).\u003c/li\u003e\\n\u003cli\u003eModyfikować stylów CSS dynamicznie (np. zmienić kolor tła po kliknięciu przycisku).\u003c/li\u003e\\n\u003cli\u003eReagować na akcje użytkownika (kliknięcia, ruchy myszy, wprowadzanie danych).\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eDzięki DOM, JavaScript może \\\"widzieć\\\" i \\\"dotykać\\\" każdy element na stronie, umożliwiając tworzenie dynamicznych i interaktywnych aplikacji webowych. To most między Twoim kodem HTML/CSS a logiką po stronie klienta, którą piszesz w JavaScripcie.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"struktura-dom-drzewo-węzłów\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#struktura-dom-drzewo-węzłów\\\"\u003e\u003e\u003e\u003c/a\u003eStruktura DOM: Drzewo węzłów\u003c/h2\u003e\\n\u003cp\u003eJak wspomniano, DOM reprezentuje dokument HTML jako \u003cstrong\u003ehierarchiczne drzewo węzłów\u003c/strong\u003e. Na samym szczycie znajduje się obiekt \u003ccode\u003edocument\u003c/code\u003e, który jest punktem wejścia do całego drzewa. Każdy element HTML, tekst wewnątrz niego, a nawet atrybuty, stają się odrębnymi węzłami.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003ePrzykładowy dokument HTML:\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e\u0026#x3C;!DOCTYPE \u003cspan class=\\\"hljs-keyword\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003eMoja Strona\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003etitle\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehead\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"main-title\\\"\u003c/span\u003e\u003e\u003c/span\u003eWitaj na stronie!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"intro-text\\\"\u003c/span\u003e\u003e\u003c/span\u003eTo jest pierwszy akapit.\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ehref\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"https://example.com\\\"\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"intro-text\\\"\u003c/span\u003e\u003e\u003c/span\u003eLink\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ea\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebody\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ehtml\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eReprezentacja tego dokumentu w DOM (uproszczony widok drzewa):\u003c/strong\u003e\u003c/p\u003e\\n\u003cpre\u003e\u003ccode\u003edocument (cały dokument)\\n└── html (element HTML)\\n    ├── head (element HTML)\\n    │   └── title (element HTML)\\n    │       └── \\\"Moja Strona\\\" (węzeł tekstowy)\\n    └── body (element HTML)\\n        ├── h1 (element HTML)\\n        │   ├── id=\\\"main-title\\\" (węzeł atrybutu)\\n        │   └── \\\"Witaj na stronie!\\\" (węzeł tekstowy)\\n        ├── p (element HTML)\\n        │   ├── class=\\\"intro-text\\\" (węzeł atrybutu)\\n        │   └── \\\"To jest pierwszy akapit.\\\" (węzeł tekstowy)\\n        └── a (element HTML)\\n            ├── href=\\\"https://example.com\\\" (węzeł atrybutu)\\n            ├── class=\\\"intro-text\\\" (węzeł atrybutu)\\n            └── \\\"Link\\\" (węzeł tekstowy)\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eW tym drzewie:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ccode\u003edocument\u003c/code\u003e jest \u003cstrong\u003ekorzeniem\u003c/strong\u003e drzewa.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003ehtml\u003c/code\u003e jest \u003cstrong\u003edzieckiem\u003c/strong\u003e \u003ccode\u003edocument\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003ehead\u003c/code\u003e i \u003ccode\u003ebody\u003c/code\u003e to \u003cstrong\u003edzieci\u003c/strong\u003e \u003ccode\u003ehtml\u003c/code\u003e i jednocześnie \u003cstrong\u003erodzeństwo\u003c/strong\u003e względem siebie.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003etitle\u003c/code\u003e jest \u003cstrong\u003edzieckiem\u003c/strong\u003e \u003ccode\u003ehead\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eTekst (\\\"Moja Strona\\\") jest \u003cstrong\u003edzieckiem\u003c/strong\u003e \u003ccode\u003etitle\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003e\u003ccode\u003eh1\u003c/code\u003e, \u003ccode\u003ep\u003c/code\u003e, \u003ccode\u003ea\u003c/code\u003e są \u003cstrong\u003edziećmi\u003c/strong\u003e \u003ccode\u003ebody\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eKażdy węzeł może mieć swoje własne dzieci.\u003c/li\u003e\\n\u003cli\u003eAtrybuty są również traktowane jako węzły.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eZrozumienie tej struktury jest kluczowe, ponieważ wszystkie operacje DOM polegają na nawigowaniu po tym drzewie (np. znajdowanie rodziców, dzieci, rodzeństwa) i manipulowaniu jego węzłami.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowe-operacje-na-dom-za-pomocą-javascriptu\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowe-operacje-na-dom-za-pomocą-javascriptu\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowe operacje na DOM za pomocą JavaScriptu\u003c/h2\u003e\\n\u003cp\u003eAby manipulować DOM, JavaScript oferuje szereg wbudowanych metod dostępnych poprzez globalny obiekt \u003ccode\u003edocument\u003c/code\u003e. Oto najważniejsze z nich:\u003c/p\u003e\\n\u003ch3 id=\\\"wybieranie-elementów\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wybieranie-elementów\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eWybieranie elementów\u003c/h3\u003e\\n\u003cp\u003eZanim zmienisz cokolwiek na stronie, musisz najpierw \u003cstrong\u003ewybrać\u003c/strong\u003e element(y), które chcesz zmodyfikować.\u003c/p\u003e\\n\u003ch4 id=\\\"getelementbyid\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#getelementbyid\\\"\u003e\u003e\u003e\u003e\u003e\u003c/a\u003e\u003ccode\u003egetElementById()\u003c/code\u003e\u003c/h4\u003e\\n\u003cp\u003eTa metoda pozwala pobrać \u003cstrong\u003epojedynczy element\u003c/strong\u003e o konkretnym atrybucie \u003ccode\u003eid\u003c/code\u003e. Ponieważ \u003ccode\u003eid\u003c/code\u003e powinno być unikalne na stronie, zawsze zwróci tylko jeden element lub \u003ccode\u003enull\u003c/code\u003e, jeśli nie znajdzie pasującego ID.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"mojAkapit\\\"\u003c/span\u003e\u003e\u003c/span\u003eCześć, jestem akapit!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eid\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"zmienPrzycisk\\\"\u003c/span\u003e\u003e\u003c/span\u003eZmień ten tekst\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003escript\u003c/span\u003e\u003e\u003c/span\u003e\u003cspan class=\\\"javascript\\\"\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e akapit = \u003cspan class=\\\"hljs-variable language_\\\"\u003edocument\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetElementById\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"mojAkapit\\\"\u003c/span\u003e);\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(akapit.\u003cspan class=\\\"hljs-property\\\"\u003etextContent\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// \\\"Cześć, jestem akapit!\\\"\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e przycisk = \u003cspan class=\\\"hljs-variable language_\\\"\u003edocument\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetElementById\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"zmienPrzycisk\\\"\u003c/span\u003e);\\n  \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(przycisk.\u003cspan class=\\\"hljs-property\\\"\u003etagName\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// \\\"BUTTON\\\"\u003c/span\u003e\\n\u003c/span\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003escript\u003c/span\u003e\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch4 id=\\\"getelementsbyclassname\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#getelementsbyclassname\\\"\u003e\u003e\u003e\u003e\u003e\u003c/a\u003e\u003ccode\u003egetElementsByClassName()\u003c/code\u003e\u003c/h4\u003e\\n\u003cp\u003eTa metoda zwraca \u003cstrong\u003eHTMLCollection\u003c/strong\u003e (podobną do tablicy) wszystkich elementów, które mają określoną klasę CSS.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-html\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eul\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eli\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"item\\\"\u003c/span\u003e\u003e\u003c/span\u003eJabłko\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eli\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eli\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"item\\\"\u003c/span\u003e\u003e\u003c/span\u003eGruszka\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eli\u003c/span\u003e\u003e\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eli\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eclass\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"item
