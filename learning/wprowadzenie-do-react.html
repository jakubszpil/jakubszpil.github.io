o React 16.8)?\u003c/p\u003e\",[54,55,56,57],\"componentDidMount\",\"render\",\"useEffect\",\"componentWillUnmount\",\"`useEffect` to Hook używany w komponentach funkcyjnych do zarządzania efektami pobocznymi, nie jest metodą cyklu życia komponentów klasowych.\",{\"_30\":60,\"_32\":61,\"_38\":66,\"_40\":67},\"\u003cp\u003eCo to jest komponent w React?\u003c/p\u003e\",[62,63,64,65],\"Funkcja do pobierania danych z serwera\",\"Baza danych aplikacji\",\"Plik CSS\",\"Niezależna, wielokrotnego użytku część interfejsu użytkownika\",3,\"Komponent to podstawowy budulec aplikacji React, reprezentujący kawałek UI i jego logikę.\",{\"_30\":69,\"_32\":70,\"_38\":49,\"_40\":75},\"\u003cp\u003eDo czego służą 'propsy' w React?\u003c/p\u003e\",[71,72,73,74],\"Do przekazywania danych z komponentu nadrzędnego do podrzędnego\",\"Do definiowania routingu w aplikacji\",\"Do stylowania komponentów\",\"Do zmieniania stanu komponentu\",\"Propsy (properties) służą do przekazywania danych z komponentu-rodzica do komponentu-dziecka, jednokierunkowo.\",\"slug\",\"wprowadzenie-do-react\",\"content\",\"\u003cp\u003eWitaj w świecie \u003cstrong\u003eReacta\u003c/strong\u003e! 🚀 Jeśli chcesz tworzyć dynamiczne i interaktywne interfejsy użytkownika, to właśnie znalazłeś/aś odpowiednie narzędzie. React to potężna biblioteka JavaScript, która zmienia podejście do budowania aplikacji webowych, koncentrując się na komponentach - niezależnych, wielokrotnego użytku elementach Twojego interfejsu. Gotowy/a, by zanurzyć się w świat deklaratywnego UI i wirtualnego DOM? Zaczynajmy! ✨\u003c/p\u003e\\n\u003ch2 id=\\\"czym-jest-react\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czym-jest-react\\\"\u003e\u003e\u003e\u003c/a\u003eCzym jest React?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eReact\u003c/strong\u003e (często nazywany też React.js lub ReactJS) to popularna, otwarta biblioteka JavaScript do \u003cstrong\u003ebudowania interfejsów użytkownika (UI)\u003c/strong\u003e, stworzona i utrzymywana przez Meta (dawniej Facebook). ⚛️ Nie jest to pełnoprawny framework, jak np. Angular, ale skupia się wyłącznie na warstwie widoku w aplikacjach webowych i mobilnych (React Native).\u003c/p\u003e\\n\u003cp\u003eJego główną filozofią jest tworzenie interfejsów z małych, \u003cstrong\u003eniezależnych i wielokrotnego użytku części\u003c/strong\u003e, zwanych \u003cstrong\u003ekomponentami\u003c/strong\u003e. Dzięki temu, budowanie złożonych aplikacji staje się bardziej uporządkowane, modułowe i łatwiejsze w zarządzaniu. React stał się standardem w branży frontendu, wykorzystywanym przez tysiące firm na całym świecie, od małych startupów po gigantów technologicznych.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"dlaczego-react-główne-zalety\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#dlaczego-react-główne-zalety\\\"\u003e\u003e\u003e\u003c/a\u003eDlaczego React? Główne zalety\u003c/h2\u003e\\n\u003cp\u003eReact zyskał ogromną popularność dzięki wielu korzyściom, które oferuje deweloperom:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003e\u003cstrong\u003eKomponentowa architektura:\u003c/strong\u003e Wszystko w React to komponent! 🧱 Dzięki temu możesz dzielić interfejs na małe, izolowane kawałki, które łatwo testować, rozwijać i ponownie wykorzystywać w różnych częściach aplikacji. To promuje podejście \\\"buduj raz, używaj wszędzie\\\".\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eDeklaratywne podejście:\u003c/strong\u003e W React opisujesz, jak powinien wyglądać interfejs w danym stanie, a React zajmuje się resztą. Nie musisz martwić się o kroki manipulacji DOM (Document Object Model) - React zrobi to za Ciebie. To sprawia, że kod jest bardziej przewidywalny i łatwiejszy do debugowania.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWydajność dzięki Wirtualnemu DOM:\u003c/strong\u003e React używa \u003cstrong\u003eWirtualnego DOM\u003c/strong\u003e, czyli lekkiej kopii prawdziwego DOM w pamięci. Kiedy stan aplikacji się zmienia, React najpierw aktualizuje Wirtualny DOM, porównuje go z poprzednim stanem i dopiero wtedy efektywnie aktualizuje tylko te fragmenty prawdziwego DOM, które faktycznie się zmieniły. To minimalizuje kosztowne operacje na DOM i sprawia, że aplikacje są szybkie. ⚡️\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eJednokierunkowy przepływ danych:\u003c/strong\u003e Dane w React płyną z góry na dół (od komponentów nadrzędnych do podrzędnych) poprzez tzw. \u003cstrong\u003epropsy\u003c/strong\u003e. To upraszcza debugowanie i zarządzanie stanem aplikacji, czyniąc ją bardziej przewidywalną.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eDuża społeczność i ekosystem:\u003c/strong\u003e React ma ogromną i aktywną społeczność deweloperów. Znajdziesz mnóstwo tutoriali, narzędzi, bibliotek pomocniczych (np. do routingu, zarządzania stanem) i wsparcia. To oznacza, że prawdopodobnie znajdziesz rozwiązanie na każdy problem, jaki napotkasz. 🤝\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eJSX:\u003c/strong\u003e Specjalna składnia, która pozwala pisać kod przypominający HTML bezpośrednio w plikach JavaScript. Chociaż na początku może wydawać się dziwna, bardzo ułatwia wizualizację, jak dany komponent będzie wyglądał w przeglądarce.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowe-pojęcia-w-react\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowe-pojęcia-w-react\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowe pojęcia w React\u003c/h2\u003e\\n\u003cp\u003eZanim zaczniemy pisać kod, poznajmy kluczowe terminy i koncepcje, które stanowią fundament Reacta.\u003c/p\u003e\\n\u003ch3 id=\\\"komponenty-serce-reacta\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#komponenty-serce-reacta\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eKomponenty: Serce Reacta\u003c/h3\u003e\\n\u003cp\u003eJak już wspomnieliśmy, \u003cstrong\u003ekomponenty\u003c/strong\u003e są podstawowymi budulcami każdej aplikacji React. Myśl o nich jak o niezależnych, wielokrotnego użytku elementach interfejsu, które mają swoją własną logikę i wygląd. Mogą to być proste elementy, takie jak przycisk czy pole tekstowe, albo bardziej złożone, jak pasek nawigacyjny czy cały formularz logowania.\u003c/p\u003e\\n\u003cp\u003eW tym wprowadzeniu skupimy się na \u003cstrong\u003ekomponentach funkcyjnych\u003c/strong\u003e, ponieważ są one obecnie standardem i wykorzystują \u003cstrong\u003eHooki\u003c/strong\u003e, o których dowiemy się więcej za chwilę.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Przykład prostego komponentu funkcyjnego\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eWelcome\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Komponent funkcyjny, który zwraca JSX\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eWelcome to React! 👋\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eTen komponent \u003ccode\u003eWelcome\u003c/code\u003e renderuje prosty nagłówek \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e.\u003c/p\u003e\\n\u003ch3 id=\\\"jsx-javascript--xmlhtml\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#jsx-javascript--xmlhtml\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eJSX: JavaScript + XML/HTML\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eJSX\u003c/strong\u003e (JavaScript XML) to rozszerzenie składni JavaScriptu, które pozwala nam pisać kod przypominający HTML bezpośrednio w plikach JavaScript. To może być mylące na początku, ponieważ miesza logikę JavaScript z deklaracjami UI, ale ma to na celu ułatwienie tworzenia komponentów.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e element = \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eHello, world!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// To jest JSX\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWażne:\u003c/strong\u003e Przeglądarki nie rozumieją JSX. Jest on transpilowany (przetłumaczony) na standardowy JavaScript przez narzędzia takie jak Babel, zanim kod zostanie uruchomiony w przeglądarce. JSX jest konwertowany na wywołania funkcji \u003ccode\u003ecreateElement\u003c/code\u003e (z pakietu \u003ccode\u003ereact\u003c/code\u003e).\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// Ten JSX:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e element = \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eHello, world!\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// jest transpilowany do (uproszczone):\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e element = \u003cspan class=\\\"hljs-title class_\\\"\u003eReact\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003ecreateElement\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"h1\\\"\u003c/span\u003e, \u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e, \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Hello, world!\\\"\u003c/span\u003e);\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eDzięki JSX kod jest bardziej intuicyjny i przypomina strukturę, którą widzimy w przeglądarce. ✨\u003c/p\u003e\\n\u003ch3 id=\\\"propsy-properties-przekazywanie-danych\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#propsy-properties-przekazywanie-danych\\\"\u003e\u003e\u003e\u003e\u003c/a\u003ePropsy (Properties): Przekazywanie danych\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003ePropsy\u003c/strong\u003e (skrót od \\\"properties\\\") to sposób na przekazywanie danych z komponentu nadrzędnego (rodzica) do komponentu podrzędnego (dziecka). Działają one podobnie do atrybutów HTML i są \u003cstrong\u003etylko do odczytu\u003c/strong\u003e - komponent podrzędny nie powinien modyfikować swoich propsów. To zapewnia jednokierunkowy przepływ danych, co ułatwia zarządzanie stanem aplikacji.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eWelcome\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eprops\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Komponent funkcyjny przyjmuje obiekt props jako argument\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eHello, {props.name}! 👋\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eApp\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eWelcome\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Alice\\\"\u003c/span\u003e /\u003e\u003c/span\u003e {/* Przekazujemy props 'name' */}\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eWelcome\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Bob\\\"\u003c/span\u003e /\u003e\u003c/span\u003e {/* Kolejne użycie z innym propsem */}\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Renderowanie komponentu App spowoduje wyświetlenie:\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// \u0026#x3C;h1\u003eHello, Alice!\u0026#x3C;/h1\u003e\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// \u0026#x3C;h1\u003eHello, Bob!\u0026#x3C;/h1\u003e\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003ch3 id=\\\"stan-state-zarządzanie-danymi-wewnętrznymi\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#stan-state-zarządzanie-danymi-wewnętrznymi\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eStan (State): Zarządzanie danymi wewnętrznymi\u003c/h3\u003e\\n\u003cp\u003ePodczas gdy propsy służą do przekazywania danych z zewnątrz, \u003cstrong\u003estan (state)\u003c/strong\u003e służy do zarządzania danymi, które są \u003cstrong\u003ewewnętrzne\u003c/strong\u003e dla komponentu i mogą się zmieniać w czasie. Kiedy stan komponentu się zmienia, React automatycznie ponownie renderuje ten komponent, aby odzwierciedlić nowe dane.\u003c/p\u003e\\n\u003cp\u003eW komponentach funkcyjnych stan zarządzany jest za pomocą \u003cstrong\u003eHooków\u003c/strong\u003e, w szczególności \u003ccode\u003euseState\u003c/code\u003e.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { useState } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"react\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Importujemy Hook useState\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eCounter\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Deklaracja stanu 'count' z początkową wartością 0\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// 'count' to bieżąca wartość, 'setCount' to funkcja do jej aktualizacji\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [count, setCount] = \u003cspan class=\\\"hljs-title function_\\\"\u003euseState\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e0\u003c/span\u003e);\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eincrement\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) =\u003e {\\n    \u003cspan class=\\\"hljs-title function_\\\"\u003esetCount\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eprev\u003c/span\u003e) =\u003e\u003c/span\u003e prev + \u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e);\\n  };\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003edecrement\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) =\u003e {\\n    \u003cspan class=\\\"hljs-title function_\\\"\u003esetCount\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eprev\u003c/span\u003e) =\u003e\u003c/span\u003e prev - \u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e);\\n  };\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eCount: {count}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      {/* Zwiększamy licznik */}\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{increment}\u003c/span\u003e\u003e\u003c/span\u003eIncrement\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n      {/* Zmniejszamy licznik */}\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{decrement}\u003c/span\u003e\u003e\u003c/span\u003eDecrement\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eKliknięcie przycisków spowoduje zmianę stanu \u003ccode\u003ecount\u003c/code\u003e, co automatycznie zaktualizuje wyświetlaną wartość. 🔢\u003c/p\u003e\\n\u003ch3 id=\\\"wirtualny-dom-wydajne-aktualizacje\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wirtualny-dom-wydajne-aktualizacje\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eWirtualny DOM: Wydajne aktualizacje\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eWirtualny DOM\u003c/strong\u003e jest jednym z kluczowych powodów, dla których React jest tak wydajny. Zamiast bezpośrednio manipulować prawdziwym DOM (co jest kosztowne), React tworzy jego lekką kopię w pamięci.\u003c/p\u003e\\n\u003cp\u003e\u003cstrong\u003eJak to działa?\u003c/strong\u003e\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003eKiedy stan aplikacji się zmienia, React tworzy \u003cstrong\u003enowy Wirtualny DOM\u003c/strong\u003e.\u003c/li\u003e\\n\u003cli\u003ePorównuje go z \u003cstrong\u003epoprzednim Wirtualnym DOM\u003c/strong\u003e (proces zwany \\\"diffing\\\").\u003c/li\u003e\\n\u003cli\u003eOblicza minimalną liczbę zmian potrzebnych do zaktualizowania prawdziwego DOM.\u003c/li\u003e\\n\u003cli\u003eWprowadza te minimalne zmiany do \u003cstrong\u003eprawdziwego DOM\u003c/strong\u003e.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cp\u003eDzięki temu React unika zbędnych operacji, co przekłada się na płynniejsze i szybsze działanie aplikacji, nawet przy częstych aktualizacjach. 🚀\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"tworzenie-pierwszej-aplikacji-react-z-vite\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#tworzenie-pierwszej-aplikacji-react-z-vite\\\"\u003e\u003e\u003e\u003c/a\u003eTworzenie pierwszej aplikacji React z Vite\u003c/h2\u003e\\n\u003cp\u003eNowoczesne aplikacje React rzadko są tworzone od podstaw bez żadnego narzędzia. Zamiast przestarzałego \u003ccode\u003ecreate-react-app\u003c/code\u003e, obecnie popularne są szybsze i bardziej elastyczne narzędzia takie jak \u003cstrong\u003eVite\u003c/strong\u003e.\u003c/p\u003e\\n\u003ch3 id=\\\"dlaczego-vite\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#dlaczego-vite\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eDlaczego Vite?\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eVite\u003c/strong\u003e to narzędzie do budowania frontendów, które oferuje bardzo szybkie uruchamianie serwera deweloperskiego (Dev Server) oraz błyskawiczne aktualizacje modułów (HMR - Hot Module Replacement). Dzieje się tak dzięki wykorzystaniu natywnych modułów ES w przeglądarce podczas dewelopmentu, co eliminuje potrzebę pełnej rekompilacji kodu przy każdej zmianie. Dla dewelopera oznacza to znacznie szybsze i przyjemniejsze doświadczenie. ⚡\u003c/p\u003e\\n\u003ch3 id=\\\"inicjalizacja-projektu\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#inicjalizacja-projektu\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eInicjalizacja projektu\u003c/h3\u003e\\n\u003cp\u003e\u003cstrong\u003eKroki do utworzenia nowej aplikacji React z Vite:\u003c/strong\u003e\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003eUpewnij się, że masz zainstalowany \u003cstrong\u003eNode.js\u003c/strong\u003e (wraz z npm lub yarn) na swoim komputerze.\u003c/li\u003e\\n\u003cli\u003eOtwórz terminal (lub wiersz poleceń).\u003c/li\u003e\\n\u003cli\u003eUruchom polecenie:\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm create vite@latest\\n\u003c/code\u003e\u003c/pre\u003e\\nlub\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003eyarn create vite\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003eZostaniesz poproszony/a o podanie nazwy projektu (np. \u003ccode\u003emy-react-app\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eNastępnie wybierz framework: \u003ccode\u003eReact\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eWybierz wariant: \u003ccode\u003eJavaScript\u003c/code\u003e (lub \u003ccode\u003eTypeScript\u003c/code\u003e, jeśli znasz).\u003c/li\u003e\\n\u003cli\u003ePo zakończeniu instalacji, przejdź do katalogu projektu:\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003e\u003cspan class=\\\"hljs-built_in\\\"\u003ecd\u003c/span\u003e my-react-app\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003eZainstaluj zależności:\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm install\\n\u003c/code\u003e\u003c/pre\u003e\\nlub\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003eyarn install\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/li\u003e\\n\u003cli\u003eUruchom aplikację:\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003enpm run dev\\n\u003c/code\u003e\u003c/pre\u003e\\nlub\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-bash\\\"\u003eyarn dev\\n\u003c/code\u003e\u003c/pre\u003e\\nTo uruchomi serwer deweloperski, a Twoja aplikacja będzie dostępna pod adresem \u003ccode\u003ehttp://localhost:5173\u003c/code\u003e (lub podobnym). 🎉\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003ch3 id=\\\"struktura-projektu\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#struktura-projektu\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eStruktura projektu\u003c/h3\u003e\\n\u003cp\u003ePo utworzeniu aplikacji Vite zobaczysz następującą strukturę katalogów (uproszczoną):\u003c/p\u003e\\n\u003cpre\u003e\u003ccode\u003emy-react-app/\\n├── node_modules/       # Zależności projektu\\n├── public/             # Publiczne zasoby (np. favicon.svg)\\n├── src/                # Tutaj piszesz swój kod React!\\n│   ├── assets/         # Statyczne zasoby (np. logo.svg)\\n│   ├── App.css\\n│   ├── App.jsx         # Główny komponent Twojej aplikacji (lub App.js jeśli wybrałeś JS)\\n│   ├── index.css\\n│   └── main.jsx        # Główny plik JavaScript, który renderuje aplikację (lub main.js)\\n├── .gitignore\\n├── index.html          # Główny plik HTML, do którego React będzie renderować aplikację\\n├── package.json        # Informacje o projekcie i zależnościach\\n├── vite.config.js      # Konfiguracja Vite\\n└── README.md\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eNajważniejsze pliki na początek to \u003ccode\u003eindex.html\u003c/code\u003e (główny plik, w którym React się \\\"zakotwiczy\\\"), \u003ccode\u003esrc/main.jsx\u003c/code\u003e (punkt wejścia aplikacji, gdzie React jest renderowany do DOM) i \u003ccode\u003esrc/App.jsx\u003c/code\u003e (główny komponent Twojej aplikacji).\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"komponenty-funkcyjne-i-hooki-hooks\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#komponenty-funkcyjne-i-hooki-hooks\\\"\u003e\u003e\u003e\u003c/a\u003eKomponenty funkcyjne i Hooki (Hooks)\u003c/h2\u003e\\n\u003cp\u003eWspółczesny React opiera się głównie na \u003cstrong\u003ekomponentach funkcyjnych\u003c/strong\u003e i \u003cstrong\u003eHookach\u003c/strong\u003e. Hooki to specjalne funkcje, które pozwalają komponentom funkcyjnym \\\"zahaczać się\\\" w stan Reacta i cykl życia (life-cycle) bez pisania klas. Są one kluczowe dla zarządzania stanem i efektami pobocznymi.\u003c/p\u003e\\n\u003ch3 id=\\\"usestate\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#usestate\\\"\u003e\u003e\u003e\u003e\u003c/a\u003e\u003ccode\u003euseState\u003c/code\u003e\u003c/h3\u003e\\n\u003cp\u003e\u003ccode\u003euseState\u003c/code\u003e to najczęściej używany Hook. Pozwala komponentom funkcyjnym na dodawanie stanu do komponentów.\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { useState } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"react\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Pamiętaj o importowaniu tylko tego, czego potrzebujesz\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eMyComponent\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Deklaracja stanu 'isOn' z początkową wartością 'false'\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// 'isOn' to bieżąca wartość stanu, 'setIsOn' to funkcja do jej aktualizacji\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [isOn, setIsOn] = \u003cspan class=\\\"hljs-title function_\\\"\u003euseState\u003c/span\u003e(\u003cspan class=\\\"hljs-literal\\\"\u003efalse\u003c/span\u003e);\\n\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Funkcja zmieniająca stan\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003etoggleStatus\u003c/span\u003e = (\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) =\u003e {\\n    \u003cspan class=\\\"hljs-title function_\\\"\u003esetIsOn\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eprev\u003c/span\u003e) =\u003e\u003c/span\u003e !prev); \u003cspan class=\\\"hljs-comment\\\"\u003e// Zmieniamy stan na przeciwny\u003c/span\u003e\\n  };\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eStatus: {isOn ? \\\"On\\\" : \\\"Off\\\"}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003eonClick\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e{toggleStatus}\u003c/span\u003e\u003e\u003c/span\u003eToggle\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ebutton\u003c/span\u003e\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003eZa każdym razem, gdy wywołasz \u003ccode\u003esetIsOn\u003c/code\u003e, komponent \u003ccode\u003eMyComponent\u003c/code\u003e zostanie ponownie wyrenderowany z nową wartością stanu \u003ccode\u003eisOn\u003c/code\u003e.\u003c/p\u003e\\n\u003ch3 id=\\\"useeffect\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#useeffect\\\"\u003e\u003e\u003e\u003e\u003c/a\u003e\u003ccode\u003euseEffect\u003c/code\u003e\u003c/h3\u003e\\n\u003cp\u003e\u003ccode\u003euseEffect\u003c/code\u003e to Hook, który pozwala na wykonywanie \u003cstrong\u003eefektów pobocznych\u003c/strong\u003e (side effects) w komponentach funkcyjnych. Efekty poboczne to operacje, które wchodzą w interakcję ze światem zewnętrznym, takie jak:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003ePobieranie danych z API 🌐\u003c/li\u003e\\n\u003cli\u003eSubskrypcje zdarzeń (np. nasłuchiwanie kliknięć)\u003c/li\u003e\\n\u003cli\u003eBezpośrednia manipulacja DOM (rzadziej potrzebna w React)\u003c/li\u003e\\n\u003cli\u003eUstawianie timerów\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\u003ccode\u003euseEffect\u003c/code\u003e przyjmuje dwa argumenty: funkcję, która zawiera logikę efektu, oraz tablicę zależności (dependency array).\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { useState, useEffect } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"react\\\"\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Importujemy potrzebne Hooki\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eFetchedData\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [data, setData] = \u003cspan class=\\\"hljs-title function_\\\"\u003euseState\u003c/span\u003e(\u003cspan class=\\\"hljs-literal\\\"\u003enull\u003c/span\u003e);\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e [loading, setLoading] = \u003cspan class=\\\"hljs-title function_\\\"\u003euseState\u003c/span\u003e(\u003cspan class=\\\"hljs-literal\\\"\u003etrue\u003c/span\u003e);\\n\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// useEffect uruchomi się po pierwszym renderowaniu i za każdym razem,\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// gdy zmieni się któraś z wartości w tablicy zależności (tutaj: pusta tablica oznacza tylko raz)\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003euseEffect\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e() =\u003e\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Symulacja pobierania danych\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-built_in\\\"\u003esetTimeout\u003c/span\u003e(\u003cspan class=\\\"hljs-function\\\"\u003e() =\u003e\u003c/span\u003e {\\n      \u003cspan class=\\\"hljs-title function_\\\"\u003esetData\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Data fetched from API! 👍\\\"\u003c/span\u003e);\\n      \u003cspan class=\\\"hljs-title function_\\\"\u003esetLoading\u003c/span\u003e(\u003cspan class=\\\"hljs-literal\\\"\u003efalse\u003c/span\u003e);\\n    }, \u003cspan class=\\\"hljs-number\\\"\u003e2000\u003c/span\u003e); \u003cspan class=\\\"hljs-comment\\\"\u003e// Po 2 sekundach\u003c/span\u003e\\n\\n    \u003cspan class=\\\"hljs-comment\\\"\u003e// Opcjonalnie: funkcja czyszcząca (cleanup function)\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-function\\\"\u003e() =\u003e\u003c/span\u003e {\\n      \u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Component odmontowany lub efekt uruchomiony ponownie.\\\"\u003c/span\u003e);\\n    };\\n  }, []); \u003cspan class=\\\"hljs-comment\\\"\u003e// Pusta tablica zależności: efekt uruchamia się tylko raz (jak componentDidMount)\u003c/span\u003e\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (loading) {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003eLoading data... ⏳\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ep\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n  }\\n\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh2\u003c/span\u003e\u003e\u003c/span\u003e{data}\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh2\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n}\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003ccode\u003euseEffect\u003c/code\u003e bez tablicy zależności (\u003ccode\u003euseEffect(() =\u003e { ... });\u003c/code\u003e) uruchamia się po każdym renderowaniu. Z pustą tablicą (\u003ccode\u003euseEffect(() =\u003e { ... }, []);\u003c/code\u003e) uruchamia się tylko raz, po pierwszym renderowaniu. Z tablicą zależności (\u003ccode\u003euseEffect(() =\u003e { ... }, [variable1, variable2]);\u003c/code\u003e) uruchamia się, gdy wartości w tablicy ulegną zmianie.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podsumowanie\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podsumowanie\\\"\u003e\u003e\u003e\u003c/a\u003ePodsumowanie\u003c/h2\u003e\\n\u003cp\u003eGratulacje! Zrobiłeś/aś pierwsze kroki w świecie Reacta. 🎉 Wiesz już, że React to potężna biblioteka do budowania interfejsów użytkownika w oparciu o komponenty. Zrozumiałeś/aś kluczowe koncepcje takie jak \u003cstrong\u003eJSX\u003c/strong\u003e, \u003cstrong\u003epropsy\u003c/strong\u003e, \u003cstrong\u003estan\u003c/strong\u003e oraz \u003cstrong\u003eWirtualny DOM\u003c/strong\u003e. Poznałeś/aś również \u003cstrong\u003ekomponenty funkcyjne\u003c/strong\u003e i podstawowe \u003cstrong\u003eHooki\u003c/strong\u003e (\u003ccode\u003euseState\u003c/code\u003e, \u003ccode\u003euseEffect\u003c/code\u003e), które są fundamentem nowoczesnego Reacta. Nauczyłeś/aś się także, jak szybko inicjować projekty za pomocą \u003cstrong\u003eVite\u003c/strong\u003e.\u003c/p\u003e\\n\u003cp\u003eTo dopiero początek przygody! React oferuje znacznie więcej możliwości, takich jak:\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eRouting\u003c/strong\u003e (np. React Router) 🧭\u003c/li\u003e\\n\u003cli\u003eZaawansowane zarządzanie stanem (np. Context API, Redux, Zustand)\u003c/li\u003e\\n\u003cli\u003eFormularze i ich walidacja\u003c/li\u003e\\n\u003cli\u003eObsługa API i asynchroniczności\u003c/li\u003e\\n\u003cli\u003eTestowanie komponentów\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003eZachęcam do dalszego eksperymentowania i budowania własnych projektów. Praktyka to najlepszy sposób na naukę! 🚀\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zadania-do-wykonania\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadania-do-wykonania\\\"\u003e\u003e\u003e\u003c/a\u003eZadania do wykonania\u003c/h2\u003e\\n\u003cp\u003ePoniższe zadania pomogą Ci utrwalić wiedzę o podstawach Reacta. Stwórz nowy projekt React z Vite, a następnie wykonaj w nim poniższe zadania, tworząc osobne komponenty. Pamiętaj, aby importować tylko te Hooki i funkcje, których potrzebujesz!\u003c/p\u003e\\n\u003ch3 id=\\\"zadanie-1-komponent-powitania\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-1-komponent-powitania\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 1: Komponent Powitania\u003c/h3\u003e\\n\u003cp\u003eStwórz nowy komponent funkcyjny o nazwie \u003ccode\u003eWelcome\u003c/code\u003e, który:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003ePrzyjmuje jeden \u003cstrong\u003eprop\u003c/strong\u003e o nazwie \u003ccode\u003ename\u003c/code\u003e.\u003c/li\u003e\\n\u003cli\u003eWyświetla nagłówek \u003ccode\u003e\u0026#x3C;h1\u003e\u003c/code\u003e z tekstem \\\"Hello, [name]!\\\"\u003c/li\u003e\\n\u003cli\u003eWykorzystaj ten komponent dwukrotnie w komponencie \u003ccode\u003eApp.jsx\u003c/code\u003e, przekazując różne imiona.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cdetails\u003e\\n\u003csummary\u003e\\n\u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n\u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// src/components/Welcome.jsx\u003c/span\u003e\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// Stwórz nowy katalog 'components' w 'src' dla lepszej organizacji\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eWelcome\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003eprops\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-comment\\\"\u003e// Komponent wyświetlający powitanie na podstawie propsów\u003c/span\u003e\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003eHello, {props.name}! 👋\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003eh1\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e;\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eexport\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003edefault\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eWelcome\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-comment\\\"\u003e// src/App.jsx\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eWelcome\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e'./components/Welcome'\u003c/span\u003e; \u003cspan class=\\\"hljs-comment\\\"\u003e// Pamiętaj o poprawnej ścieżce importu!\u003c/span\u003e\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eApp\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003c/span\u003e) {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e (\\n    \u003cspan class=\\\"xml\\\"\u003e\u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eWelcome\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Alice\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eWelcome\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"Bob\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n      \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;\u003cspan class=\\\"hljs-name\\\"\u003eWelcome\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003ename\u003c/span\u003e=\u003cspan class=\\\"hljs-string\\\"\u003e\\\"World\\\"\u003c/span\u003e /\u003e\u003c/span\u003e\\n    \u003cspan class=\\\"hljs-tag\\\"\u003e\u0026#x3C;/\u003cspan class=\\\"hljs-name\\\"\u003ediv\u003c/span\u003e\u003e\u003c/span\u003e\u003c/span\u003e\\n  );\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eexport\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003edefault\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eApp\u003c/span\u003e;\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003c/details\u003e\\n\u003chr\u003e\\n\u003ch3 id=\\\"zadanie-2-licznik-z-przyciskiem\\\" class=\\\"scroll-mt-20\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zadanie-2-licznik-z-przyciskiem\\\"\u003e\u003e\u003e\u003e\u003c/a\u003eZadanie 2: Licznik z przyciskiem\u003c/h3\u003e\\n\u003cp\u003eStwórz nowy komponent funkcyjny o nazwie \u003ccode\u003eCounter\u003c/code\u003e, który:\u003c/p\u003e\\n\u003col\u003e\\n\u003cli\u003eUżywa Hooka \u003ccode\u003euseState\u003c/code\u003e do zarządzania stanem licznika (początkowa wartość \u003ccode\u003e0\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003eWyświetla aktualną wartość licznika w akapicie (\u003ccode\u003e\u0026#x3C;p\u003e\u003c/code\u003e).\u003c/li\u003e\\n\u003cli\u003ePosiada dwa przyciski: jeden do \u003cstrong\u003ezwiększania\u003c/strong\u003e licznika o 1, drugi do \u003cstrong\u003ezmniejszania\u003c/strong\u003e licznika o 1.\u003c/li\u003e\\n\u003c/ol\u003e\\n\u003cdetails\u003e\\n\u003csummary\u003e\\n\u003cspan\u003ePokaż rozwiązanie\u003c/span\u003e\\n\u003c/summary\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-jsx\\\"\u003e\u003cspan class=\\\"hljs-comment\\\"\u003e// src/components/Counter.jsx\u003c/span\u003e\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { useState } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e'react'\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003eCounter\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u
