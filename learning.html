 wskazówek. Gotowy na typowanie? 😉\",\"29 minut\",\"wprowadzenie-do-typescript\",\"Wprowadzenie do TypeScript\",{\"_16\":38,\"_18\":39,\"_20\":40,\"_22\":41,\"_24\":42},\"2025-06-22T00:00:00.000Z\",\"Zrozum podstawy TypeScript w środowisku React - prostym językiem i na praktycznych przykładach.\",\"9 minut\",\"pierwsze-kroki-z-typescript-w-react\",\"Pierwsze kroki z TypeScript w React - praktyczne podstawy\",{\"_16\":38,\"_18\":44,\"_20\":45,\"_22\":46,\"_24\":47},\"Kompleksowy przewodnik po wzorcach projektowych - od podstaw po praktyczne przykłady w kontekście frontendu i backendu.\",\"13 minut\",\"wzorce-projektowe\",\"Wzorce projektowe w praktyce\",{\"_16\":49,\"_18\":50,\"_20\":51,\"_22\":52,\"_24\":53},\"2025-06-05T00:00:00.000Z\",\"Kompleksowy kurs wprowadzający do systemu kontroli wersji Git oraz platformy GitHub. Poznaj podstawowe pojęcia, komendy oraz narzędzia do pracy zespołowej i automatyzacji.\",\"5 minut\",\"wprowadzenie-do-git-i-github\",\"Wprowadzenie do Git i GitHub\",{\"_16\":55,\"_18\":56,\"_20\":21,\"_22\":57,\"_24\":58},\"2024-07-05T00:00:00.000Z\",\"Semantyczny HTML polega na używaniu elementów HTML, które jednoznacznie opisują swoje znaczenie i cel. Elementy semantyczne nie tylko definiują strukturę dokumentu, ale również pomagają w interpretacji jego zawartości zarówno przez przeglądarki, jak i przez wyszukiwarki internetowe oraz technologie wspomagające (np. czytniki ekranowe).\",\"semantyczny-html\",\"Wprowadzenie do Semantycznego HTML\",{\"_16\":60,\"_18\":61,\"_20\":62,\"_22\":63,\"_24\":64},\"2024-06-30T00:00:00.000Z\",\"JavaScript jest językiem programowania, który jest powszechnie stosowany do tworzenia dynamicznych i interaktywnych stron internetowych. W ciągu ostatnich lat JavaScript znacznie ewoluował, wprowadzając nowe funkcje i poprawiając istniejące mechanizmy. W tym kursie omówimy najważniejsze elementy nowoczesnego JavaScript, w tym ES6 i nowsze.\",\"18 minut\",\"nowoczesny-javascript\",\"Renesans w JS, czyli nowoczesny JavaScript\",{\"_16\":60,\"_18\":66,\"_20\":67,\"_22\":68,\"_24\":69},\"Czym jest BEM? BEM (Block, Element, Modifier) to metodyka nazewnictwa klas CSS, która pomaga tworzyć komponenty interfejsu użytkownika w sposób modularny i łatwy do utrzymania. BEM dzieli interfejs na bloki, elementy i modyfikatory, co pozwala na lepszą organizację kodu CSS.\",\"12 minut\",\"szybszy-css-czyli-wprowadzenie-do-bem\",\"Wprowadzenie do metodyki BEM\",{\"_16\":60,\"_18\":71,\"_20\":45,\"_22\":72,\"_24\":73},\"CSS (Cascading Style Sheets) to język służący do opisywania wyglądu i formatu dokumentu HTML. CSS pozwala na oddzielenie treści od prezentacji, co umożliwia tworzenie estetycznych i spójnych stron internetowych. W tym kursie omówimy podstawy CSS, w tym selektory, właściwości, sposoby załączania CSS do HTML oraz JavaScript, a także przedstawimy kilka zadań do wykonania.\",\"wprowadzenie-do-css\",\"Wprowadzenie do CSS\",{\"_16\":60,\"_18\":75,\"_20\":76,\"_22\":77,\"_24\":78},\"Czym jest DOM? DOM (Document Object Model) to interfejs programistyczny dla dokumentów HTML i XML. Umożliwia dynamiczne manipulowanie strukturą, stylem i treścią dokumentów. DOM reprezentuje dokument jako drzewo obiektów, gdzie każdy element, atrybut i tekst w dokumencie jest węzłem drzewa.\",\"10 minut\",\"wprowadzenie-do-dom\",\"Czym jest DOM?\",{\"_16\":60,\"_18\":80,\"_20\":76,\"_22\":81,\"_24\":82},\"Co to jest HTML? HTML (HyperText Markup Language) to podstawowy język wykorzystywany do tworzenia i strukturyzowania stron internetowych. HTML używa elementów, które definiują różne części dokumentu, takie jak nagłówki, akapity, linki, obrazy, i wiele innych.\",\"wprowadzenie-do-html\",\"Wprowadzenie do HTML\",\"actionData\",\"errors\"]\n");</script><!--$?--><template id="B:1"></template><!--/$--></div><script>$RB=[];$RV=function(a){$RT=performance.now();for(var b=0;b<a.length;b+=2){var c=a[b],e=a[b+1];null!==e.parentNode&&e.parentNode.removeChild(e);var f=c.parentNode;if(f){var g=c.previousSibling,h=0;do{if(c&&
