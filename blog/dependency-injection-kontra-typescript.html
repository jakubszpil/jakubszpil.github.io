import("/assets/entry.client-DL0_e85Q.js");</script><!--$?--><template id="B:0"></template><!--/$--><script id="_R_">requestAnimationFrame(function(){$RT=performance.now()});</script><div hidden id="S:0"><script>window.__reactRouterContext.streamController.enqueue("[{\"_1\":2,\"_24\":-5,\"_25\":-5},\"loaderData\",{\"_3\":4},\"routes/article-detail\",{\"_5\":6,\"_7\":8,\"_9\":10,\"_11\":12,\"_13\":14,\"_15\":16,\"_20\":21,\"_22\":23},\"slug\",\"dependency-injection-kontra-typescript\",\"content\",\"\u003cp\u003eDependency Injection (DI) to wzorzec projektowy stosowany w celu zwiększenia modularności i testowalności kodu. Pozwala on na oddzielenie tworzenia obiektów od ich używania, co prowadzi do lepszej separacji odpowiedzialności oraz ułatwia zarządzanie zależnościami w projekcie. 🔗\u003c/p\u003e\\n\u003cp\u003eW TypeScript DI można zaimplementować na różne sposoby, m.in. za pomocą funkcji wstrzykujących, kontenerów IoC oraz dekoratorów. Poniżej znajdziesz szczegółowe omówienie praktycznych sposobów implementacji DI w TypeScript wraz z przykładami i wskazówkami.\u003c/p\u003e\\n\u003ch2 id=\\\"czym-jest-dependency-injection\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#czym-jest-dependency-injection\\\"\u003e\u003e\u003e\u003c/a\u003eCzym jest Dependency Injection?\u003c/h2\u003e\\n\u003cp\u003e\u003cstrong\u003eDependency Injection\u003c/strong\u003e polega na przekazywaniu obiektów zależnych (tzw. zależności) do obiektu zamiast tworzenia ich bezpośrednio w jego wnętrzu. Dzięki temu możemy łatwo podmieniać zależności - np. na ich mocki podczas testowania - bez zmian w logice biznesowej.\u003c/p\u003e\\n\u003cp\u003eDI zwiększa elastyczność kodu, ułatwia jego testowanie oraz pozwala na lepszą separację odpowiedzialności. Dzięki temu Twój kod staje się bardziej modularny, przejrzysty i łatwy w utrzymaniu. 💡\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"zalety-stosowania-di\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#zalety-stosowania-di\\\"\u003e\u003e\u003e\u003c/a\u003eZalety stosowania DI\u003c/h2\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwiejsze testowanie\u003c/strong\u003e - zależności można zamieniać na mocki lub stuby w testach jednostkowych.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eLepsza modularność\u003c/strong\u003e - klasy nie są silnie powiązane z konkretnymi implementacjami.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eŁatwiejsze zarządzanie zależnościami\u003c/strong\u003e - zmiany w zależnościach nie wymagają modyfikacji całego kodu.\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eWspieranie zasad SOLID\u003c/strong\u003e - zwłaszcza zasady odwrócenia zależności (Dependency Inversion Principle).\u003c/li\u003e\\n\u003cli\u003e\u003cstrong\u003eZwiększona elastyczność\u003c/strong\u003e - łatwo rozszerzać i modyfikować funkcjonalność bez naruszania istniejących klas.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podstawowy-przykład-dependency-injection\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podstawowy-przykład-dependency-injection\\\"\u003e\u003e\u003e\u003c/a\u003ePodstawowy przykład Dependency Injection\u003c/h2\u003e\\n\u003cp\u003eRozważmy prosty scenariusz, w którym klasa \u003ccode\u003eUserService\u003c/code\u003e korzysta z \u003ccode\u003eUserRepository\u003c/code\u003e:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e`User \u003cspan class=\\\"hljs-subst\\\"\u003e${userId}\u003c/span\u003e`\u003c/span\u003e;\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003euserRepository\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e;\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003econstructor\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003cspan class=\\\"hljs-attr\\\"\u003euserRepository\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e\u003c/span\u003e) {\\n    \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003euserRepository\u003c/span\u003e = userRepository;\\n  }\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003euserRepository\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(userId);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e userRepository = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e();\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e userService = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e(userRepository);\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(userService.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// User 1\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWyjaśnienie:\u003c/strong\u003e\u003cbr\u003e\\nW tym przykładzie \u003ccode\u003eUserRepository\u003c/code\u003e jest wstrzykiwany do \u003ccode\u003eUserService\u003c/code\u003e poprzez konstruktor. Dzięki temu możemy łatwo podmienić repozytorium np. w testach jednostkowych lub zamienić na inną implementację.\u003c/p\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"wstrzykiwanie-zależności-przy-pomocy-funkcji\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#wstrzykiwanie-zależności-przy-pomocy-funkcji\\\"\u003e\u003e\u003e\u003c/a\u003eWstrzykiwanie zależności przy pomocy funkcji\u003c/h2\u003e\\n\u003cp\u003eW większych aplikacjach zarządzanie zależnościami ręcznie może być uciążliwe. Możemy zastosować funkcję \u003ccode\u003einject\u003c/code\u003e, która będzie przechowywać i dostarczać instancje klas (prosta wersja kontenera IoC):\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003edependencies\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eMap\u003c/span\u003e\u0026#x3C;\u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e, \u003cspan class=\\\"hljs-built_in\\\"\u003eany\u003c/span\u003e\u003e = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eMap\u003c/span\u003e();\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003efunction\u003c/span\u003e inject\u0026#x3C;T\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003edependency\u003c/span\u003e: \u003cspan class=\\\"hljs-title function_\\\"\u003enew\u003c/span\u003e () =\u003e T): T {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eif\u003c/span\u003e (dependencies.\u003cspan class=\\\"hljs-title function_\\\"\u003ehas\u003c/span\u003e(dependency.\u003cspan class=\\\"hljs-property\\\"\u003ename\u003c/span\u003e)) {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e dependencies.\u003cspan class=\\\"hljs-title function_\\\"\u003eget\u003c/span\u003e(dependency.\u003cspan class=\\\"hljs-property\\\"\u003ename\u003c/span\u003e);\\n  }\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e dep = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title function_\\\"\u003edependency\u003c/span\u003e();\\n  dependencies.\u003cspan class=\\\"hljs-title function_\\\"\u003eset\u003c/span\u003e(dependency.\u003cspan class=\\\"hljs-property\\\"\u003ename\u003c/span\u003e, dep);\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e dep;\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e`User \u003cspan class=\\\"hljs-subst\\\"\u003e${userId}\u003c/span\u003e`\u003c/span\u003e;\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-keyword\\\"\u003eprotected\u003c/span\u003e userRepository = \u003cspan class=\\\"hljs-title function_\\\"\u003einject\u003c/span\u003e(\u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e);\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003euserRepository\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(userId);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eExtendedUserService\u003c/span\u003e \u003cspan class=\\\"hljs-keyword\\\"\u003eextends\u003c/span\u003e \u003cspan class=\\\"hljs-title class_ inherited__\\\"\u003eUserService\u003c/span\u003e {}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e extendedUserService = \u003cspan class=\\\"hljs-title function_\\\"\u003einject\u003c/span\u003e(\u003cspan class=\\\"hljs-title class_\\\"\u003eExtendedUserService\u003c/span\u003e);\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(extendedUserService.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// User 1\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWyjaśnienie:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eFunkcja \u003ccode\u003einject\u003c/code\u003e rejestruje i przechowuje instancje klas, zapewniając singleton dla każdej z nich.\u003c/li\u003e\\n\u003cli\u003eNie musisz przekazywać zależności przez konstruktor - są pobierane automatycznie.\u003c/li\u003e\\n\u003cli\u003eKlasy można łatwo rozszerzać, a zależności są zarządzane centralnie - to duże ułatwienie w dużych projektach. 🛠️\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"kontener-ioc-i-automatyzacja-di\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#kontener-ioc-i-automatyzacja-di\\\"\u003e\u003e\u003e\u003c/a\u003eKontener IoC i automatyzacja DI\u003c/h2\u003e\\n\u003cp\u003eW rozbudowanych projektach warto rozważyć użycie gotowych rozwiązań, np. \u003ca href=\\\"https://inversify.io/\\\"\u003eInversifyJS\u003c/a\u003e, które pozwalają korzystać z dekoratorów i automatycznie rozwiązywać zależności.\u003c/p\u003e\\n\u003cp\u003ePrzykład z użyciem InversifyJS:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"reflect-metadata\\\"\u003c/span\u003e;\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eimport\u003c/span\u003e { injectable, inject, \u003cspan class=\\\"hljs-title class_\\\"\u003eContainer\u003c/span\u003e } \u003cspan class=\\\"hljs-keyword\\\"\u003efrom\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"inversify\\\"\u003c/span\u003e;\\n\\n\u003cspan class=\\\"hljs-meta\\\"\u003e@injectable\u003c/span\u003e()\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e`User \u003cspan class=\\\"hljs-subst\\\"\u003e${userId}\u003c/span\u003e`\u003c/span\u003e;\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-meta\\\"\u003e@injectable\u003c/span\u003e()\\n\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003econstructor\u003c/span\u003e(\u003cspan class=\\\"hljs-params\\\"\u003e\u003cspan class=\\\"hljs-meta\\\"\u003e@inject\u003c/span\u003e(UserRepository) \u003cspan class=\\\"hljs-keyword\\\"\u003eprivate\u003c/span\u003e \u003cspan class=\\\"hljs-attr\\\"\u003euserRepository\u003c/span\u003e: \u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e\u003c/span\u003e) {}\\n\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-variable language_\\\"\u003ethis\u003c/span\u003e.\u003cspan class=\\\"hljs-property\\\"\u003euserRepository\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(userId);\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e container = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eContainer\u003c/span\u003e();\\ncontainer.\u003cspan class=\\\"hljs-title function_\\\"\u003ebind\u003c/span\u003e(\u003cspan class=\\\"hljs-title class_\\\"\u003eUserRepository\u003c/span\u003e).\u003cspan class=\\\"hljs-title function_\\\"\u003etoSelf\u003c/span\u003e();\\ncontainer.\u003cspan class=\\\"hljs-title function_\\\"\u003ebind\u003c/span\u003e(\u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e).\u003cspan class=\\\"hljs-title function_\\\"\u003etoSelf\u003c/span\u003e();\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e userService = container.\u003cspan class=\\\"hljs-title function_\\\"\u003eget\u003c/span\u003e(\u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e);\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(userService.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// User 1\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eZalety takiego podejścia:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eAutomatyczna rejestracja i rozwiązywanie zależności.\u003c/li\u003e\\n\u003cli\u003eWsparcie dla różnych zakresów życia obiektu (singleton, transient).\u003c/li\u003e\\n\u003cli\u003eMożliwość wstrzykiwania zależności przez dekoratory.\u003c/li\u003e\\n\u003cli\u003eŁatwiejsze zarządzanie rozbudowaną strukturą aplikacji.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"testowanie-z-wykorzystaniem-di\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#testowanie-z-wykorzystaniem-di\\\"\u003e\u003e\u003e\u003c/a\u003eTestowanie z wykorzystaniem DI\u003c/h2\u003e\\n\u003cp\u003eDzięki zastosowaniu DI możemy łatwo podmieniać implementacje zależności, np. na mocki lub stuby podczas testów jednostkowych:\u003c/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\"hljs language-typescript\\\"\u003e\u003cspan class=\\\"hljs-keyword\\\"\u003eclass\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eMockUserRepository\u003c/span\u003e {\\n  \u003cspan class=\\\"hljs-title function_\\\"\u003egetUser\u003c/span\u003e(\u003cspan class=\\\"hljs-attr\\\"\u003euserId\u003c/span\u003e: \u003cspan class=\\\"hljs-built_in\\\"\u003enumber\u003c/span\u003e): \u003cspan class=\\\"hljs-built_in\\\"\u003estring\u003c/span\u003e {\\n    \u003cspan class=\\\"hljs-keyword\\\"\u003ereturn\u003c/span\u003e \u003cspan class=\\\"hljs-string\\\"\u003e\\\"Mock User\\\"\u003c/span\u003e;\\n  }\\n}\\n\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e mockRepo = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eMockUserRepository\u003c/span\u003e();\\n\u003cspan class=\\\"hljs-keyword\\\"\u003econst\u003c/span\u003e userService = \u003cspan class=\\\"hljs-keyword\\\"\u003enew\u003c/span\u003e \u003cspan class=\\\"hljs-title class_\\\"\u003eUserService\u003c/span\u003e(mockRepo);\\n\\n\u003cspan class=\\\"hljs-variable language_\\\"\u003econsole\u003c/span\u003e.\u003cspan class=\\\"hljs-title function_\\\"\u003elog\u003c/span\u003e(userService.\u003cspan class=\\\"hljs-title function_\\\"\u003egetUserName\u003c/span\u003e(\u003cspan class=\\\"hljs-number\\\"\u003e1\u003c/span\u003e)); \u003cspan class=\\\"hljs-comment\\\"\u003e// Mock User\u003c/span\u003e\\n\u003c/code\u003e\u003c/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eKorzyści:\u003c/strong\u003e\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003eTesty są niezależne od rzeczywistej implementacji zależności.\u003c/li\u003e\\n\u003cli\u003eMożna łatwo symulować różne scenariusze i przypadki brzegowe.\u003c/li\u003e\\n\u003cli\u003eUtrzymanie i rozwijanie testów staje się prostsze.\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003chr\u003e\\n\u003ch2 id=\\\"podsumowanie\\\" class=\\\"scroll-mt-19\\\" data-heading\u003e\u003ca class=\\\"mr-2 no-underline hover:underline focus-visible:underline select-none\\\" href=\\\"#podsumowanie\\\"\u003e\u003e\u003e\u003c/a\u003ePodsumowanie\u003c/h2\u003e\\n\u003cp\u003eDependency Injection w TypeScript to potężny sposób na zwiększenie elastyczności, testowalności i modularności kodu. Najprostsze podejście to ręczne wstrzykiwanie zależności przez konstruktor, jednak w miarę wzrostu projektu warto pomyśleć o własnym kontenerze IoC lub sięgnąć po gotowe biblioteki jak InversifyJS. DI pozwala na lepszą separację odpowiedzialności i sprawia, że kod jest łatwiejszy w utrzymaniu i testowaniu.\u003c/p\u003e\\n\u003chr\u003e\\n\u003cp\u003e\u003cstrong\u003eDalsza lektura:\u003c/strong\u003e 📚\u003c/p\u003e\\n\u003cul\u003e\\n\u003cli\u003e\u003ca href=\\\"https://github.com/inversify/InversifyJS\\\"\u003eInversifyJS Documentation\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"https://angular.dev/guide/di\\\"\u003eDependency Injection w TypeScript - Angular\u003c/a\u003e\u003c/li\u003e\\n\u003cli\u003e\u003ca href=\\\"https://en.wikipedia.org/wiki/SOLID\\\"\u003eSOLID Principles\u003c/a\u003e\u003c/li\u003e\\n\u003c/ul\u003e\",\"readingTime\",\"3 minuty\",\"createdAt\",\"2024-06-20T00:00:00.000Z\",\"category\",\"typescript\",\"keywords\",[14,17,18,19],\"wzorce projektowe\",\"javascript\",\"blog\",\"description\",\"Dependency Injection (DI) to wzorzec projektowy stosowany w celu zwiększenia modularności i testowalności kodu. Umożliwia to oddzielenie tworzenia obiektów od ich używania, co prowadzi do lepszej separacji odpowiedzialności i łatwiejszego zarządzania zależnościami. W TypeScript, DI można zaimplementować na kilka sposobów, w tym za funkcji wstrzykujących, które są
